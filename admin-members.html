<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

<div class="container mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6"><h1 class="text-2xl font-bold text-emerald-700">👨‍💼 TUKNBD অ্যাডমিন প্যানেল</h1><button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">লগআউট</button></div>

    <!-- ট্যাব -->
    <div class="flex border-b mb-6"><button onclick="showTab('members')" id="tabMembers" class="py-2 px-4 text-emerald-600 border-b-2 border-emerald-600 font-semibold">সদস্য লিস্ট</button><button onclick="showTab('representatives')" id="tabReps" class="py-2 px-4 text-gray-600 hover:text-emerald-600">জেলা প্রতিনিধি</button><button onclick="showTab('applications')" id="tabApps" class="py-2 px-4 text-gray-600 hover:text-emerald-600">প্রতিনিধি আবেদন</button></div>

    <!-- সদস্য লিস্ট ট্যাব -->
    <div id="membersTab"><div class="bg-white rounded-xl shadow-md overflow-hidden"><div class="bg-emerald-50 px-5 py-3 border-b"><h3 class="font-bold">📋 সদস্য লিস্ট</h3></div><div class="overflow-x-auto p-4"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="p-2">নাম</th><th class="p-2">মোবাইল</th><th class="p-2">জেলা</th><th class="p-2">সদস্য ধরন</th><th class="p-2">স্ট্যাটাস</th><th class="p-2">অ্যাকশন</th></tr></thead><tbody id="membersList"><tr><td colspan="6" class="text-center p-4">লোড হচ্ছে...</td></tr></tbody></table></div></div></div>

    <!-- জেলা প্রতিনিধি ট্যাব -->
    <div id="repsTab" class="hidden"><div class="bg-white rounded-xl shadow-md overflow-hidden"><div class="bg-emerald-50 px-5 py-3 border-b"><h3 class="font-bold">🏢 জেলা প্রতিনিধি লিস্ট</h3></div><div class="overflow-x-auto p-4"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="p-2">নাম</th><th class="p-2">জেলা</th><th class="p-2">মাদ্রাসা</th><th class="p-2">মোবাইল</th><th class="p-2">স্ট্যাটাস</th><th class="p-2">অ্যাকশン</th></tr></thead><tbody id="repsList"><tr><td colspan="6" class="text-center p-4">লোড হচ্ছে...</td></tr></tbody></table></div></div></div>

    <!-- জেলা প্রতিনিধি আবেদন ট্যাব -->
    <div id="appsTab" class="hidden"><div class="bg-white rounded-xl shadow-md overflow-hidden"><div class="bg-emerald-50 px-5 py-3 border-b"><h3 class="font-bold">📝 জেলা প্রতিনিধি আবেদন সমূহ</h3></div><div class="overflow-x-auto p-4"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="p-2">নাম</th><th class="p-2">জেলা</th><th class="p-2">মাদ্রাসা</th><th class="p-2">মোবাইল</th><th class="p-2">অভিজ্ঞতা</th><th class="p-2">অ্যাকশন</th></tr></thead><tbody id="applicationsList"><tr><td colspan="6" class="text-center p-4">লোড হচ্ছে...</td></tr></tbody></table></div></div></div>
</div>

<script>
    let members = [{ id: 1, name: "আব্দুল্লাহ", mobile: "01812345678", district: "ঢাকা", type: "সাধারণ সদস্য", status: "active" }, { id: 2, name: "ফাতেমা বেগম", mobile: "01798765432", district: "চট্টগ্রাম", type: "আজীবন সদস্য", status: "active" }];
    let representatives = [{ id: 1, name: "মোহাম্মদ আলী", district: "ঢাকা", madrasa: "জামিয়া কাসেমিয়া", mobile: "01911223344", status: "active" }];
    let applications = [{ id: 1, name: "হাফিজ মাহমুদ", district: "রাজশাহী", madrasa: "মাদ্রাসা তায়্যিবা", mobile: "01712345678", experience: "৩ বছর সংগঠনের সাথে" }];

    function renderMembers() { let html = ''; members.forEach(m => { html += `<tr class="border-b"><td class="p-2">${m.name}</td><td class="p-2">${m.mobile}</td><td class="p-2">${m.district}</td><td class="p-2">${m.type}</td><td class="p-2"><span class="px-2 py-1 rounded-full text-xs ${m.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${m.status}</span></td><td class="p-2"><button onclick="editMember(${m.id})" class="text-blue-500"><i class="fas fa-edit"></i></button> <button onclick="deleteMember(${m.id})" class="text-red-500 ml-2"><i class="fas fa-trash"></i></button></td></tr>`; }); document.getElementById('membersList').innerHTML = html || '<tr><td colspan="6" class="text-center p-4">কোনো সদস্য নেই</td></tr>'; }
    function renderReps() { let html = ''; representatives.forEach(r => { html += `<tr class="border-b"><td class="p-2">${r.name}</td><td class="p-2">${r.district}</td><td class="p-2">${r.madrasa}</td><td class="p-2">${r.mobile}</td><td class="p-2"><span class="px-2 py-1 rounded-full text-xs bg-green-100 text-green-700">${r.status}</span></td><td class="p-2"><button onclick="removeRep(${r.id})" class="text-red-500"><i class="fas fa-user-minus"></i></button></td></tr>`; }); document.getElementById('repsList').innerHTML = html || '<tr><td colspan="6" class="text-center p-4">কোনো প্রতিনিধি নেই</td></tr>'; }
    function renderApplications() { let html = ''; applications.forEach(a => { html += `<tr class="border-b"><td class="p-2">${a.name}</td><td class="p-2">${a.district}</td><td class="p-2">${a.madrasa}</td><td class="p-2">${a.mobile}</td><td class="p-2">${a.experience}</td><td class="p-2"><button onclick="approveRep(${a.id})" class="text-green-500"><i class="fas fa-check"></i></button> <button onclick="rejectRep(${a.id})" class="text-red-500 ml-2"><i class="fas fa-times"></i></button></td></tr>`; }); document.getElementById('applicationsList').innerHTML = html || '<tr><td colspan="6" class="text-center p-4">কোনো আবেদন নেই</td></tr>'; }
    function showTab(tab) { document.getElementById('membersTab').classList.add('hidden'); document.getElementById('repsTab').classList.add('hidden'); document.getElementById('appsTab').classList.add('hidden'); document.getElementById(tab + 'Tab').classList.remove('hidden'); document.getElementById('tabMembers').classList.remove('border-emerald-600', 'text-emerald-600'); document.getElementById('tabReps').classList.remove('border-emerald-600', 'text-emerald-600'); document.getElementById('tabApps').classList.remove('border-emerald-600', 'text-emerald-600'); document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('border-emerald-600', 'text-emerald-600'); }
    function editMember(id) { alert('এডিট ফিচার শীঘ্রই আসছে'); }
    function deleteMember(id) { if(confirm('সদস্য ডিলিট করবেন?')) { members = members.filter(m => m.id !== id); renderMembers(); } }
    function removeRep(id) { if(confirm('প্রতিনিধি রিমুভ করবেন?')) { representatives = representatives.filter(r => r.id !== id); renderReps(); } }
    function approveRep(id) { const app = applications.find(a => a.id === id); if(app) { representatives.push({ id: representatives.length + 1, name: app.name, district: app.district, madrasa: app.madrasa, mobile: app.mobile, status: 'active' }); applications = applications.filter(a => a.id !== id); renderApplications(); renderReps(); alert(`${app.name} জেলা প্রতিনিধি নিযুক্ত হয়েছেন!`); } }
    function rejectRep(id) { if(confirm('আবেদনটি বাতিল করবেন?')) { applications = applications.filter(a => a.id !== id); renderApplications(); } }
    function logout() { sessionStorage.removeItem('TUKNBD_user'); localStorage.removeItem('TUKNBD_user'); window.location.href = 'login.html'; }
    renderMembers(); renderReps(); renderApplications();
</script>
</body>
</html>
