<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লগইন | TUKNBD</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans Bengali', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a2a3a 0%, #0d3b4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* হোম বাটন - উপরের ডান কর্নারে */
        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #9be564;
            color: #9be564;
            transform: translateY(-2px);
        }
        
        /* লগইন কন্টেইনার */
        .login-container {
            max-width: 340px;
            width: 100%;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* লোগো স্টাইল */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            margin-bottom: 12px;
            background: white;
            padding: 5px;
        }
        
        .logo-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }
        
        .logo-title span {
            color: #9be564;
        }
        
        /* ইনপুট ফিল্ড */
        .input-field {
            margin-bottom: 20px;
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #9be564;
            font-size: 14px;
        }

        .input-field input {
            width: 100%;
            padding: 10px 8px 10px 32px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .input-field input:focus {
            border-color: #9be564;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 3px rgba(155, 229, 100, 0.2);
        }
        
        .input-field input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }
        
        /* পাসওয়ার্ড টগল বাটন */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 13px;
        }
        
        .toggle-password:hover {
            color: #9be564;
        }
        
        /* রিমেম্বার মি ও ফরগট */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .checkbox-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #9be564;
        }
        
        .checkbox-label span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .forgot-link {
            font-size: 12px;
            color: #9be564;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .forgot-link:hover {
            color: #7bc43a;
            text-decoration: underline;
        }
        
        /* লগইন বাটন */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9be564, #7bc43a);
            color: #0a2a3a;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #7bc43a, #9be564);
            transform: scale(1.02);
        }
        
        /* টোস্ট মেসেজ */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #059669;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .toast-notification.error {
            background: #dc2626;
        }
        
        .toast-notification.warning {
            background: #d97706;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* সেন্টার নোটিফিকেশন মডাল */
        .center-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
            z-index: 1001;
            max-width: 400px;
            width: 90%;
            animation: fadeInScale 0.3s ease;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        /* মডাল স্টাইল */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            padding: 28px;
            animation: fadeInUp 0.3s ease;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #0a2a3a;
        }
        
        .modal-header button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .modal-header button:hover {
            color: #dc2626;
        }
        
        .modal input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .modal input:focus {
            outline: none;
            border-color: #9be564;
        }
        
        .modal-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0a2a3a, #0d3b4f);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        @media (max-width: 480px) {
            .login-container { max-width: 300px; }
            .login-card { padding: 25px 20px; }
            .logo-img { width: 70px; height: 70px; }
            .home-btn { top: 15px; right: 15px; padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- হোম বাটন - উপরের ডান কর্নারে -->
<a href="index.html" class="home-btn">
    <i class="fas fa-home"></i> হোম
</a>

<div class="login-container">
    <div class="login-card">
        <!-- লোগো সেন্টারে -->
        <div class="logo-area">
            <img src="images/logo.png" alt="TUKNBD Logo" class="logo-img" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <div class="logo-title">
                ত্বলাবা-উলামা <span>কল্যাণ নেটওয়ার্ক</span>
            </div>
        </div>
        
        <form id="loginForm">
            <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="সদস্য আইডি / মোবাইল নম্বর" autocomplete="off">
            </div>
            
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="পাসওয়ার্ড">
                <button type="button" id="togglePassword" class="toggle-password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>আমাকে মনে রাখুন</span>
                </label>
                <a href="#" id="forgotPasswordBtn" class="forgot-link">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> লগইন করুন
            </button>
        </form>
    </div>
</div>

<!-- ফরগট পাসওয়ার্ড মডাল -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-key mr-2"></i>পাসওয়ার্ড রিসেট</h3>
            <button id="closeForgotModal">&times;</button>
        </div>
        <p class="text-gray-600 text-sm mb-4">আপনার রেজিস্টার্ড মোবাইল নম্বর দিন। নতুন পাসওয়ার্ড: <strong>1234</strong> সেট করা হবে।</p>
        <form id="forgotForm">
            <input type="text" id="forgotMobile" placeholder="মোবাইল নম্বর (01XXXXXXXXX)">
            <button type="submit" class="modal-btn">রিসেট করুন</button>
        </form>
    </div>
</div>

<script>
const supabaseClient = window.supabaseClient;

// ==================== সেন্টার নোটিফিকেশন ====================
function showCenterNotification(message, type = 'success') {
    const existingOverlay = document.querySelector('.notification-overlay');
    if (existingOverlay) existingOverlay.remove();
    
    const overlay = document.createElement('div');
    overlay.className = 'notification-overlay';
    
    const notification = document.createElement('div');
    notification.className = 'center-notification';
    
    const bgColor = type === 'success' ? 'bg-emerald-50 border-emerald-500' : type === 'error' ? 'bg-red-50 border-red-500' : 'bg-amber-50 border-amber-500';
    const iconColor = type === 'success' ? 'text-emerald-600' : type === 'error' ? 'text-red-600' : 'text-amber-600';
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    
    notification.innerHTML = `
        <div class="p-5 ${bgColor} border-l-4 rounded-2xl">
            <div class="flex items-start gap-3">
                <i class="fas ${icon} text-2xl ${iconColor}"></i>
                <div class="flex-1">
                    <p class="text-gray-800">${message}</p>
                </div>
            </div>
            <button onclick="this.closest('.notification-overlay').remove()" class="mt-4 w-full bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition">
                ঠিক আছে
            </button>
        </div>
    `;
    
    overlay.appendChild(notification);
    document.body.appendChild(overlay);
}

// ==================== টোস্ট নোটিফিকেশন (সাইডে) ====================
function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast-notification ${type === 'error' ? 'error' : type === 'warning' ? 'warning' : ''}`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ==================== পাসওয়ার্ড টগল ====================
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

if(togglePassword) {
    togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });
}

// ==================== লগইন হ্যান্ডলার (Supabase সংস্করণ) ====================
async function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    
    if(!username || !password) {
        showCenterNotification('সদস্য আইডি/মোবাইল এবং পাসওয়ার্ড দিন!', 'error');
        return;
    }
    
    try {
        let query = supabaseClient.from('members').select('*');
        
        // মোবাইল নম্বর বা সদস্য আইডি দিয়ে সার্চ
        if(username.match(/^01[3-9]\d{8}$/)) {
            query = query.eq('mobile', username);
        } else {
            query = query.eq('member_id', username);
        }
        
        const { data, error } = await query;
        
        if(error) throw error;
        
        const member = data?.[0];
        
        if(member && member.password === password && member.status === 'approved') {
            // লগইন সফল
            const userData = { 
                id: member.member_id,
                member_id: member.member_id,
                name: member.full_name,
                mobile: member.mobile,
                email: member.email || '',
                joinDate: member.join_date,
                profileImage: 'https://placehold.co/100x100/059669/white?text=U',
                referId: member.referral_code,
                loggedIn: true,
                loginTime: new Date().toISOString()
            };
            
            if(rememberMe) {
                localStorage.setItem('TUKNBD_user', JSON.stringify(userData));
            }
            sessionStorage.setItem('TUKNBD_user', JSON.stringify(userData));
            
            showCenterNotification(`স্বাগতম ${member.full_name}!`, 'success');
            setTimeout(() => { 
                window.location.href = 'member-dashboard.html'; 
            }, 1500);
        } 
        else if(member && member.status === 'pending') {
            showCenterNotification('আপনার একাউন্ট এখনও অনুমোদিত হয়নি। অনুগ্রহ করে ৩-১২ ঘণ্টা অপেক্ষা করুন।', 'warning');
        } 
        else {
            showCenterNotification('ভুল সদস্য আইডি/মোবাইল বা পাসওয়ার্ড!', 'error');
        }
        
    } catch (error) {
        console.error('Login error:', error);
        showCenterNotification('লগইন করতে ব্যর্থ হয়েছে! নেটওয়ার্ক চেক করুন।', 'error');
    }
}

// ==================== ফরগট পাসওয়ার্ড (Supabase সংস্করণ) ====================
const forgotBtn = document.getElementById('forgotPasswordBtn');
const forgotModal = document.getElementById('forgotModal');
const closeForgotModal = document.getElementById('closeForgotModal');

if(forgotBtn) {
    forgotBtn.addEventListener('click', (e) => {
        e.preventDefault();
        forgotModal.style.display = 'flex';
    });
}

if(closeForgotModal) {
    closeForgotModal.addEventListener('click', () => {
        forgotModal.style.display = 'none';
    });
}

window.addEventListener('click', (e) => {
    if(e.target === forgotModal) forgotModal.style.display = 'none';
});

const forgotForm = document.getElementById('forgotForm');
if(forgotForm) {
    forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const mobile = document.getElementById('forgotMobile').value.trim();
        
        if(!mobile || !mobile.match(/^01[3-9]\d{8}$/)) {
            showCenterNotification('সঠিক মোবাইল নম্বর দিন (01XXXXXXXXX)', 'error');
            return;
        }
        
        try {
            // চেক করুন এই মোবাইলে সদস্য আছে কিনা
            const { data, error } = await supabaseClient
                .from('members')
                .select('member_id, full_name, mobile, status')
                .eq('mobile', mobile)
                .single();
            
            if(data) {
                // পাসওয়ার্ড রিসেট করুন 1234
                const { error: updateError } = await supabaseClient
                    .from('members')
                    .update({ password: '1234' })
                    .eq('mobile', mobile);
                
                if(updateError) throw updateError;
                
                showCenterNotification('পাসওয়ার্ড রিসেট করা হয়েছে। নতুন পাসওয়ার্ড: 1234', 'success');
            } else {
                showCenterNotification('এই মোবাইল নম্বরে কোনো অ্যাকাউন্ট নেই।', 'error');
            }
        } catch (error) {
            console.error('Reset error:', error);
            showCenterNotification('পাসওয়ার্ড রিসেট করতে ব্যর্থ হয়েছে!', 'error');
        }
        
        forgotModal.style.display = 'none';
        document.getElementById('forgotMobile').value = '';
    });
}

// ==================== ফর্ম ইভেন্ট লিসেনার ====================
const loginForm = document.getElementById('loginForm');
if(loginForm) loginForm.addEventListener('submit', handleLogin);

// ==================== ইতিমধ্যে লগইন করা থাকলে redirect ====================
window.addEventListener('DOMContentLoaded', function() {
    const savedUser = sessionStorage.getItem('TUKNBD_user') || localStorage.getItem('TUKNBD_user');
    if(savedUser) {
        try {
            const user = JSON.parse(savedUser);
            if(user.loggedIn) {
                window.location.href = 'member-dashboard.html';
            }
        } catch(e) {}
    }
});
</script>

</body>
</html>
