<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লগইন | TUKNBD</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-functions.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans Bengali', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a2a3a 0%, #0d3b4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* হোম বাটন - উপরের ডান কর্নারে */
        .home-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: #9be564;
            color: #9be564;
            transform: translateY(-2px);
        }
        
        /* লগইন কন্টেইনার */
        .login-container {
            max-width: 340px;
            width: 100%;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
        }
        
        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* লোগো স্টাইল */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            margin-bottom: 12px;
            background: white;
            padding: 5px;
        }
        
        .logo-title {
            font-size: 16px;
            font-weight: 700;
            color: white;
        }
        
        .logo-title span {
            color: #9be564;
        }
        
        /* ইনপুট ফিল্ড - ডান ও বাম পাশ ১/২ ইঞ্চি কম */
        .input-field {
            margin-bottom: 20px;
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #9be564;
            font-size: 14px;
        }

        .input-field input {
            width: 100%;
            padding: 10px 8px 10px 32px;  /* ← এখানে পরিবর্তন */
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .input-field input:focus {
            border-color: #9be564;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 3px rgba(155, 229, 100, 0.2);
        }
        
        .input-field input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }
        
        /* পাসওয়ার্ড টগল বাটন */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 13px;
        }
        
        .toggle-password:hover {
            color: #9be564;
        }
        
        /* রিমেম্বার মি ও ফরগট */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .checkbox-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #9be564;
        }
        
        .checkbox-label span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .forgot-link {
            font-size: 12px;
            color: #9be564;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .forgot-link:hover {
            color: #7bc43a;
            text-decoration: underline;
        }
        
        /* লগইন বাটন */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #9be564, #7bc43a);
            color: #0a2a3a;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #7bc43a, #9be564);
            transform: scale(1.02);
        }
        
        /* টোস্ট মেসেজ */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #059669;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .toast-notification.error {
            background: #dc2626;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* মডাল স্টাইল */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            padding: 28px;
            animation: fadeInUp 0.3s ease;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #0a2a3a;
        }
        
        .modal-header button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .modal-header button:hover {
            color: #dc2626;
        }
        
        .modal input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .modal input:focus {
            outline: none;
            border-color: #9be564;
        }
        
        .modal-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0a2a3a, #0d3b4f);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        @media (max-width: 480px) {
            .login-container { max-width: 300px; }
            .login-card { padding: 25px 20px; }
            .logo-img { width: 70px; height: 70px; }
            .home-btn { top: 15px; right: 15px; padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- হোম বাটন - উপরের ডান কর্নারে -->
<a href="index.html" class="home-btn">
    <i class="fas fa-home"></i> হোম
</a>

<div class="login-container">
    <div class="login-card">
        <!-- লোগো সেন্টারে -->
        <div class="logo-area">
            <img src="images/logo.png" alt="TUKNBD Logo" class="logo-img" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <div class="logo-title">
                ত্বলাবা-উলামা <span>কল্যাণ নেটওয়ার্ক</span>
            </div>
        </div>
        
        <form id="loginForm">
            <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="ইউজারনেম / আইডি / মোবাইল" autocomplete="off">
            </div>
            
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="পাসওয়ার্ড">
                <button type="button" id="togglePassword" class="toggle-password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>আমাকে মনে রাখুন</span>
                </label>
                <a href="#" id="forgotPasswordBtn" class="forgot-link">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> লগইন করুন
            </button>
        </form>
    </div>
</div>

<!-- ফরগট পাসওয়ার্ড মডাল -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-key mr-2"></i>পাসওয়ার্ড রিসেট</h3>
            <button id="closeForgotModal">&times;</button>
        </div>
        <p class="text-gray-600 text-sm mb-4">আপনার রেজিস্টার্ড মোবাইল নম্বর দিন। নতুন পাসওয়ার্ড: 1234 সেট করা হবে।</p>
        <form id="forgotForm">
            <input type="text" id="forgotMobile" placeholder="মোবাইল নম্বর">
            <button type="submit" class="modal-btn">রিসেট করুন</button>
        </form>
    </div>
</div>

<script>
    // ==================== টোস্ট নোটিফিকেশন ====================
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${type === 'error' ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ==================== পাসওয়ার্ড টগল ====================
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    if(togglePassword) {
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
    }
    
    // ==================== ইউজার ডাটা লোড ====================
    let users = [];
    
    function getMembers() {
        return JSON.parse(localStorage.getItem('tukn_members') || '[]');
    }
    
    function loadUsersFromLocalStorage() {
        const saved = localStorage.getItem('tukn_users');
        if(saved) {
            users = JSON.parse(saved);
        } else {
            users = [];
            saveUsersToLocalStorage();
        }
    }
    
    function saveUsersToLocalStorage() {
        localStorage.setItem('tukn_users', JSON.stringify(users));
    }
    
    function syncMemberToUsers(member) {
        let currentUsers = JSON.parse(localStorage.getItem('tukn_users') || '[]');
        const existing = currentUsers.find(u => u.mobile === member.mobile || u.id === member.id);
        
        if (!existing) {
            const newUser = {
                id: member.id,
                mobile: member.mobile,
                name: member.fullName || member.name,
                password: member.password || '1234',
                status: member.status || 'active',
                joinDate: member.joinDate || new Date().toISOString(),
                profileImage: 'https://randomuser.me/api/portraits/men/default.jpg',
                referId: member.referralCode || member.referId || 'TUKN-REF-' + Math.floor(Math.random() * 10000)
            };
            currentUsers.push(newUser);
            localStorage.setItem('tukn_users', JSON.stringify(currentUsers));
            users = currentUsers;
            return true;
        }
        return false;
    }
    
    function syncAllActiveMembers() {
        const members = getMembers();
        const activeMembers = members.filter(m => m.status === 'active');
        activeMembers.forEach(member => syncMemberToUsers(member));
    }
    
    // ==================== লগইন হ্যান্ডলার ====================
    function handleLogin(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        
        if(!username || !password) {
            showToast('ইউজারনেম এবং পাসওয়ার্ড দিন!', 'error');
            return;
        }
        
        // প্রথমে tukn_members চেক করুন
        const members = getMembers();
        let member = members.find(m => m.mobile === username || m.id === username);
        let user = null;
        
        if(member && member.password === password && member.status === 'active') {
            syncMemberToUsers(member);
            user = {
                id: member.id,
                name: member.fullName || member.name,
                mobile: member.mobile,
                joinDate: member.joinDate || new Date().toISOString(),
                profileImage: 'https://randomuser.me/api/portraits/men/default.jpg',
                referId: member.referralCode || member.referId,
                loggedIn: true,
                loginTime: new Date().toISOString()
            };
        } else if(member && member.password === password && member.status !== 'active') {
            showToast('আপনার অ্যাকাউন্ট এখনও অনুমোদিত হয়নি।', 'error');
            return;
        } else {
            user = users.find(u => u.mobile === username || u.id === username);
            if(user && user.password !== password) user = null;
            if(user && user.status !== 'active') user = null;
        }
        
        if(user) {
            const userData = { 
                id: user.id, 
                name: user.name, 
                mobile: user.mobile, 
                joinDate: user.joinDate, 
                profileImage: user.profileImage, 
                referId: user.referId, 
                loggedIn: true, 
                loginTime: new Date().toISOString() 
            };
            
            if(rememberMe) {
                localStorage.setItem('TUKNBD_user', JSON.stringify(userData));
            }
            sessionStorage.setItem('TUKNBD_user', JSON.stringify(userData));
            
            showToast(`স্বাগতম ${user.name}!`, 'success');
            setTimeout(() => { window.location.href = 'member-dashboard.html'; }, 1000);
        } else {
            showToast('ভুল ইউজারনেম বা পাসওয়ার্ড!', 'error');
        }
    }
    
    // ==================== ফরগট পাসওয়ার্ড ====================
    const forgotBtn = document.getElementById('forgotPasswordBtn');
    const forgotModal = document.getElementById('forgotModal');
    const closeForgotModal = document.getElementById('closeForgotModal');
    
    if(forgotBtn) {
        forgotBtn.addEventListener('click', (e) => {
            e.preventDefault();
            forgotModal.style.display = 'flex';
        });
    }
    
    if(closeForgotModal) {
        closeForgotModal.addEventListener('click', () => {
            forgotModal.style.display = 'none';
        });
    }
    
    window.addEventListener('click', (e) => {
        if(e.target === forgotModal) forgotModal.style.display = 'none';
    });
    
    const forgotForm = document.getElementById('forgotForm');
    if(forgotForm) {
        forgotForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const mobile = document.getElementById('forgotMobile').value.trim();
            
            const members = getMembers();
            let member = members.find(m => m.mobile === mobile);
            
            if(member) {
                member.password = '1234';
                localStorage.setItem('tukn_members', JSON.stringify(members));
                showToast('পাসওয়ার্ড রিসেট করা হয়েছে। নতুন পাসওয়ার্ড: 1234', 'success');
            } else {
                const user = users.find(u => u.mobile === mobile);
                if(user) {
                    user.password = '1234';
                    saveUsersToLocalStorage();
                    showToast('পাসওয়ার্ড রিসেট করা হয়েছে। নতুন পাসওয়ার্ড: 1234', 'success');
                } else {
                    showToast('এই মোবাইল নম্বরে কোনো অ্যাকাউন্ট নেই।', 'error');
                }
            }
            forgotModal.style.display = 'none';
            document.getElementById('forgotMobile').value = '';
        });
    }
    
    const loginForm = document.getElementById('loginForm');
    if(loginForm) loginForm.addEventListener('submit', handleLogin);
    
    // ==================== পেজ লোড ====================
    window.addEventListener('DOMContentLoaded', function() {
        loadUsersFromLocalStorage();
        syncAllActiveMembers();
        
        const savedUser = sessionStorage.getItem('TUKNBD_user') || localStorage.getItem('TUKNBD_user');
        if(savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if(user.loggedIn) window.location.href = 'member-dashboard.html';
            } catch(e) {}
        }
    });
</script>

</body>
</html>
