<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <div class="p-4 space-y-4">
            <div class="bg-emerald-100 p-3 rounded flex justify-between"><span>💰 বাকি: ১০০০ টি</span><span>📢 ২টি নোটিশ</span></div>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-emerald-600 text-white p-3 rounded">💰 পে</button>
                <button class="bg-blue-600 text-white p-3 rounded">⚠️ বকেয়া</button>
                <button class="bg-yellow-600 text-white p-3 rounded">📢 নোটিশ</button>
                <button class="bg-purple-600 text-white p-3 rounded">👤 প্রোফাইল</button>
                <button class="bg-gray-700 text-white p-3 rounded col-span-2">🪪 আইডি কার্ড</button>
            </div>
        </div>
        <div class="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around py-2">
            <i class="fas fa-home text-emerald-600"></i><i class="fas fa-money-bill-wave"></i><i class="fas fa-bell"></i><i class="fas fa-user"></i>
        </div>
    </div>
</body>
</html>
