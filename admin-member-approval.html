<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য অনুমোদন প্যানেল | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-approved { background-color: #d1fae5; color: #059669; }
        .status-rejected { background-color: #fee2e2; color: #dc2626; }
    </style>
</head>
<body class="bg-gray-100">

<div class="container mx-auto px-4 py-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-emerald-700">👨‍💼 সদস্য অনুমোদন প্যানেল</h1>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">লগআউট</button>
    </div>

    <!-- ট্যাব -->
    <div class="flex gap-2 mb-6 border-b">
        <button onclick="showTab('pending')" id="tabPending" class="px-4 py-2 text-emerald-600 border-b-2 border-emerald-600 font-semibold">⏳ পেন্ডিং ({pendingCount})</button>
        <button onclick="showTab('approved')" id="tabApproved" class="px-4 py-2 text-gray-600 hover:text-emerald-600">✅ অনুমোদিত</button>
        <button onclick="showTab('rejected')" id="tabRejected" class="px-4 py-2 text-gray-600 hover:text-emerald-600">❌ বাতিল</button>
    </div>

    <!-- পেন্ডিং ট্যাব -->
    <div id="pendingTab">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-emerald-50 px-5 py-3 border-b"><h3 class="font-bold">⏳ অনুমোদনের অপেক্ষায় থাকা আবেদন</h3></div>
            <div class="overflow-x-auto p-4" id="pendingList"></div>
        </div>
    </div>

    <!-- অনুমোদিত ট্যাব -->
    <div id="approvedTab" class="hidden">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-emerald-50 px-5 py-3 border-b"><h3 class="font-bold">✅ অনুমোদিত সদস্য</h3></div>
            <div class="overflow-x-auto p-4" id="approvedList"></div>
        </div>
    </div>

    <!-- বাতিল ট্যাব -->
    <div id="rejectedTab" class="hidden">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-emerald-50 px-5 py-3 border-b"><h3 class="font-bold">❌ বাতিল আবেদন</h3></div>
            <div class="overflow-x-auto p-4" id="rejectedList"></div>
        </div>
    </div>
</div>

<!-- অনুমোদন মডাল -->
<div id="approveModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6">
        <h3 class="text-xl font-bold text-emerald-700 mb-4">সদস্য অনুমোদন</h3>
        <p>সদস্য: <span id="approveMemberName"></span></p>
        <p>মোবাইল: <span id="approveMemberMobile"></span></p>
        <div class="mt-4">
            <label class="block font-semibold mb-1">ইউনিক আইডি:</label>
            <input type="text" id="generatedMemberId" readonly class="w-full px-3 py-2 bg-gray-100 border rounded-lg font-mono">
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="closeApproveModal()" class="flex-1 bg-gray-300 py-2 rounded-lg">বাতিল</button>
            <button onclick="confirmApprove()" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg">অনুমোদন করুন</button>
        </div>
    </div>
</div>

<!-- বাতিল মডাল -->
<div id="rejectModal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6">
        <h3 class="text-xl font-bold text-red-600 mb-4">আবেদন বাতিল</h3>
        <p>সদস্য: <span id="rejectMemberName"></span></p>
        <div class="mt-4">
            <label class="block font-semibold mb-1">বাতিলের কারণ <span class="text-red-500">*</span></label>
            <textarea id="rejectReason" rows="3" class="w-full px-3 py-2 border rounded-lg" placeholder="কেন এই আবেদন বাতিল করা হচ্ছে?"></textarea>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="closeRejectModal()" class="flex-1 bg-gray-300 py-2 rounded-lg">বাতিল</button>
            <button onclick="confirmReject()" class="flex-1 bg-red-600 text-white py-2 rounded-lg">বাতিল করুন</button>
        </div>
    </div>
</div>

<script>
    // ডেমো আবেদন ডাটা
    let applications = [
        { id: 1, name: "আব্দুল্লাহ আল মামুন", mobile: "01812345678", district: "ঢাকা", madrasa: "জামিয়া কাসেমিয়া", appliedDate: "2026-04-10", status: "pending", rejectReason: null, memberId: null },
        { id: 2, name: "ফাতেমা বেগম", mobile: "01798765432", district: "চট্টগ্রাম", madrasa: "মাদ্রাসাতুল বনাত", appliedDate: "2026-04-09", status: "pending", rejectReason: null, memberId: null },
        { id: 3, name: "মোহাম্মদ আলী", mobile: "01911223344", district: "রাজশাহী", madrasa: "মাদ্রাসা তায়্যিবা", appliedDate: "2026-04-08", status: "approved", rejectReason: null, memberId: "260408-00001" }
    ];

    let currentApplication = null;
    let currentRejectApp = null;

    // ইউনিক আইডি জেনারেট ফাংশন
    function generateMemberId() {
        const today = new Date();
        const year = today.getFullYear().toString().slice(-2);
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const dateCode = `${year}${month}${day}`;
        
        // আজকের তারিখে কতটি অনুমোদন হয়েছে তা গণনা
        const approvedToday = applications.filter(app => app.status === 'approved' && app.memberId && app.memberId.startsWith(dateCode)).length;
        const sequence = String(approvedToday + 1).padStart(5, '0');
        
        return `${dateCode}-${sequence}`;
    }

    function renderLists() {
        const pendingApps = applications.filter(a => a.status === 'pending');
        const approvedApps = applications.filter(a => a.status === 'approved');
        const rejectedApps = applications.filter(a => a.status === 'rejected');
        
        document.getElementById('tabPending').innerHTML = `⏳ পেন্ডিং (${pendingApps.length})`;
        
        // পেন্ডিং লিস্ট
        let pendingHtml = `<table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="p-2">নাম</th><th class="p-2">মোবাইল</th><th class="p-2">জেলা</th><th class="p-2">মাদ্রাসা</th><th class="p-2">আবেদনের তারিখ</th><th class="p-2">অ্যাকশন</th></tr></thead><tbody>`;
        pendingApps.forEach(app => {
            pendingHtml += `<tr class="border-b"><td class="p-2">${app.name}</td><td class="p-2">${app.mobile}</td><td class="p-2">${app.district}</td><td class="p-2">${app.madrasa}</td><td class="p-2">${app.appliedDate}</td>
            <td class="p-2"><button onclick="openApproveModal(${app.id})" class="bg-green-500 text-white px-2 py-1 rounded text-sm mr-1"><i class="fas fa-check"></i> অনুমোদন</button>
            <button onclick="openRejectModal(${app.id})" class="bg-red-500 text-white px-2 py-1 rounded text-sm"><i class="fas fa-times"></i> বাতিল</button></td></tr>`;
        });
        pendingHtml += `</tbody></table>`;
        if(pendingApps.length === 0) pendingHtml = '<div class="text-center text-gray-400 py-8">কোনো পেন্ডিং আবেদন নেই</div>';
        document.getElementById('pendingList').innerHTML = pendingHtml;
        
        // অনুমোদিত লিস্ট
        let approvedHtml = `<table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="p-2">সদস্য আইডি</th><th class="p-2">নাম</th><th class="p-2">মোবাইল</th><th class="p-2">জেলা</th><th class="p-2">অনুমোদনের তারিখ</th></tr></thead><tbody>`;
        approvedApps.forEach(app => {
            approvedHtml += `<tr class="border-b"><td class="p-2 font-mono font-bold text-emerald-700">${app.memberId}</td><td class="p-2">${app.name}</td><td class="p-2">${app.mobile}</td><td class="p-2">${app.district}</td><td class="p-2">${app.appliedDate}</td></tr>`;
        });
        approvedHtml += `</tbody></table>`;
        if(approvedApps.length === 0) approvedHtml = '<div class="text-center text-gray-400 py-8">কোনো অনুমোদিত সদস্য নেই</div>';
        document.getElementById('approvedList').innerHTML = approvedHtml;
        
        // বাতিল লিস্ট
        let rejectedHtml = `<table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="p-2">নাম</th><th class="p-2">মোবাইল</th><th class="p-2">বাতিলের কারণ</th><th class="p-2">তারিখ</th></tr></thead><tbody>`;
        rejectedApps.forEach(app => {
            rejectedHtml += `<tr class="border-b"><td class="p-2">${app.name}</td><td class="p-2">${app.mobile}</td><td class="p-2 text-red-600">${app.rejectReason}</td><td class="p-2">${app.appliedDate}</td></tr>`;
        });
        rejectedHtml += `</tbody></table>`;
        if(rejectedApps.length === 0) rejectedHtml = '<div class="text-center text-gray-400 py-8">কোনো বাতিল আবেদন নেই</div>';
        document.getElementById('rejectedList').innerHTML = rejectedHtml;
    }

    function openApproveModal(id) {
        currentApplication = applications.find(a => a.id === id);
        if(currentApplication) {
            document.getElementById('approveMemberName').innerHTML = currentApplication.name;
            document.getElementById('approveMemberMobile').innerHTML = currentApplication.mobile;
            document.getElementById('generatedMemberId').value = generateMemberId();
            document.getElementById('approveModal').classList.remove('hidden');
            document.getElementById('approveModal').classList.add('flex');
        }
    }

    function closeApproveModal() {
        document.getElementById('approveModal').classList.add('hidden');
        document.getElementById('approveModal').classList.remove('flex');
        currentApplication = null;
    }

    function confirmApprove() {
        if(currentApplication) {
            const newMemberId = document.getElementById('generatedMemberId').value;
            currentApplication.status = 'approved';
            currentApplication.memberId = newMemberId;
            alert(`${currentApplication.name} কে অনুমোদন দেওয়া হয়েছে!\nসদস্য আইডি: ${newMemberId}`);
            closeApproveModal();
            renderLists();
        }
    }

    function openRejectModal(id) {
        currentRejectApp = applications.find(a => a.id === id);
        if(currentRejectApp) {
            document.getElementById('rejectMemberName').innerHTML = currentRejectApp.name;
            document.getElementById('rejectReason').value = '';
            document.getElementById('rejectModal').classList.remove('hidden');
            document.getElementById('rejectModal').classList.add('flex');
        }
    }

    function closeRejectModal() {
        document.getElementById('rejectModal').classList.add('hidden');
        document.getElementById('rejectModal').classList.remove('flex');
        currentRejectApp = null;
    }

    function confirmReject() {
        const reason = document.getElementById('rejectReason').value.trim();
        if(!reason) {
            alert('দয়া করে বাতিলের কারণ উল্লেখ করুন');
            return;
        }
        if(currentRejectApp) {
            currentRejectApp.status = 'rejected';
            currentRejectApp.rejectReason = reason;
            alert(`${currentRejectApp.name} এর আবেদন বাতিল করা হয়েছে।\nকারণ: ${reason}`);
            closeRejectModal();
            renderLists();
        }
    }

    function showTab(tab) {
        document.getElementById('pendingTab').classList.add('hidden');
        document.getElementById('approvedTab').classList.add('hidden');
        document.getElementById('rejectedTab').classList.add('hidden');
        document.getElementById(tab + 'Tab').classList.remove('hidden');
        
        document.getElementById('tabPending').classList.remove('border-emerald-600', 'text-emerald-600');
        document.getElementById('tabApproved').classList.remove('border-emerald-600', 'text-emerald-600');
        document.getElementById('tabRejected').classList.remove('border-emerald-600', 'text-emerald-600');
        document.getElementById('tabPending').classList.add('text-gray-600');
        document.getElementById('tabApproved').classList.add('text-gray-600');
        document.getElementById('tabRejected').classList.add('text-gray-600');
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('border-emerald-600', 'text-emerald-600');
    }

    function logout() { window.location.href = 'login.html'; }

    renderLists();
</script>
</body>
</html>
