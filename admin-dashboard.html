<!DOCTYPE html>
<html><head><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body class="bg-gray-100 p-6">
<div class="max-w-7xl mx-auto">
    <h1 class="text-2xl font-bold">অ্যাডমিন ড্যাশবোর্ড</h1>
    <div class="grid md:grid-cols-5 gap-4 my-6">
        <div class="bg-white p-4 shadow">মোট সদস্য: ১২,৫৪০</div>
        <div class="bg-white p-4 shadow">সক্রিয়: ১০,২০০</div>
        <div class="bg-white p-4 shadow">আজকের কালেকশন: ২৫,০০০ টি</div>
        <div class="bg-white p-4 shadow">মাসিক কালেকশন: ২,৩০,০০০ টি</div>
        <div class="bg-white p-4 shadow">বকেয়া সদস্য: ১,২০০</div>
    </div>
    <div class="grid md:grid-cols-2 gap-6">
        <canvas id="incomeChart" class="bg-white p-4 shadow"></canvas>
        <canvas id="growthChart" class="bg-white p-4 shadow"></canvas>
    </div>
    <div class="mt-8 bg-white p-4 shadow"><h3>মেম্বার ম্যানেজমেন্ট</h3><button class="bg-blue-500 text-white p-2 rounded">+ নতুন সদস্য</button> <input placeholder="অনুসন্ধান..." class="border p-2"></div>
    <div class="mt-4 bg-white p-4 shadow"><h3>পেমেন্ট ম্যানেজমেন্ট</h3><button class="bg-green-600 text-white p-2 rounded">📎 Excel রিপোর্ট ডাউনলোড</button></div>
    <div class="mt-4 bg-white p-4 shadow"><h3>নোটিশ ম্যানেজমেন্ট</h3><button class="bg-yellow-500 p-2 rounded">+ নোটিশ যোগ করুন</button></div>
</div>
<script>
    new Chart(document.getElementById('incomeChart'), { type: 'line', data: { labels: ['জানু', 'ফেব্রু', 'মার্চ'], datasets: [{ label: 'আয় (টাকা)', data: [150000,200000,230000] }] } });
    new Chart(document.getElementById('growthChart'), { type: 'bar', data: { labels: ['২০২৩','২০২৪','২০২৫'], datasets: [{ label: 'সদস্য সংখ্যা', data: [8000,10500,12540] }] } });
</script>
</body>
</html>
