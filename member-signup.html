<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য নিবন্ধন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .watermark-container {
            position: relative;
            min-height: 100vh;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .watermark-container::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background-image: url('images/logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }
        .watermark-content {
            position: relative;
            z-index: 1;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.2);
        }
        .id-preview {
            font-size: 13px;
            color: #059669;
            margin-top: 8px;
            padding: 8px;
            background: #f0fdf4;
            border-radius: 8px;
        }
        .center-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
            z-index: 1001;
            max-width: 500px;
            width: 90%;
            animation: fadeInScale 0.3s ease;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .copy-btn {
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: #059669;
            color: white;
        }
    </style>
</head>
<body class="watermark-container">

<div class="watermark-content min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-lg object-cover" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h1 class="text-3xl font-bold text-emerald-700 mt-4">ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</h1>
            <p class="text-gray-600 mt-2">সদস্য নিবন্ধন ফর্ম</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <form id="signupForm" class="space-y-6">
                <div class="bg-amber-50 p-4 rounded-lg border border-amber-200">
                    <h3 class="text-lg font-bold text-amber-700 mb-3"><i class="fas fa-code-branch mr-2"></i>রেফারেল কোড (যদি থাকে)</h3>
                    <input type="text" id="referCode" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="যেমন: TUKN-REF-123456">
                </div>

                <div class="border-b border-gray-200 pb-4">
                    <h3 class="text-xl font-bold text-emerald-700 mb-4"><i class="fas fa-user-circle mr-2"></i>ব্যক্তিগত তথ্য</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-gray-700 font-semibold mb-1">পূর্ণ নাম <span class="text-red-500">*</span></label><input type="text" id="fullName" required class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">পিতার নাম</label><input type="text" id="fatherName" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">মাতার নাম</label><input type="text" id="motherName" class="w-full px-3 py-2 border rounded-lg"></div>
                        
                        <div class="border border-gray-200 rounded-lg p-3 bg-gray-50">
                            <label class="block text-gray-700 font-semibold mb-1">পরিচয়পত্রের ধরন <span class="text-red-500">*</span></label>
                            <div class="flex gap-4 mb-2">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="idType" value="জন্মনিবন্ধন" checked class="w-4 h-4 text-emerald-600"><span class="text-sm">জন্মনিবন্ধন</span></label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="idType" value="এনআইডি" class="w-4 h-4 text-emerald-600"><span class="text-sm">জাতীয় পরিচয়পত্র</span></label>
                            </div>
                            <input type="text" id="idNumber" class="w-full px-3 py-2 border rounded-lg" placeholder="জন্মনিবন্ধন/এনআইডি নম্বর">
                        </div>
                        
                        <div><label class="block text-gray-700 font-semibold mb-1">মোবাইল (হোয়াটসঅ্যাপ) <span class="text-red-500">*</span></label><input type="tel" id="mobile" required class="w-full px-3 py-2 border rounded-lg" placeholder="01XXXXXXXXX"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">মোবাইল (টেলিগ্রাম)</label><input type="tel" id="telegram" class="w-full px-3 py-2 border rounded-lg" placeholder="01XXXXXXXXX"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">ইমেইল</label><input type="email" id="email" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">জন্ম তারিখ</label><input type="date" id="dob" class="w-full px-3 py-2 border rounded-lg"></div>
                    </div>
                </div>

                <div class="border-b border-gray-200 pb-4">
                    <h3 class="text-xl font-bold text-emerald-700 mb-4"><i class="fas fa-home mr-2"></i>বর্তমান ঠিকানা</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-gray-700 font-semibold mb-1">গ্রাম/মহল্লা <span class="text-red-500">*</span></label><input type="text" id="presentVillage" required class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">ডাকঘর <span class="text-red-500">*</span></label><input type="text" id="presentPostOffice" required class="w-full px-3 py-2 border rounded-lg"></div>

                        <div><label class="block text-gray-700 font-semibold mb-1">বিভাগ <span class="text-red-500">*</span></label>

                                <option value="রাজশাহী">রাজশাহী</option><option value="খুলনা">খুলনা</option>
                                <option value="বরিশাল">বরিশাল</option><option value="সিলেট">সিলেট</option>
                                <option value="রংপুর">রংপুর</option><option value="ময়মনসিংহ">ময়মনসিংহ</option>
                            </select>
                        </div>
                        <div><label class="block text-gray-700 font-semibold mb-1">জেলা <span class="text-red-500">*</span></label>
                            <select id="presentDistrict" required class="w-full px-3 py-2 border rounded-lg"><option value="">প্রথমে বিভাগ নির্বাচন করুন</option></select>
                        </div>
                        <div class="md:col-span-2"><label class="block text-gray-700 font-semibold mb-1">বিস্তারিত ঠিকানা</label><textarea id="presentDetails" rows="2" class="w-full px-3 py-2 border rounded-lg" placeholder="বাড়ি নং, রোড, সেক্টর ইত্যাদি..."></textarea></div>
                    </div>
                </div>

                <div class="border-b border-gray-200 pb-4">
                    <div class="flex flex-wrap justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-emerald-700"><i class="fas fa-map-marker-alt mr-2"></i>স্থায়ী ঠিকানা</h3>
                        <label class="flex items-center gap-2 cursor-pointer bg-gray-100 px-3 py-1 rounded-lg"><input type="checkbox" id="sameAsPresent" class="w-4 h-4"><span class="text-sm font-medium text-gray-700">বর্তমান ঠিকানার মতোই</span></label>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-gray-700 font-semibold mb-1">গ্রাম/মহল্লা</label><input type="text" id="permanentVillage" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">ডাকঘর</label><input type="text" id="permanentPostOffice" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">থানা/উপজেলা</label><input type="text" id="permanentThana" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">বিভাগ</label>
                            <select id="permanentDivision" class="w-full px-3 py-2 border rounded-lg">
                                <option value="">বিভাগ নির্বাচন করুন</option>
                                <option value="ঢাকা">ঢাকা</option><option value="চট্টগ্রাম">চট্টগ্রাম</option>
                                <option value="রাজশাহী">রাজশাহী</option><option value="খুলনা">খুলনা</option>
                                <option value="বরিশাল">বরিশাল</option><option value="সিলেট">সিলেট</option>
                                <option value="রংপুর">রংপুর</option><option value="ময়মনসিংহ">ময়মনসিংহ</option>
                            </select>
                        </div>
                        <div><label class="block text-gray-700 font-semibold mb-1">জেলা</label><select id="permanentDistrict" class="w-full px-3 py-2 border rounded-lg"><option value="">প্রথমে বিভাগ নির্বাচন করুন</option></select></div>
                        <div class="md:col-span-2"><label class="block text-gray-700 font-semibold mb-1">বিস্তারিত ঠিকানা</label><textarea id="permanentDetails" rows="2" class="w-full px-3 py-2 border rounded-lg"></textarea></div>
                    </div>
                </div>

                <div class="border-b border-gray-200 pb-4">
                    <h3 class="text-xl font-bold text-emerald-700 mb-4"><i class="fas fa-id-card mr-2"></i>সদস্য তথ্য</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-gray-700 font-semibold mb-1">সদস্য মেয়াদ <span class="text-red-500">*</span></label>
                            <select id="memberTerm" required class="w-full px-3 py-2 border rounded-lg">
                                <option value="0">সাধারণ সদস্য (মেয়াদহীন)</option>
                                <option value="3">৩ বছর মেয়াদী</option>
                                <option value="5">৫ বছর মেয়াদী</option>
                                <option value="7">৭ বছর মেয়াদী</option>
                                <option value="10">১০ বছর মেয়াদী</option>
                                <option value="12">১২ বছর মেয়াদী</option>
                                <option value="15">১৫ বছর মেয়াদী</option>
                            </select>
                        </div>
                        <div><label class="block text-gray-700 font-semibold mb-1">মাসিক সঞ্চয় <span class="text-red-500">*</span></label>
                            <select id="monthlySavings" required class="w-full px-3 py-2 border rounded-lg">
                                <option value="100">১০০ টাকা</option><option value="200">২০০ টাকা</option>
                                <option value="300">৩০০ টাকা</option><option value="400">৪০০ টাকা</option>
                                <option value="500" selected>৫০০ টাকা</option><option value="600">৬০০ টাকা</option>
                                <option value="700">৭০০ টাকা</option><option value="800">৮০০ টাকা</option>
                                <option value="900">৯০০ টাকা</option><option value="1000">১০০০ টাকা</option>
                            </select>
                        </div>
                        <div><label class="block text-gray-700 font-semibold mb-1">পেশা</label><input type="text" id="profession" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">শিক্ষাগত যোগ্যতা</label><input type="text" id="education" class="w-full px-3 py-2 border rounded-lg"></div>
                    </div>
                    <div class="id-preview" id="idPreview">
                        <i class="fas fa-id-card"></i> আপনার আইডি হবে: <strong>লোড হচ্ছে...</strong>
                    </div>
                </div>

                <div class="pb-4">
                    <h3 class="text-xl font-bold text-emerald-700 mb-4"><i class="fas fa-user-friends mr-2"></i>নমিনির তথ্য <span class="text-sm text-gray-500">(ঐচ্ছিক)</span></h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-gray-700 font-semibold mb-1">নমিনির নাম</label><input type="text" id="nomineeName" class="w-full px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-gray-700 font-semibold mb-1">সম্পর্ক</label>
                            <select id="nomineeRelation" class="w-full px-3 py-2 border rounded-lg">
                                <option value="">নির্বাচন করুন</option>
                                <option>পিতা</option><option>মাতা</option><option>স্বামী</option>
                                <option>স্ত্রী</option><option>পুত্র</option><option>কন্যা</option>
                                <option>ভাই</option><option>বোন</option>
                            </select>
                        </div>
                        <div class="md:col-span-2"><label class="block text-gray-700 font-semibold mb-1">জন্মনিবন্ধন/এনআইডি</label><input type="text" id="nomineeNid" class="w-full px-3 py-2 border rounded-lg"></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 transition text-lg font-semibold">
                    <i class="fas fa-paper-plane mr-2"></i>নিবন্ধন জমা দিন

            </form>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">© ২০২৬ ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</p>
    </div>
</div>

<script>
const supabaseClient = window.supabaseClient;

const divisions = {
    "ঢাকা": ["ঢাকা", "গাজীপুর", "নারায়ণগঞ্জ", "টাঙ্গাইল", "কিশোরগঞ্জ", "মানিকগঞ্জ", "মুন্সীগঞ্জ", "নরসিংদী", "ফরিদপুর", "গোপালগঞ্জ", "মাদারীপুর", "রাজবাড়ী", "শরীয়তপুর"],
    "চট্টগ্রাম": ["চট্টগ্রাম", "কক্সবাজার", "রাঙ্গামাটি", "বান্দরবান", "খাগড়াছড়ি", "কুমিল্লা", "ফেনী", "ব্রাহ্মণবাড়িয়া", "নোয়াখালী", "লক্ষ্মীপুর", "চাঁদপুর"],
    "রাজশাহী": ["রাজশাহী", "চাঁপাইনবাবগঞ্জ", "নাটোর", "নওগাঁ", "পাবনা", "সিরাজগঞ্জ", "বগুড়া", "জয়পুরহাট"],
    "খুলনা": ["খুলনা", "বাগেরহাট", "চুয়াডাঙ্গা", "যশোর", "ঝিনাইদহ", "মাগুরা", "নড়াইল", "সাতক্ষীরা", "কুষ্টিয়া", "মেহেরপুর"],
    "বরিশাল": ["বরিশাল", "বরগুনা", "ভোলা", "ঝালকাঠি", "পটুয়াখালী", "পিরোজপুর"],
    "সিলেট": ["সিলেট", "মৌলভীবাজার", "হবিগঞ্জ", "সুনামগঞ্জ"],
    "রংপুর": ["রংপুর", "দিনাজপুর", "কুড়িগ্রাম", "গাইবান্ধা", "লালমনিরহাট", "নীলফামারী", "পঞ্চগড়", "ঠাকুরগাঁও"],
    "ময়মনসিংহ": ["ময়মনসিংহ", "জামালপুর", "নেত্রকোণা", "শেরপুর"]
};

function updateDistricts(divisionSelectId, districtSelectId) {
    const divisionSelect = document.getElementById(divisionSelectId);
    const districtSelect = document.getElementById(districtSelectId);
    if(!divisionSelect || !districtSelect) return;
    const selectedDivision = divisionSelect.value;
    districtSelect.innerHTML = '<option value="">জেলা নির্বাচন করুন</option>';
    if(selectedDivision && divisions[selectedDivision]) {
        divisions[selectedDivision].forEach(district => {
            const option = document.createElement('option');
            option.value = district;
            option.textContent = district;
            districtSelect.appendChild(option);
        });
        districtSelect.disabled = false;
    } else {
        districtSelect.disabled = true;
    }
}

document.getElementById('presentDivision').addEventListener('change', () => updateDistricts('presentDivision', 'presentDistrict'));
document.getElementById('permanentDivision').addEventListener('change', () => updateDistricts('permanentDivision', 'permanentDistrict'));

document.getElementById('sameAsPresent').addEventListener('change', function() {
    if(this.checked) {
        document.getElementById('permanentVillage').value = document.getElementById('presentVillage').value;
        document.getElementById('permanentPostOffice').value = document.getElementById('presentPostOffice').value;
        document.getElementById('permanentThana').value = document.getElementById('presentThana').value;
        document.getElementById('permanentDivision').value = document.getElementById('presentDivision').value;
        document.getElementById('permanentDistrict').value = document.getElementById('presentDistrict').value;
        document.getElementById('permanentDetails').value = document.getElementById('presentDetails').value;
        updateDistricts('permanentDivision', 'permanentDistrict');
    }
});

function showCenterNotification(message, type = 'success', onClose = null) {
    const existingOverlay = document.querySelector('.notification-overlay');
    if (existingOverlay) existingOverlay.remove();
    
    const overlay = document.createElement('div');
    overlay.className = 'notification-overlay';
    
    const notification = document.createElement('div');
    notification.className = 'center-notification';
    
    const bgColor = type === 'success' ? 'bg-emerald-50 border-emerald-500' : 'bg-red-50 border-red-500';
    const iconColor = type === 'success' ? 'text-emerald-600' : 'text-red-600';
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    
    notification.innerHTML = `
        <div class="p-5 ${bgColor} border-l-4 rounded-2xl">
            <div class="flex items-start gap-3">

function copyToClipboard(text, fieldName) {
    navigator.clipboard.writeText(text).then(() => {
        showCenterNotification(`${fieldName} কপি করা হয়েছে: ${text}`, 'success');
    });
}

// সিরিয়াল নম্বর জেনারেট (Supabase থেকে কাউন্ট নিয়ে)
async function getNextSerial() {
    const { data, error, count } = await supabaseClient
        .from('members')
        .select('*', { count: 'exact', head: true });
    
    const currentCount = count || 0;
    return String(currentCount + 1).padStart(4, '0');
}

function generateReferralCode() {
    const random = Math.floor(100000 + Math.random() * 900000);
    return `TUKN-REF-${random}`;
}

function generatePassword() {
    return Math.floor(1000 + Math.random() * 9000).toString();
}

async function generateMemberId(memberTerm) {
    const today = new Date();
    const year = today.getFullYear().toString().slice(-2);
    const month = (today.getMonth() + 1).toString().padStart(2, '0');
    const day = today.getDate().toString().padStart(2, '0');
    const datePrefix = `${year}${month}${day}`;
    
    let typeCode = 'G';
    if(memberTerm === 3) typeCode = 'T3';
    else if(memberTerm === 5) typeCode = 'T5';
    else if(memberTerm === 7) typeCode = 'T7';
    else if(memberTerm === 10) typeCode = 'T10';
    else if(memberTerm === 12) typeCode = 'T12';
    else if(memberTerm === 15) typeCode = 'T15';
    
    const serial = await getNextSerial();
    return `TUKN ${typeCode} ${datePrefix}-${serial}`;
}

async function updateIdPreview() {
    const memberTerm = parseInt(document.getElementById('memberTerm').value);
    let typeCode = 'G';
    if(memberTerm === 3) typeCode = 'T3';
    else if(memberTerm === 5) typeCode = 'T5';
    else if(memberTerm === 7) typeCode = 'T7';
    else if(memberTerm === 10) typeCode = 'T10';
    else if(memberTerm === 12) typeCode = 'T12';
    else if(memberTerm === 15) typeCode = 'T15';
    
    const today = new Date();
    const year = today.getFullYear().toString().slice(-2);
    const month = (today.getMonth() + 1).toString().padStart(2, '0');
    const day = today.getDate().toString().padStart(2, '0');
    const datePrefix = `${year}${month}${day}`;
    
    const serial = await getNextSerial();
    document.getElementById('idPreview').innerHTML = `<i class="fas fa-id-card"></i> আপনার আইডি হবে: <strong>TUKN ${typeCode} ${datePrefix}-${serial}</strong>`;
}

document.getElementById('memberTerm').addEventListener('change', updateIdPreview);
updateIdPreview();

// ফর্ম সাবমিট
document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const mobile = document.getElementById('mobile').value;
    if(!/^01[3-9]\d{8}$/.test(mobile)) {
        showCenterNotification('সঠিক মোবাইল নম্বর দিন (01XXXXXXXXX)', 'error');
        return;
    }
    
    // চেক করুন মোবাইল নম্বর ইতিমধ্যে আছে কিনা
    const { data: existingMember, error: checkError } = await supabaseClient
        .from('members')
        .select('mobile')
        .eq('mobile', mobile)
        .single();
    
    if (existingMember) {
        showCenterNotification('এই মোবাইল নম্বরটি ইতিমধ্যে নিবন্ধিত!', 'error');
        return;
    }
    
    const memberTerm = parseInt(document.getElementById('memberTerm').value);
    let memberType = 'সাধারণ সদস্য';
    if(memberTerm === 3) memberType = '৩ বছর মেয়াদী';
    else if(memberTerm === 5) memberType = '৫ বছর মেয়াদী';
    else if(memberTerm === 7) memberType = '৭ বছর মেয়াদী';
    else if(memberTerm === 10) memberType = '১০ বছর মেয়াদী';
    else if(memberTerm === 12) memberType = '১২ বছর মেয়াদী';
    else if(memberTerm === 15) memberType = '১৫ বছর মেয়াদী';
    
    const newId = await generateMemberId(memberTerm);
    const userPassword = generatePassword();
    const referralCode = generateReferralCode();
    
    const memberData = {
        member_id: newId,
        full_name: document.getElementById('fullName').value,
        father_name: document.getElementById('fatherName').value || null,
        mother_name: document.getElementById('motherName').value || null,
        id_type: document.querySelector('input[name="idType"]:checked').value,
        id_number: document.getElementById('idNumber').value || null,
        mobile: mobile,
        telegram: document.getElementById('telegram').value || null,
        email: document.getElementById('email').value || null,
        password: userPassword,
        member_type: memberType,
        member_term: memberTerm,
        monthly_savings: parseInt(document.getElementById('monthlySavings').value),
        profession: document.getElementById('profession').value || null,
        education: document.getElementById('education').value || null,
        present_village: document.getElementById('presentVillage').value,
        present_post_office: document.getElementById('presentPostOffice').value,
        present_thana: document.getElementById('presentThana').value,
        present_division: document.getElementById('presentDivision').value,
        present_district: document.getElementById('presentDistrict').value,
        present_details: document.getElementById('presentDetails').value || null,
        permanent_village: document.getElementById('permanentVillage').value || null,
        permanent_post_office: document.getElementById('permanentPostOffice').value || null,
        permanent_thana: document.getElementById('permanentThana').value || null,
        permanent_division: document.getElementById('permanentDivision').value || null,
        permanent_district: document.getElementById('permanentDistrict').value || null,
        permanent_details: document.getElementById('permanentDetails').value || null,
        nominee_name: document.getElementById('nomineeName').value || null,
        nominee_relation: document.getElementById('nomineeRelation').value || null,
        nominee_nid: document.getElementById('nomineeNid').value || null,
        referral_code: referralCode,
        status: 'pending',
        join_date: new Date().toISOString()
    };
    
    if(!memberData.full_name || !memberData.mobile || !memberData.present_district) {
        showCenterNotification('সব (*) চিহ্নিত ঘর পূরণ করুন।', 'error');
        return;
    }
    
    try {
        const { data, error } = await supabaseClient.from('members').insert([memberData]).select();
        
        if (error) throw error;
        
        showSuccessNotification({
            member_id: newId,
            password: userPassword,
            referral_code: referralCode,
            full_name: memberData.full_name,
            mobile: memberData.mobile
        });
        
        this.reset();
        document.getElementById('presentDivision').value = '';
        document.getElementById('presentDistrict').innerHTML = '<option value="">প্রথমে বিভাগ নির্বাচন করুন</option>';
        document.getElementById('permanentDivision').value = '';
        document.getElementById('permanentDistrict').innerHTML = '<option value="">প্রথমে বিভাগ নির্বাচন করুন</option>';
        document.querySelector('input[name="idType"][value="জন্মনিবন্ধন"]').checked = true;
        updateIdPreview();
        
    } catch (error) {
        console.error('Signup error:', error);
        showCenterNotification('নিবন্ধন করতে ব্যর্থ হয়েছে! পরে আবার চেষ্টা করুন।', 'error');
    }
});
</script>
