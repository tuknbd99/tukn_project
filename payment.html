<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পেমেন্ট | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-96">
        <h2 class="text-2xl font-bold mb-4 text-emerald-700">মাসিক ফি পরিশোধ</h2>
        <label class="block text-gray-700 font-semibold mb-1">পরিমাণ (টাকা)</label>
        <input value="500" class="w-full border p-2 rounded mb-3">
        <label class="block text-gray-700 font-semibold mb-1">মেম্বার আইডি</label>
        <input value="TUKN-9999" class="w-full border p-2 rounded mb-3">
        <label class="block text-gray-700 font-semibold mb-1">মাস নির্বাচন</label>
        <select class="w-full border p-2 rounded mb-3"><option>মার্চ ২০২৫</option><option>এপ্রিল ২০২৫</option></select>
        <label class="block text-gray-700 font-semibold mb-1">পেমেন্ট মেথড</label>
        <select class="w-full border p-2 rounded mb-4"><option>bKash</option><option>Nagad</option><option>Rocket</option><option>কার্ড</option></select>
        <button class="bg-emerald-600 text-white w-full py-2 rounded hover:bg-emerald-700 transition">Pay Now</button>
        <p class="text-sm text-gray-500 mt-4 text-center">পেমেন্টের পর রশিদ পিডিএফ ও এসএমএস পাবেন</p>
    </div>
</body>
</html>
