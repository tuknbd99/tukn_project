<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>পেমেন্ট স্লিপ | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .slip-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .slip-header {
            background: linear-gradient(135deg, #064e3b, #059669);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .slip-header img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .info-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e5e7eb;
        }
        .info-title {
            font-size: 14px;
            font-weight: 700;
            color: #064e3b;
            border-bottom: 2px solid #fcd34d;
            display: inline-block;
            padding-bottom: 4px;
            margin-bottom: 12px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #e5e7eb;
            font-size: 13px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 600; color: #4b5563; }
        .info-value { color: #1f2937; font-weight: 500; text-align: right; word-break: break-all; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fed7aa; color: #9a3412; }
        .btn { padding: 10px 20px; border-radius: 50px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-primary:hover, .btn-secondary:hover { transform: translateY(-2px); }
        .member-search {
            background: #fef3c7;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #fde68a;
        }
        .auto-note {
            text-align: center;
            font-size: 10px;
            color: #6b7280;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #e5e7eb;
        }
        .search-loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #059669;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media print {
            body { background: white; padding: 0; }
            .action-buttons, .member-search, .no-print, .payment-form { display: none !important; }
            .slip-container { box-shadow: none; border-radius: 0; margin: 0; max-width: 100%; }
            .info-section { border: 1px solid #ddd; }
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">

<div class="w-full max-w-md">
    <!-- সদস্য সার্চ ফর্ম -->
    <div class="bg-white rounded-xl shadow-md p-5 mb-4 no-print">
        <h3 class="font-bold text-emerald-700 mb-3"><i class="fas fa-search"></i> সদস্য তথ্য লোড করুন</h3>
        <div class="flex gap-2 mb-3">
            <input type="text" id="searchInput" placeholder="সদস্য আইডি বা মোবাইল নম্বর (01XXXXXXXXX)" class="flex-1 p-2 border rounded-lg">
            <button onclick="searchMember()" id="searchBtn" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700"><i class="fas fa-search"></i> সার্চ</button>
        </div>
        <div id="searchResult" class="hidden p-3 rounded-lg text-sm"></div>
        <p class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle"></i> সদস্য আইডি (যেমন: TUKN-001) অথবা মোবাইল নম্বর (01XXXXXXXXX) দিয়ে সার্চ করুন।</p>
    </div>
    
    <!-- পেমেন্ট ফর্ম -->
    <div class="bg-white rounded-xl shadow-md p-5 mb-4 no-print payment-form">
        <h3 class="font-bold text-emerald-700 mb-3"><i class="fas fa-credit-card"></i> পেমেন্ট তথ্য দিন</h3>
        
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">সদস্য আইডি <span class="text-red-500">*</span></label>
            <input type="text" id="memberIdInput" class="w-full p-2 border rounded-lg bg-gray-50" readonly placeholder="সার্চ করলে自动 আসবে">
        </div>
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">সদস্যের নাম</label>
            <input type="text" id="memberNameInput" class="w-full p-2 border rounded-lg bg-gray-50" readonly placeholder="সার্চ করলে自动 আসবে">
        </div>
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">মোবাইল নম্বর</label>
            <input type="text" id="memberMobileInput" class="w-full p-2 border rounded-lg bg-gray-50" readonly placeholder="সার্চ করলে自动 আসবে">
        </div>
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">রেফারেল কোড</label>
            <input type="text" id="referCodeInput" class="w-full p-2 border rounded-lg bg-gray-50" readonly placeholder="সার্চ করলে自动 আসবে">
        </div>
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">মাসিক সঞ্চয় পরিমাণ</label>
            <input type="text" id="monthlySavingsInput" class="w-full p-2 border rounded-lg bg-gray-50" readonly placeholder="সার্চ করলে自动 আসবে">
        </div>
        
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">মাস ও বছর <span class="text-red-500">*</span></label>
            <div class="flex gap-2">
                <select id="monthSelect" class="flex-1 p-2 border rounded-lg">
                    <option value="">মাস নির্বাচন করুন</option>
                    <option value="জানুয়ারি">জানুয়ারি</option><option value="ফেব্রুয়ারি">ফেব্রুয়ারি</option>
                    <option value="মার্চ">মার্চ</option><option value="এপ্রিল">এপ্রিল</option>
                    <option value="মে">মে</option><option value="জুন">জুন</option>
                    <option value="জুলাই">জুলাই</option><option value="আগস্ট">আগস্ট</option>
                    <option value="সেপ্টেম্বর">সেপ্টেম্বর</option><option value="অক্টোবর">অক্টোবর</option>
                    <option value="নভেম্বর">নভেম্বর</option><option value="ডিসেম্বর">ডিসেম্বর</option>
                </select>
                <select id="yearSelect" class="w-28 p-2 border rounded-lg">
                    <option value="2026">২০২৬</option><option value="2027">২০২৭</option>
                    <option value="2028">২০২৮</option><option value="2029">২০২৯</option><option value="2030">২০৩০</option>
                </select>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">পেমেন্ট মাধ্যম <span class="text-red-500">*</span></label>
            <select id="methodSelect" class="w-full p-2 border rounded-lg">
                <option value="bKash">bKash</option><option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option><option value="ব্যাংক">ব্যাংক</option>
                <option value="নগদ">নগদ</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">যে নম্বর থেকে পাঠানো হয়েছে</label>
            <input type="text" id="senderNumberInput" class="w-full p-2 border rounded-lg" placeholder="01XXXXXXXXX">
        </div>
        <div class="mb-3">
            <label class="block text-gray-700 font-semibold mb-1">ট্রানজেকশন আইডি / রেফারেন্স</label>
            <input type="text" id="transactionIdInput" class="w-full p-2 border rounded-lg" placeholder="TXN123456">
        </div>
        <button onclick="generateSlip()" class="bg-emerald-600 text-white w-full py-2 rounded-lg hover:bg-emerald-700 transition"><i class="fas fa-receipt"></i> স্লিপ জেনারেট করুন</button>
    </div>
    
    <!-- স্লিপ দেখানোর জায়গা -->
    <div id="slipContainer" class="slip-container hidden">
        <div class="slip-header">
            <img src="images/logo.png" alt="TUKNBD Logo" onerror="this.src='https://placehold.co/60x60/059669/white?text=T'">
            <h2>ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</h2>
            <p>পেমেন্ট স্লিপ / ভাউচার</p>
        </div>
        <div class="p-5" id="slipBody"></div>
        <div class="auto-note">
            <i class="fas fa-robot"></i> স্বয়ংক্রিয় জেনারেটেড স্লিপ। স্বাক্ষর প্রয়োজন নেই।
        </div>
        <div class="action-buttons flex gap-3 p-4 no-print">
            <button class="btn btn-primary flex-1" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> পিডিএফ</button>
            <button class="btn btn-primary flex-1" onclick="window.print()"><i class="fas fa-print"></i> প্রিন্ট</button>
            <button class="btn btn-secondary flex-1" onclick="shareSlip()"><i class="fas fa-share-alt"></i> শেয়ার</button>
        </div>
    </div>
</div>

<script>
    // ========== Supabase কনফিগারেশন ==========
    const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
    let supabaseClient = null;
    let currentMember = null;
    
    async function initSupabase() {
        try {
            if (supabaseClient && supabaseClient.from) return supabaseClient;
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase initialized');
            return supabaseClient;
        } catch(e) { 
            console.error('Supabase init error:', e); 
            return null;
        }
    }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 left-4 mx-auto max-w-xs px-4 py-2 rounded-lg text-white text-center ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} z-50`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ========== সদস্য সার্চ ফাংশন (মোবাইল ও আইডি উভয় সাপোর্ট) ==========
    async function searchMember() {
        const searchTerm = document.getElementById('searchInput').value.trim();
        if (!searchTerm) {
            showToast('সদস্য আইডি বা মোবাইল নম্বর দিন!', 'error');
            return;
        }
        
        const searchBtn = document.getElementById('searchBtn');
        const originalBtnText = searchBtn.innerHTML;
        searchBtn.innerHTML = '<span class="search-loading"></span> সার্চ হচ্ছে...';
        searchBtn.disabled = true;
        
        const sb = await initSupabase();
        if (!sb) {
            showToast('সার্ভার সংযোগ সমস্যা!', 'error');
            searchBtn.innerHTML = originalBtnText;
            searchBtn.disabled = false;
            return;
        }
        
        try {
            // মোবাইল নম্বর চেক (বাংলাদেশি ফরম্যাট 01XXXXXXXXX)
            const isMobile = /^01[3-9]\d{8}$/.test(searchTerm);
            
            let query = sb.from('members').select('member_id, full_name, mobile, referral_code, monthly_savings, status');
            
            if (isMobile) {
                console.log('মোবাইল নম্বর দিয়ে সার্চ:', searchTerm);
                query = query.eq('mobile', searchTerm);
            } else {
                console.log('সদস্য আইডি দিয়ে সার্চ:', searchTerm);
                query = query.eq('member_id', searchTerm);
            }
            
            const { data, error } = await query.maybeSingle();
            
            if (error) throw error;
            
            const resultDiv = document.getElementById('searchResult');
            
            if (data) {
                // চেক করুন সদস্য active কিনা
                if (data.status !== 'active' && data.status !== 'approved') {
                    resultDiv.innerHTML = `<i class="fas fa-exclamation-circle text-red-600"></i> এই সদস্যের একাউন্ট এখনও অনুমোদিত হয়নি।`;
                    resultDiv.className = 'bg-red-50 p-3 rounded-lg text-sm text-red-700 block';
                    resultDiv.classList.remove('hidden');
                    showToast('সদস্য একাউন্ট অনুমোদিত নয়!', 'error');
                    searchBtn.innerHTML = originalBtnText;
                    searchBtn.disabled = false;
                    return;
                }
                
                currentMember = data;
                
                // ফর্ম ফিল্ড পপুলেট
                document.getElementById('memberIdInput').value = data.member_id;
                document.getElementById('memberNameInput').value = data.full_name || '';
                document.getElementById('memberMobileInput').value = data.mobile || '';
                document.getElementById('referCodeInput').value = data.referral_code || '';
                document.getElementById('monthlySavingsInput').value = (data.monthly_savings || 500) + ' টাকা';
                document.getElementById('amountInput')?.setAttribute('value', data.monthly_savings || 500);
                
                // amountInput যদি না থাকে তাহলে তৈরি করুন
                if (!document.getElementById('amountInput')) {
                    const amountHtml = `<input type="hidden" id="amountInput" value="${data.monthly_savings || 500}">`;
                    document.body.insertAdjacentHTML('beforeend', amountHtml);
                } else {
                    document.getElementById('amountInput').value = data.monthly_savings || 500;
                }
                
                resultDiv.innerHTML = `<i class="fas fa-check-circle text-green-600"></i> সদস্য পাওয়া গেছে: <strong>${data.full_name}</strong> (${data.member_id})<br>
                                       <span class="text-xs text-gray-500">মোবাইল: ${data.mobile} | রেফারেল: ${data.referral_code || 'N/A'}</span>`;
                resultDiv.className = 'bg-green-50 p-3 rounded-lg text-sm text-green-700 block';
                resultDiv.classList.remove('hidden');
                
                showToast(`সদস্য পাওয়া গেছে: ${data.full_name}`, 'success');
                
                // স্লিপ কন্টেইনার হাইড করে ফর্ম দেখান
                document.getElementById('slipContainer').classList.add('hidden');
                
            } else {
                resultDiv.innerHTML = `<i class="fas fa-exclamation-circle text-red-600"></i> সদস্য পাওয়া যায়নি! "${searchTerm}" এই তথ্যে কোন সদস্য নেই।`;
                resultDiv.className = 'bg-red-50 p-3 rounded-lg text-sm text-red-700 block';
                resultDiv.classList.remove('hidden');
                showToast('সদস্য পাওয়া যায়নি!', 'error');
                
                // ফর্ম ফিল্ড ক্লিয়ার করুন
                document.getElementById('memberIdInput').value = '';
                document.getElementById('memberNameInput').value = '';
                document.getElementById('memberMobileInput').value = '';
                document.getElementById('referCodeInput').value = '';
                document.getElementById('monthlySavingsInput').value = '';
            }
            
        } catch(e) {
            console.error('Search error:', e);
            showToast('সার্চ করতে ব্যর্থ! নেটওয়ার্ক চেক করুন।', 'error');
            const resultDiv = document.getElementById('searchResult');
            resultDiv.innerHTML = `<i class="fas fa-exclamation-circle text-red-600"></i> সার্চ করতে ব্যর্থ! পরে আবার চেষ্টা করুন।`;
            resultDiv.className = 'bg-red-50 p-3 rounded-lg text-sm text-red-700 block';
            resultDiv.classList.remove('hidden');
        } finally {
            searchBtn.innerHTML = originalBtnText;
            searchBtn.disabled = false;
        }
    }
    
    // ========== স্লিপ জেনারেট ফাংশন ==========
    function generateSlip() {
        const memberId = document.getElementById('memberIdInput').value.trim();
        const memberName = document.getElementById('memberNameInput').value.trim();
        const memberMobile = document.getElementById('memberMobileInput').value.trim();
        const referCode = document.getElementById('referCodeInput').value.trim();
        const month = document.getElementById('monthSelect').value;
        const year = document.getElementById('yearSelect').value;
        const method = document.getElementById('methodSelect').value;
        const senderNumber = document.getElementById('senderNumberInput').value.trim();
        const transactionId = document.getElementById('transactionIdInput').value.trim();
        
        // মাসিক সঞ্চয় পরিমাণ
        let monthlyAmount = 500;
        const savingsText = document.getElementById('monthlySavingsInput').value;
        if (savingsText) {
            const match = savingsText.match(/\d+/);
            if (match) monthlyAmount = parseInt(match[0]);
        }
        
        if (!memberId) {
            showToast('প্রথমে সদস্য সার্চ করুন!', 'error');
            return;
        }
        
        if (!month) {
            showToast('মাস নির্বাচন করুন!', 'error');
            return;
        }
        
        const now = new Date();
        const inputDate = now.toLocaleDateString('bn-BD');
        const inputTime = now.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        const slipHTML = `
            <div class="info-section">
                <div class="info-title"><i class="fas fa-user-circle"></i> সদস্য তথ্য</div>
                <div class="info-row"><span class="info-label">সদস্য আইডি:</span><span class="info-value">${memberId}</span></div>
                <div class="info-row"><span class="info-label">নাম:</span><span class="info-value">${memberName || '-'}</span></div>
                <div class="info-row"><span class="info-label">মোবাইল নম্বর:</span><span class="info-value">${memberMobile || '-'}</span></div>
                <div class="info-row"><span class="info-label">রেফারেল কোড:</span><span class="info-value">${referCode || '-'}</span></div>
            </div>
            <div class="info-section">
                <div class="info-title"><i class="fas fa-credit-card"></i> পেমেন্ট তথ্য</div>
                <div class="info-row"><span class="info-label">মাস ও বছর:</span><span class="info-value">${month} ${year}</span></div>
                <div class="info-row"><span class="info-label">পরিমাণ:</span><span class="info-value">${monthlyAmount.toLocaleString()} টাকা</span></div>
                <div class="info-row"><span class="info-label">পেমেন্ট মাধ্যম:</span><span class="info-value">${method}</span></div>
                <div class="info-row"><span class="info-label">যে নম্বর থেকে পাঠানো হয়েছে:</span><span class="info-value">${senderNumber || '-'}</span></div>
                <div class="info-row"><span class="info-label">ট্রানজেকশন আইডি:</span><span class="info-value">${transactionId || '-'}</span></div>
            </div>
            <div class="info-section">
                <div class="info-title"><i class="fas fa-keyboard"></i> ইনপুট তথ্য</div>
                <div class="info-row"><span class="info-label">ইনপুটের তারিখ:</span><span class="info-value">${inputDate}</span></div>
                <div class="info-row"><span class="info-label">ইনপুটের সময়:</span><span class="info-value">${inputTime}</span></div>
                <div class="info-row"><span class="info-label">ইনপুটকারী:</span><span class="info-value">সিস্টেম (${localStorage.getItem('tukn_admin') ? 'অ্যাডমিন' : (localStorage.getItem('tukn_logged_member') ? 'সদস্য' : 'গেস্ট')})</span></div>
                <div class="info-row"><span class="info-label">স্ট্যাটাস:</span><span class="info-value"><span class="status-badge status-pending">বিচারাধীন</span></span></div>
            </div>
            <div class="qr-code text-center mt-3">
                <div id="qrcode" style="display: flex; justify-content: center;"></div>
                <p style="font-size: 10px; color: #6b7280; margin-top: 5px;">স্ক্যান করে পেমেন্ট ভেরিফাই করুন</p>
            </div>
        `;
        
        document.getElementById('slipBody').innerHTML = slipHTML;
        document.getElementById('slipContainer').classList.remove('hidden');
        
        // স্লিপ পর্যন্ত স্ক্রল
        setTimeout(() => {
            document.getElementById('slipContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
        
        // QR কোড জেনারেট
        setTimeout(() => {
            const qrDiv = document.getElementById('qrcode');
            if (typeof QRCode !== 'undefined') {
                qrDiv.innerHTML = '';
                new QRCode(qrDiv, {
                    text: JSON.stringify({ 
                        id: memberId, 
                        name: memberName, 
                        amount: monthlyAmount, 
                        month: month,
                        year: year,
                        trx: transactionId, 
                        date: inputDate 
                    }),
                    width: 80,
                    height: 80
                });
            } else {
                qrDiv.innerHTML = '<div style="width:80px;height:80px;background:#f0fdf4;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto;"><i class="fas fa-qrcode fa-3x text-emerald-600"></i></div>';
            }
        }, 150);
        
        // Supabase এ পেমেন্ট সেভ করা
        savePaymentToSupabase(memberId, memberName, memberMobile, month, year, monthlyAmount, method, senderNumber, transactionId);
        
        showToast('স্লিপ জেনারেট করা হয়েছে!', 'success');
    }
    
    async function savePaymentToSupabase(memberId, memberName, memberMobile, month, year, amount, method, senderNumber, transactionId) {
        const sb = await initSupabase();
        if (!sb) return;
        
        try {
            const { error } = await sb.from('payments').insert([{
                member_id: memberId,
                member_name: memberName,
                mobile: memberMobile,
                month: month,
                year: year,
                amount: parseInt(amount),
                payment_method: method,
                sender_mobile: senderNumber || null,
                transaction_id: transactionId || null,
                status: 'pending',
                submitted_at: new Date().toISOString()
            }]);
            
            if (!error) {
                console.log('✅ পেমেন্ট সেভ হয়েছে');
            } else {
                console.error('Save error:', error);
            }
        } catch(e) { console.error('Save error:', e); }
    }
    
    function downloadPDF() {
        const element = document.getElementById('slipContainer');
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: `TUKNBD_Payment_Slip_${Date.now()}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
        showToast('পিডিএফ ডাউনলোড শুরু হচ্ছে...', 'success');
    }
    
    function shareSlip() {
        if (navigator.share) {
            navigator.share({
                title: 'TUKNBD পেমেন্ট স্লিপ',
                text: `পেমেন্ট স্লিপ জেনারেট করা হয়েছে`,
                url: window.location.href
            }).catch(() => {});
        } else {
            showToast('শেয়ার করার জন্য স্ক্রিনশট নিন', 'info');
        }
    }
    
    // এন্টার প্রেসে সার্চ
    document.getElementById('searchInput')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchMember();
    });
    
    // পেজ লোডে URL প্যারামিটার চেক করা (যদি payment_id থাকে)
    async function checkUrlParams() {
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');
        const memberId = urlParams.get('id');
        
        if (paymentId) {
            // payment_id দিয়ে সার্চ করে স্লিপ দেখানো
            const sb = await initSupabase();
            if (sb) {
                const { data } = await sb.from('payments').select('*, members(full_name, mobile, member_id, referral_code)').eq('id', paymentId).single();
                if (data) {
                    document.getElementById('memberIdInput').value = data.member_id;
                    document.getElementById('memberNameInput').value = data.members?.full_name || '';
                    document.getElementById('memberMobileInput').value = data.members?.mobile || '';
                    document.getElementById('referCodeInput').value = data.members?.referral_code || '';
                    document.getElementById('monthlySavingsInput').value = (data.amount || 500) + ' টাকা';
                    document.getElementById('monthSelect').value = data.month || '';
                    document.getElementById('yearSelect').value = data.year || '2026';
                    document.getElementById('methodSelect').value = data.payment_method || 'bKash';
                    document.getElementById('senderNumberInput').value = data.sender_mobile || '';
                    document.getElementById('transactionIdInput').value = data.transaction_id || '';
                    generateSlip();
                }
            }
        } else if (memberId) {
            document.getElementById('searchInput').value = memberId;
            searchMember();
        }
    }
    
    // QR কোড লাইব্রেরি লোড
    const qrScript = document.createElement('script');
    qrScript.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
    qrScript.onload = () => console.log('QR Library loaded');
    document.head.appendChild(qrScript);
    
    // পেজ লোড
    document.addEventListener('DOMContentLoaded', function() {
        initSupabase();
        checkUrlParams();
        console.log('✅ পেমেন্ট পেজ লোড হয়েছে');
    });
</script>
</body>
</html>
