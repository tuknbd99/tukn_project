<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>পন্য ব্যবস্থাপনা | TUKNBD অ্যাডমিন</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans Bengali', sans-serif; }
        
        :root {
            --primary: #0d9488;
            --primary-light: #14b8a6;
            --primary-dark: #0f766e;
            --secondary: #f59e0b;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        
        body {
            background: #f0fdf4;
            min-height: 100vh;
        }
        
        /* ===== টপ বার ===== */
        .top-bar {
            background: linear-gradient(135deg, #064e3b, #047857);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar .logo {
            color: white;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-bar .logo i { color: #fcd34d; }
        .top-bar .admin-info {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .top-bar .admin-info .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .top-bar .admin-info .logout-btn:hover {
            background: #ef4444;
        }
        
        /* ===== কন্টেইনার ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 15px;
        }
        
        /* ===== হেডার ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .page-header h1 {
            font-size: 28px;
            color: #064e3b;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-header h1 i { color: #059669; }
        .page-header .add-btn {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-header .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(5,150,105,0.3);
        }
        
        /* ===== সার্চ ===== */
        .search-bar {
            background: white;
            padding: 15px 20px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .search-bar input:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5,150,105,0.1);
        }
        .search-bar select {
            padding: 12px 18px;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 14px;
            background: white;
            min-width: 150px;
        }
        .search-bar select:focus {
            outline: none;
            border-color: #059669;
        }
        .search-bar .search-btn {
            background: #059669;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .search-bar .search-btn:hover {
            background: #047857;
        }
        
        /* ===== পন্য গ্রিড ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .product-card .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #e5e7eb;
        }
        .product-card .product-body {
            padding: 18px;
        }
        .product-card .product-name {
            font-size: 18px;
            font-weight: 700;
            color: #064e3b;
            margin-bottom: 5px;
        }
        .product-card .product-desc {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-card .product-price {
            font-size: 20px;
            font-weight: 800;
            color: #059669;
        }
        .product-card .product-price .original {
            font-size: 14px;
            color: #9ca3af;
            text-decoration: line-through;
            margin-left: 8px;
            font-weight: 400;
        }
        .product-card .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e5e7eb;
        }
        .product-card .product-meta .stock {
            font-size: 13px;
            font-weight: 600;
        }
        .product-card .product-meta .stock.in-stock { color: #10b981; }
        .product-card .product-meta .stock.out-stock { color: #ef4444; }
        .product-card .product-actions {
            display: flex;
            gap: 8px;
        }
        .product-card .product-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .product-card .product-actions .edit-btn {
            background: #dbeafe;
            color: #1e40af;
        }
        .product-card .product-actions .edit-btn:hover {
            background: #bfdbfe;
        }
        .product-card .product-actions .delete-btn {
            background: #fee2e2;
            color: #dc2626;
        }
        .product-card .product-actions .delete-btn:hover {
            background: #fecaca;
        }
        .product-card .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .status-badge.active { background: #d1fae5; color: #065f46; }
        .status-badge.inactive { background: #fef3c7; color: #92400e; }
        .status-badge.out_of_stock { background: #fee2e2; color: #dc2626; }
        
        /* ===== মডাল ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            border-radius: var(--radius-lg);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-content h2 {
            font-size: 24px;
            color: #064e3b;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 3px solid #fcd34d;
            padding-bottom: 12px;
        }
        .modal-content h2 i { color: #059669; margin-right: 8px; }
        .modal-content label {
            font-weight: 600;
            font-size: 14px;
            color: #374151;
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
            outline: none;
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5,150,105,0.1);
        }
        .modal-content textarea { min-height: 80px; resize: vertical; }
        .modal-content .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .modal-content .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-content .form-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .modal-content .form-actions .submit-btn {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
        }
        .modal-content .form-actions .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(5,150,105,0.3);
        }
        .modal-content .form-actions .cancel-btn {
            background: #e5e7eb;
            color: #374151;
        }
        .modal-content .form-actions .cancel-btn:hover {
            background: #d1d5db;
        }
        
        /* ===== নোটিফিকেশন ===== */
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border-left: 4px solid #10b981;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
        }
        .notification.error { border-left-color: #ef4444; }
        .notification.warning { border-left-color: #f59e0b; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        .notification .notif-close {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #6b7280;
        }
        
        /* ===== লোডিং ===== */
        .loading {
            text-align: center;
            padding: 50px;
            color: #6b7280;
        }
        .loading i { font-size: 40px; color: #059669; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ===== খালি অবস্থা ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-state i { font-size: 60px; color: #d1d5db; margin-bottom: 15px; }
        .empty-state h3 { color: #374151; margin-bottom: 8px; }
        
        @media (max-width: 768px) {
            .page-header { flex-direction: column; text-align: center; }
            .search-bar { flex-direction: column; }
            .search-bar input, .search-bar select, .search-bar .search-btn { width: 100%; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
            .modal-content .form-row { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<!-- ===== টপ বার ===== -->
<div class="top-bar">
    <div class="logo">
        <i class="fas fa-store"></i>
        TUKNBD পন্য ব্যবস্থাপনা
    </div>
    <div class="admin-info">
        <span><i class="fas fa-user-shield"></i> <span id="adminName">অ্যাডমিন</span></span>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
    </div>
</div>

<!-- ===== কন্টেইনার ===== -->
<div class="container">
    <!-- ===== পেজ হেডার ===== -->
    <div class="page-header">
        <h1><i class="fas fa-boxes"></i> পন্য ব্যবস্থাপনা</h1>
        <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> নতুন পন্য যোগ করুন</button>
    </div>
    
    <!-- ===== সার্চ বার ===== -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="পন্য খুঁজুন..." onkeyup="searchProducts()">
        <select id="categoryFilter" onchange="searchProducts()">
            <option value="">সব ক্যাটাগরি</option>
            <option value="ইসলামিক বই">ইসলামিক বই</option>
            <option value="পোশাক">পোশাক</option>
            <option value="ইসলামী সামগ্রী">ইসলামী সামগ্রী</option>
            <option value="অন্যান্য">অন্যান্য</option>
        </select>
        <select id="statusFilter" onchange="searchProducts()">
            <option value="">সব স্ট্যাটাস</option>
            <option value="active">সক্রিয়</option>
            <option value="inactive">নিষ্ক্রিয়</option>
            <option value="out_of_stock">স্টক শেষ</option>
        </select>
        <button class="search-btn" onclick="searchProducts()"><i class="fas fa-search"></i> খুঁজুন</button>
    </div>
    
    <!-- ===== পন্য গ্রিড ===== -->
    <div class="product-grid" id="productGrid">
        <div class="loading"><i class="fas fa-spinner"></i><br>লোড হচ্ছে...</div>
    </div>
</div>

<!-- ===== পন্য এড/এডিট মডাল ===== -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <h2 id="modalTitle"><i class="fas fa-plus"></i> নতুন পন্য যোগ করুন</h2>
        <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="productId" value="">
            
            <label>পন্য নাম *</label>
            <input type="text" id="pname" placeholder="পন্য নাম লিখুন" required>
            
            <label>বিবরণ</label>
            <textarea id="pdesc" placeholder="পন্য সম্পর্কে বিস্তারিত লিখুন"></textarea>
            
            <div class="form-row">
                <div>
                    <label>মূল্য (টাকা) *</label>
                    <input type="number" id="pprice" placeholder="মূল্য" required min="0" step="0.01">
                </div>
                <div>
                    <label>ছাড়ের মূল্য</label>
                    <input type="number" id="pdiscount" placeholder="ছাড়ের মূল্য" min="0" step="0.01">
                </div>
            </div>
            
            <div class="form-row">
                <div>
                    <label>ক্যাটাগরি</label>
                    <select id="pcategory">
                        <option value="ইসলামিক বই">ইসলামিক বই</option>
                        <option value="পোশাক">পোশাক</option>
                        <option value="ইসলামী সামগ্রী">ইসলামী সামগ্রী</option>
                        <option value="অন্যান্য">অন্যান্য</option>
                    </select>
                </div>
                <div>
                    <label>স্টক পরিমাণ</label>
                    <input type="number" id="pstock" placeholder="স্টক" min="0" value="0">
                </div>
            </div>
            
            <label>ছবির URL</label>
            <input type="url" id="pimage" placeholder="https://example.com/image.jpg">
            
            <label>স্ট্যাটাস</label>
            <select id="pstatus">
                <option value="active">সক্রিয়</option>
                <option value="inactive">নিষ্ক্রিয়</option>
                <option value="out_of_stock">স্টক শেষ</option>
            </select>
            
            <div class="form-actions">
                <button type="button" class="cancel-btn" onclick="closeModal()">বাতিল</button>
                <button type="submit" class="submit-btn"><i class="fas fa-save"></i> সংরক্ষণ করুন</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== ডিলিট কনফার্ম মডাল ===== -->
<div class="modal" id="deleteModal">
    <div class="modal-content" style="max-width:400px;text-align:center;">
        <h2 style="border-bottom:none;"><i class="fas fa-trash" style="color:#ef4444;"></i> পন্য ডিলিট করুন</h2>
        <p style="font-size:16px;color:#6b7280;margin:15px 0;">আপনি কি নিশ্চিত এই পন্য ডিলিট করতে চান?</p>
        <p id="deleteProductName" style="font-weight:700;color:#064e3b;font-size:18px;"></p>
        <div class="form-actions" style="margin-top:20px;">
            <button class="cancel-btn" onclick="closeDeleteModal()">বাতিল</button>
            <button class="submit-btn" style="background:#ef4444;" onclick="confirmDelete()"><i class="fas fa-trash"></i> ডিলিট করুন</button>
        </div>
    </div>
</div>

<!-- ===== JavaScript ===== -->
<script>
// ===== Supabase =====
const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
let supabaseClient = null;
let allProducts = [];
let deleteId = null;

async function initSupabase() {
    try {
        if (supabaseClient && supabaseClient.from) return supabaseClient;
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return supabaseClient;
    } catch(e) {
        console.error('Supabase error:', e);
        return null;
    }
}

// ===== অ্যাডমিন চেক =====
function checkAdmin() {
    const admin = localStorage.getItem('tukn_admin');
    if (!admin) {
        window.location.href = 'admin-login.html';
        return false;
    }
    try {
        const data = JSON.parse(admin);
        document.getElementById('adminName').textContent = data.full_name || 'অ্যাডমিন';
        return true;
    } catch(e) {
        window.location.href = 'admin-login.html';
        return false;
    }
}

function logout() {
    localStorage.removeItem('tukn_admin');
    window.location.href = 'admin-login.html';
}

// ===== নোটিফিকেশন =====
function showNotification(message, type = 'success') {
    const existing = document.querySelector('.notification');
    if (existing) existing.remove();
    
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerHTML = `
        <button class="notif-close" onclick="this.parentElement.remove()">×</button>
        <span>${message}</span>
    `;
    document.body.appendChild(notif);
    setTimeout(() => { if (notif.parentNode) notif.remove(); }, 4000);
}

// ===== পন্য লোড =====
async function loadProducts() {
    const container = document.getElementById('productGrid');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><br>লোড হচ্ছে...</div>';
    
    const sb = await initSupabase();
    if (!sb) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>সংযোগ সমস্যা!</h3></div>';
        return;
    }
    
    try {
        const { data, error } = await sb.from('products').select('*').order('id', { ascending: false });
        if (error) throw error;
        
        allProducts = data || [];
        renderProducts(allProducts);
    } catch(e) {
        console.error('Load error:', e);
        container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>লোড করতে সমস্যা!</h3></div>';
        showNotification('পন্য লোড করতে সমস্যা!', 'error');
    }
}

function renderProducts(products) {
    const container = document.getElementById('productGrid');
    
    if (!products || products.length === 0) {
        container.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
                <i class="fas fa-box-open"></i>
                <h3>কোন পন্য নেই</h3>
                <p>নতুন পন্য যোগ করতে উপরের বাটনে ক্লিক করুন</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = products.map(p => {
        const statusClass = p.status || 'active';
        const statusLabel = statusClass === 'active' ? 'সক্রিয়' : statusClass === 'inactive' ? 'নিষ্ক্রিয়' : 'স্টক শেষ';
        const inStock = p.stock_quantity > 0;
        const displayPrice = p.discount_price || p.price;
        const hasDiscount = p.discount_price && p.discount_price < p.price;
        
        return `
            <div class="product-card">
                <img src="${p.image_url || 'https://placehold.co/300x200/e5e7eb/6b7280?text=' + encodeURIComponent(p.name)}" 
                     alt="${p.name}" class="product-image" 
                     onerror="this.src='https://placehold.co/300x200/e5e7eb/6b7280?text=${encodeURIComponent(p.name)}'">
                <span class="status-badge ${statusClass}">${statusLabel}</span>
                <div class="product-body">
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.description || ''}</div>
                    <div class="product-price">
                        ৳${displayPrice}
                        ${hasDiscount ? `<span class="original">৳${p.price}</span>` : ''}
                    </div>
                    <div class="product-meta">
                        <span class="stock ${inStock ? 'in-stock' : 'out-stock'}">
                            <i class="fas ${inStock ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${inStock ? `${p.stock_quantity}টি স্টকে` : 'স্টক শেষ'}
                        </span>
                        <span style="font-size:12px;color:#6b7280;">${p.category || ''}</span>
                    </div>
                    <div class="product-meta" style="border-top:none;padding-top:0;">
                        <span style="font-size:11px;color:#9ca3af;">
                            <i class="far fa-calendar-alt"></i> ${new Date(p.created_at).toLocaleDateString('bn-BD')}
                        </span>
                        <div class="product-actions">
                            <button class="edit-btn" onclick="openEditModal(${p.id})"><i class="fas fa-edit"></i> এডিট</button>
                            <button class="delete-btn" onclick="openDeleteModal(${p.id}, '${p.name}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// ===== সার্চ =====
function searchProducts() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const status = document.getElementById('statusFilter').value;
    
    let filtered = allProducts;
    
    if (search) {
        filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(search) || 
            (p.description && p.description.toLowerCase().includes(search))
        );
    }
    if (category) {
        filtered = filtered.filter(p => p.category === category);
    }
    if (status) {
        filtered = filtered.filter(p => p.status === status);
    }
    
    renderProducts(filtered);
}

// ===== মডাল অপারেশন =====
function openAddModal() {
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> নতুন পন্য যোগ করুন';
    document.getElementById('productId').value = '';
    document.getElementById('productForm').reset();
    document.getElementById('pstatus').value = 'active';
    document.getElementById('productModal').classList.add('show');
}

function openEditModal(id) {
    const product = allProducts.find(p => p.id === id);
    if (!product) {
        showNotification('পন্য খুঁজে পাওয়া যায়নি!', 'error');
        return;
    }
    
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> পন্য সম্পাদনা করুন';
    document.getElementById('productId').value = product.id;
    document.getElementById('pname').value = product.name || '';
    document.getElementById('pdesc').value = product.description || '';
    document.getElementById('pprice').value = product.price || '';
    document.getElementById('pdiscount').value = product.discount_price || '';
    document.getElementById('pcategory').value = product.category || 'ইসলামিক বই';
    document.getElementById('pstock').value = product.stock_quantity || 0;
    document.getElementById('pimage').value = product.image_url || '';
    document.getElementById('pstatus').value = product.status || 'active';
    document.getElementById('productModal').classList.add('show');
}

function closeModal() {
    document.getElementById('productModal').classList.remove('show');
    document.getElementById('productForm').reset();
}

function openDeleteModal(id, name) {
    deleteId = id;
    document.getElementById('deleteProductName').textContent = name;
    document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    deleteId = null;
}

// ===== পন্য সংরক্ষণ =====
async function saveProduct(e) {
    e.preventDefault();
    
    const id = document.getElementById('productId').value;
    const name = document.getElementById('pname').value.trim();
    const description = document.getElementById('pdesc').value.trim();
    const price = parseFloat(document.getElementById('pprice').value);
    const discount_price = parseFloat(document.getElementById('pdiscount').value) || null;
    const category = document.getElementById('pcategory').value;
    const stock_quantity = parseInt(document.getElementById('pstock').value) || 0;
    const image_url = document.getElementById('pimage').value.trim() || null;
    const status = document.getElementById('pstatus').value;
    
    if (!name || !price) {
        showNotification('নাম এবং মূল্য অবশ্যই দিতে হবে!', 'error');
        return;
    }
    
    if (discount_price && discount_price >= price) {
        showNotification('ছাড়ের মূল্য মূল্যের থেকে কম হতে হবে!', 'error');
        return;
    }
    
    const sb = await initSupabase();
    if (!sb) {
        showNotification('সার্ভার সংযোগ সমস্যা!', 'error');
        return;
    }
    
    const data = { name, description, price, discount_price, category, stock_quantity, image_url, status, updated_at: new Date().toISOString() };
    
    try {
        let result;
        if (id) {
            // এডিট
            result = await sb.from('products').update(data).eq('id', id);
            if (result.error) throw result.error;
            showNotification('পন্য আপডেট হয়েছে!', 'success');
        } else {
            // নতুন
            data.created_at = new Date().toISOString();
            result = await sb.from('products').insert([data]);
            if (result.error) throw result.error;
            showNotification('নতুন পন্য যোগ হয়েছে!', 'success');
        }
        
        closeModal();
        loadProducts();
    } catch(e) {
        console.error('Save error:', e);
        showNotification('সংরক্ষণ করতে সমস্যা! ' + e.message, 'error');
    }
}

// ===== পন্য ডিলিট =====
async function confirmDelete() {
    if (!deleteId) return;
    
    const sb = await initSupabase();
    if (!sb) {
        showNotification('সার্ভার সংযোগ সমস্যা!', 'error');
        return;
    }
    
    try {
        const { error } = await sb.from('products').delete().eq('id', deleteId);
        if (error) throw error;
        
        showNotification('পন্য ডিলিট করা হয়েছে!', 'success');
        closeDeleteModal();
        loadProducts();
    } catch(e) {
        console.error('Delete error:', e);
        showNotification('ডিলিট করতে সমস্যা!', 'error');
    }
}

// ===== কীবোর্ড শর্টকাট =====
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeModal();
        closeDeleteModal();
    }
});

// ===== পেজ লোড =====
document.addEventListener('DOMContentLoaded', async function() {
    if (!checkAdmin()) return;
    await initSupabase();
    loadProducts();
});
</script>
