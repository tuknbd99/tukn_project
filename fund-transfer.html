<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফান্ড ট্রান্সফার | TUKNBD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: #f0fdf4; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #e5e7eb; }
        .card-title { font-size: 22px; font-weight: 700; color: #064e3b; border-bottom: 3px solid #fcd34d; padding-bottom: 10px; display: inline-block; margin-bottom: 20px; }
        .form-input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 14px; transition: all 0.3s; background: white; }
        .form-input:focus { border-color: #059669; outline: none; box-shadow: 0 0 0 3px rgba(5,150,105,0.15); }
        .btn-primary { background: linear-gradient(135deg, #059669, #10b981); color: white; padding: 12px 30px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 16px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(5,150,105,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-outline { background: transparent; border: 2px solid #059669; color: #059669; padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-outline:hover { background: #059669; color: white; }
        .badge { display: inline-block; padding: 3px 12px; border-radius: 50px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-completed { background: #d1fae5; color: #065f46; }
        .badge-failed { background: #fee2e2; color: #991b1b; }
        .badge-cancelled { background: #e5e7eb; color: #4b5563; }
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; border-radius: 12px; color: white; z-index: 1000; animation: slideIn 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .member-search-result { padding: 10px 14px; border-bottom: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; }
        .member-search-result:hover { background: #f0fdf4; }
        .member-search-result:last-child { border-bottom: none; }
        .loading-spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #059669; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { rotate(360deg); } }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #064e3b; color: white; padding: 10px 12px; text-align: left; font-weight: 600; }
        td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; }
        tr:nth-child(even) { background: #f8fafc; }
        .table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; border-radius: 10px; border: 1px solid #e5e7eb; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #059669; text-decoration: none; font-weight: 600; margin-bottom: 15px; }
        .back-link:hover { color: #047857; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        @media (max-width: 640px) { .card { padding: 15px; } table { font-size: 11px; } th, td { padding: 4px 6px; } }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> ড্যাশবোর্ডে ফিরে যান</a>

    <div class="card">
        <h1 class="card-title"><i class="fas fa-exchange-alt text-emerald-600 mr-2"></i>ফান্ড ট্রান্সফার</h1>
        <p class="text-sm text-gray-500 mb-4">অন্য সদস্যকে আপনার ফান্ড থেকে টাকা ট্রান্সফার করুন</p>

        <!-- বর্তমান ব্যালেন্স -->
        <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200 mb-4">
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-600">আপনার বর্তমান ব্যালেন্স</span>
                <span class="text-2xl font-bold text-emerald-700" id="currentBalance">০.০০ টাকা</span>
            </div>
        </div>

        <!-- ট্রান্সফার ফর্ম -->
        <form id="transferForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">গ্রহীতার সদস্য আইডি বা মোবাইল <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <input type="text" id="receiverSearch" class="form-input flex-1" placeholder="আইডি বা মোবাইল লিখুন..." required>
                    <button type="button" onclick="searchReceiver()" class="btn-primary px-4"><i class="fas fa-search"></i></button>
                </div>
                <div id="searchResults" class="mt-2 border rounded-lg hidden"></div>
                <div id="receiverInfo" class="mt-2 hidden">
                    <div class="bg-green-50 p-3 rounded-lg border border-green-200 flex justify-between items-center">
                        <div>
                            <p class="font-semibold" id="receiverName">-</p>
                            <p class="text-sm text-gray-500" id="receiverId">-</p>
                        </div>
                        <button type="button" onclick="clearReceiver()" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-times"></i> পরিবর্তন</button>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">পরিমাণ (টাকা) <span class="text-red-500">*</span></label>
                <input type="number" id="transferAmount" class="form-input" placeholder="যেমন: 500" min="1" step="1" required>
                <p class="text-xs text-gray-400 mt-1">আপনার ব্যালেন্সের বেশি টাকা ট্রান্সফার করা যাবে না</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">নোট (ঐচ্ছিক)</label>
                <textarea id="transferNote" class="form-input" rows="2" placeholder="ট্রান্সফারের উদ্দেশ্য লিখুন..."></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary w-full py-3">
                <i class="fas fa-paper-plane mr-2"></i> টাকা ট্রান্সফার করুন
            </button>
        </form>
    </div>

    <!-- ট্রান্সফার ইতিহাস -->
    <div class="card">
        <div class="flex justify-between items-center flex-wrap gap-2 mb-3">
            <h3 class="font-bold text-emerald-700"><i class="fas fa-history mr-2"></i>আমার ট্রান্সফার ইতিহাস</h3>
            <button onclick="loadTransferHistory()" class="btn-outline text-sm"><i class="fas fa-sync-alt mr-1"></i> রিফ্রেশ</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>তারিখ</th>
                        <th>প্রেরক</th>
                        <th>গ্রহীতা</th>
                        <th class="text-right">পরিমাণ</th>
                        <th>স্ট্যাটাস</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="5" class="text-center py-8 text-gray-500">লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ============================================================
// Supabase Configuration
// ============================================================
const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';

let supabaseClient = null;
let currentMember = null;
let selectedReceiver = null;
let allTransfers = [];

// ============================================================
// Initialize Supabase
// ============================================================
function initSupabase() {
    if (supabaseClient) return supabaseClient;
    try {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("✅ Supabase client initialized");
        } else {
            console.error("❌ Supabase library not loaded!");
            return null;
        }
    } catch(e) {
        console.error("❌ Supabase initialization error:", e);
        return null;
    }
    return supabaseClient;
}

// ============================================================
// Utility Functions
// ============================================================
function formatAmount(amount) {
    if (typeof amount !== 'number' || isNaN(amount)) return '0.00';
    return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function formatAmountWithText(amount) {
    return formatAmount(amount) + ' টাকা';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    try { return new Date(dateStr).toLocaleString('bn-BD', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); } 
    catch(e) { return dateStr; }
}

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    const colors = { success: '#10b981', error: '#ef4444', info: '#3b82f6', warning: '#f59e0b' };
    toast.className = 'toast';
    toast.style.background = colors[type] || colors.success;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} mr-2"></i>${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

// ============================================================
// Load Current Member & Balance
// ============================================================
async function loadCurrentMember() {
    const client = initSupabase();
    if (!client) return;
    
    try {
        const memberId = localStorage.getItem('memberId') || sessionStorage.getItem('memberId');
        if (!memberId) {
            showToast('দয়া করে লগইন করুন!', 'error');
            window.location.href = 'login.html';
            return;
        }
        
        const { data, error } = await client.from('members').select('*').eq('member_id', memberId).single();
        if (error) throw error;
        if (!data) { showToast('সদস্য পাওয়া যায়নি!', 'error'); return; }
        
        currentMember = data;
        document.getElementById('currentBalance').innerHTML = formatAmountWithText(data.balance || 0);
        
        return data;
    } catch(e) {
        console.error('Member load error:', e);
        showToast('সদস্য তথ্য লোড করতে সমস্যা!', 'error');
        return null;
    }
}

// ============================================================
// Search Receiver
// ============================================================
async function searchReceiver() {
    const searchTerm = document.getElementById('receiverSearch').value.trim();
    if (!searchTerm) { showToast('আইডি বা মোবাইল নম্বর দিন!', 'error'); return; }
    
    const client = initSupabase();
    if (!client) return;
    
    try {
        const { data, error } = await client
            .from('members')
            .select('member_id, full_name, mobile, balance')
            .or(`member_id.eq.${searchTerm},mobile.eq.${searchTerm}`)
            .eq('status', 'active')
            .limit(5);
            
        if (error) throw error;
        
        const resultsDiv = document.getElementById('searchResults');
        const receiverInfo = document.getElementById('receiverInfo');
        
        if (!data || data.length === 0) {
            resultsDiv.innerHTML = '<div class="text-red-500 p-3 border border-red-200 rounded-lg">❌ সদস্য পাওয়া যায়নি!</div>';
            resultsDiv.classList.remove('hidden');
            receiverInfo.classList.add('hidden');
            return;
        }
        
        if (data.length === 1 && data[0].member_id === currentMember?.member_id) {
            resultsDiv.innerHTML = '<div class="text-red-500 p-3 border border-red-200 rounded-lg">❌ আপনি নিজেকে টাকা ট্রান্সফার করতে পারেন না!</div>';
            resultsDiv.classList.remove('hidden');
            receiverInfo.classList.add('hidden');
            return;
        }
        
        let html = `<div class="border rounded-lg overflow-hidden bg-white">`;
        data.forEach(m => {
            if (m.member_id === currentMember?.member_id) return;
            html += `
                <div class="member-search-result" onclick="selectReceiver('${m.member_id}', '${m.full_name}', '${m.mobile}')">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-semibold">${m.full_name}</p>
                            <p class="text-sm text-gray-500">🆔 ${m.member_id} | 📱 ${m.mobile}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-gray-400">ব্যালেন্স: ${formatAmountWithText(m.balance || 0)}</span>
                        </div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        
        resultsDiv.innerHTML = html;
        resultsDiv.classList.remove('hidden');
        receiverInfo.classList.add('hidden');
        selectedReceiver = null;
        
    } catch(e) {
        console.error('Search error:', e);
        showToast('সদস্য খোঁজা ব্যর্থ!', 'error');
    }
}

function selectReceiver(memberId, name, mobile) {
    selectedReceiver = { member_id: memberId, full_name: name, mobile: mobile };
    document.getElementById('receiverName').innerHTML = `${name} (${mobile})`;
    document.getElementById('receiverId').innerHTML = `🆔 ${memberId}`;
    document.getElementById('receiverInfo').classList.remove('hidden');
    document.getElementById('searchResults').classList.add('hidden');
    document.getElementById('receiverSearch').value = '';
}

function clearReceiver() {
    selectedReceiver = null;
    document.getElementById('receiverInfo').classList.add('hidden');
    document.getElementById('receiverSearch').value = '';
    document.getElementById('searchResults').classList.add('hidden');
}

// ============================================================
// Submit Transfer – নিরাপদ RPC সংস্করণ (সংশোধিত)
// ============================================================
document.getElementById('transferForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if (!currentMember) { showToast('সদস্য তথ্য লোড হয়নি!', 'error'); return; }
    if (!selectedReceiver) { showToast('গ্রহীতা নির্বাচন করুন!', 'error'); return; }
    if (selectedReceiver.member_id === currentMember.member_id) { showToast('নিজেকে টাকা ট্রান্সফার করা যাবে না!', 'error'); return; }
    
    const amount = parseFloat(document.getElementById('transferAmount').value);
    const note = document.getElementById('transferNote').value.trim();
    
    if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন!', 'error'); return; }
    
    // কনফার্মেশন ডায়ালগ (নিরাপত্তা বাড়ায়)
    if (!confirm(`আপনি কি নিশ্চিত যে ${formatAmount(amount)} টাকা ${selectedReceiver.full_name} কে ট্রান্সফার করতে চান?`)) {
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> প্রক্রিয়াকরণ...';
    
    const client = initSupabase();
    if (!client) { 
        btn.disabled = false; 
        btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> টাকা ট্রান্সফার করুন'; 
        showToast('সংযোগ সমস্যা!', 'error'); 
        return; 
    }
    
    try {
        const transactionId = `TFR-${Date.now()}-${Math.floor(Math.random()*1000)}`;
        
        // ✅ শুধুমাত্র একটি RPC কল – পুরো লেনদেন ডেটাবেসে হয়
        const { data, error } = await client.rpc('transfer_funds', {
            p_sender_id: currentMember.member_id,
            p_receiver_id: selectedReceiver.member_id,
            p_amount: amount,
            p_note: note || null,
            p_transaction_id: transactionId
        });
            
        if (error) throw error;
        
        if (data && data.success) {
            showToast(`✅ ${formatAmount(amount)} টাকা ${selectedReceiver.full_name} এ ট্রান্সফার হয়েছে!`, 'success');
            
            // লোকাল ক্যাশ আপডেট
            currentMember.balance = data.new_balance;
            document.getElementById('currentBalance').innerHTML = formatAmountWithText(data.new_balance);
            
            // ফর্ম রিসেট
            document.getElementById('transferAmount').value = '';
            document.getElementById('transferNote').value = '';
            clearReceiver();
            
            // ইতিহাস রিলোড
            loadTransferHistory();
        } else {
            showToast('❌ ' + (data?.message || 'ট্রান্সফার ব্যর্থ!'), 'error');
        }
        
    } catch(e) {
        console.error('Transfer error:', e);
        showToast('❌ সিস্টেম ত্রুটি! ' + e.message, 'error');
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> টাকা ট্রান্সফার করুন';
});

// ============================================================
// Load Transfer History
// ============================================================
async function loadTransferHistory() {
    const tbody = document.getElementById('historyBody');
    if (!tbody) return;
    
    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8"><div class="loading-spinner"></div><p class="text-gray-500 mt-2">লোড হচ্ছে...</p></td></tr>';
    
    const client = initSupabase();
    if (!client) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">সংযোগ সমস্যা!</td></tr>'; return; }
    
    try {
        const memberId = currentMember?.member_id || localStorage.getItem('memberId');
        if (!memberId) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">লগইন করুন</td></tr>'; return; }
        
        const { data, error } = await client
            .from('fund_transfers')
            .select('*')
            .or(`sender_id.eq.${memberId},receiver_id.eq.${memberId}`)
            .order('requested_at', { ascending: false })
            .limit(50);
            
        if (error) throw error;
        
        allTransfers = data || [];
        
        if (allTransfers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">📭 কোনো ট্রান্সফার ইতিহাস নেই</td></tr>';
            return;
        }
        
        tbody.innerHTML = allTransfers.map(t => {
            const isSender = t.sender_id === memberId;
            const statusBadge = {
                'pending': 'badge-pending',
                'completed': 'badge-completed',
                'failed': 'badge-failed',
                'cancelled': 'badge-cancelled'
            }[t.status] || 'badge-pending';
            
            const statusText = {
                'pending': '⏳ বিচারাধীন',
                'completed': '✅ সম্পন্ন',
                'failed': '❌ ব্যর্থ',
                'cancelled': '⏸️ বাতিল'
            }[t.status] || t.status;
            
            return `
                <tr>
                    <td>${formatDate(t.requested_at)}</td>
                    <td>${isSender ? '👤 আপনি' : t.sender_name || t.sender_id}</td>
                    <td>${!isSender ? '👤 আপনি' : t.receiver_name || t.receiver_id}</td>
                    <td class="text-right font-bold ${isSender ? 'text-red-600' : 'text-emerald-600'}">${isSender ? '-' : '+'}${formatAmountWithText(t.amount)}</td>
                    <td><span class="badge ${statusBadge}">${statusText}</span></td>
                </tr>
            `;
        }).join('');
        
    } catch(e) {
        console.error('History load error:', e);
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-500">❌ ${e.message}</td></tr>`;
    }
}

// ============================================================
// DOM Ready
// ============================================================
document.addEventListener('DOMContentLoaded', async function() {
    await loadCurrentMember();
    await loadTransferHistory();
    
    document.getElementById('receiverSearch')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); searchReceiver(); }
    });
    
    console.log('✅ ফান্ড ট্রান্সফার পেজ লোড হয়েছে (RPC সংস্করণ)');
});

// ============================================================
// Global Exports
// ============================================================
window.searchReceiver = searchReceiver;
window.selectReceiver = selectReceiver;
window.clearReceiver = clearReceiver;
window.loadTransferHistory = loadTransferHistory;
window.formatAmount = formatAmount;
window.formatAmountWithText = formatAmountWithText;
</script>
</body>
</html>
