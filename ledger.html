<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>আয়-ব্যয় লেজার | TUKNBD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: #f3f4f6; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-container { background: white; border-radius: 20px; max-width: 500px; width: 90%; padding: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: 8px; color: white; z-index: 1100; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .category-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .category-income { background: #d1fae5; color: #065f46; }
        .category-expense { background: #fee2e2; color: #991b1b; }
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; }
            @page { size: A4 landscape; margin: 0.5cm; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #ddd; padding: 5px; font-size: 10px; }
        }
        .print-area { display: none; }
    </style>
</head>
<body>

<div class="container mx-auto px-4 py-5 max-w-7xl">

    <!-- হেডার -->
    <div class="flex flex-wrap justify-between items-center gap-3 mb-5 no-print">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='super-admin.html'">
            <img src="images/logo.png" alt="Logo" class="w-10 h-10 rounded-xl object-cover shadow-md" onerror="this.src='https://placehold.co/40x40/059669/white?text=T'">
            <div><span class="font-bold text-xl text-gray-800">TUKNBD</span><p class="text-xs text-gray-500">আয়-ব্যয় লেজার</p></div>
        </div>
        <div class="flex gap-2 flex-wrap">
            <button onclick="window.location.href='super-admin.html'" class="bg-gray-500 text-white px-3 py-2 rounded-lg text-sm"><i class="fas fa-arrow-left mr-1"></i>ড্যাশবোর্ড</button>
            <button onclick="showAddEntryModal()" class="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm"><i class="fas fa-plus mr-1"></i>নতুন এন্ট্রি</button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm"><i class="fas fa-print mr-1"></i>প্রিন্ট</button>
            <button onclick="exportToExcel()" class="bg-green-600 text-white px-3 py-2 rounded-lg text-sm"><i class="fas fa-file-excel mr-1"></i>এক্সেল</button>
        </div>
    </div>

    <!-- ফিল্টার সেকশন -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-5 no-print">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <div><label class="block text-sm font-semibold mb-1">ধরণ</label><select id="filterType" class="w-full p-2 border rounded-lg text-sm"><option value="all">সব</option><option value="income">আয়</option><option value="expense">ব্যয়</option></select></div>
            <div><label class="block text-sm font-semibold mb-1">শুরুর তারিখ</label><input type="date" id="startDate" class="w-full p-2 border rounded-lg text-sm"></div>
            <div><label class="block text-sm font-semibold mb-1">শেষের তারিখ</label><input type="date" id="endDate" class="w-full p-2 border rounded-lg text-sm"></div>
            <div class="flex items-end"><button onclick="applyFilters()" class="w-full bg-emerald-600 text-white p-2 rounded-lg text-sm"><i class="fas fa-search mr-1"></i>ফিল্টার</button></div>
            <div class="flex items-end"><button onclick="resetFilters()" class="w-full bg-gray-500 text-white p-2 rounded-lg text-sm"><i class="fas fa-undo mr-1"></i>রিসেট</button></div>
        </div>
    </div>

    <!-- সারাংশ কার্ড -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5 no-print">
        <div class="bg-white rounded-xl p-4 text-center shadow-sm border-l-4 border-emerald-500"><i class="fas fa-chart-line text-2xl text-emerald-600"></i><p class="text-gray-500 text-sm mt-1">মোট আয়</p><p class="text-2xl font-bold text-emerald-700" id="totalIncomeAmount">০ টাকা</p></div>
        <div class="bg-white rounded-xl p-4 text-center shadow-sm border-l-4 border-red-500"><i class="fas fa-chart-line text-2xl text-red-600"></i><p class="text-gray-500 text-sm mt-1">মোট ব্যয়</p><p class="text-2xl font-bold text-red-700" id="totalExpenseAmount">০ টাকা</p></div>
        <div class="bg-white rounded-xl p-4 text-center shadow-sm border-l-4 border-purple-500"><i class="fas fa-university text-2xl text-purple-600"></i><p class="text-gray-500 text-sm mt-1">ব্যালেন্স</p><p class="text-2xl font-bold text-purple-700" id="balanceAmount">০ টাকা</p></div>
    </div>

    <!-- খাত অনুযায়ী সারাংশ (অতিরিক্ত তথ্য) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5 no-print">
        <div class="bg-white rounded-xl shadow-md p-3">
            <h3 class="font-bold text-emerald-700 text-sm mb-2"><i class="fas fa-chart-pie mr-1"></i>খাত অনুযায়ী আয়</h3>
            <div id="incomeSummaryList" class="text-xs max-h-32 overflow-y-auto">লোড হচ্ছে...</div>
        </div>
        <div class="bg-white rounded-xl shadow-md p-3">
            <h3 class="font-bold text-red-700 text-sm mb-2"><i class="fas fa-chart-pie mr-1"></i>খাত অনুযায়ী ব্যয়</h3>
            <div id="expenseSummaryList" class="text-xs max-h-32 overflow-y-auto">লোড হচ্ছে...</div>
        </div>
    </div>

    <!-- লেজার টেবিল -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden print-area">
        <div class="bg-gray-50 px-4 py-2 border-b"><h3 class="font-bold text-gray-700"><i class="fas fa-book mr-2"></i>আয়-ব্যয় লেজার</h3></div>
        <div class="overflow-x-auto p-3">
            <table class="w-full text-sm border">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-2 border text-left">ক্রম</th>
                        <th class="p-2 border text-left">তারিখ</th>
                        <th class="p-2 border text-left">ধরণ</th>
                        <th class="p-2 border text-left">খাত</th>
                        <th class="p-2 border text-left">বিবরণ</th>
                        <th class="p-2 border text-right">পরিমাণ (টাকা)</th>
                        <th class="p-2 border text-center">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="ledgerTableBody">
                    <tr><td colspan="7" class="text-center p-4 text-gray-500">লোড হচ্ছে...</td></tr>
                </tbody>
                <tfoot class="bg-gray-100 font-bold">
                    <tr>
                        <td colspan="5" class="p-2 border text-right">মোট: </td>
                        <td class="p-2 border text-right text-emerald-700" id="footerTotalAmount">০ টাকা</td>
                        <td class="p-2 border"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<!-- Modal: নতুন এন্ট্রি যোগ করার জন্য -->
<div id="entryModal" class="modal-overlay">
    <div class="modal-container">
        <h3 class="text-lg font-bold mb-3"><i class="fas fa-plus-circle text-emerald-600 mr-2"></i>নতুন লেনদেন এন্ট্রি</h3>
        <form id="entryForm">
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">ধরণ <span class="text-red-500">*</span></label>
                <select id="entryType" class="w-full p-2 border rounded-lg" required onchange="updateCategoryOptions()">
                    <option value="">-- নির্বাচন করুন --</option>
                    <option value="income">আয়</option>
                    <option value="expense">ব্যয়</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">খাত <span class="text-red-500">*</span></label>
                <select id="entryCategory" class="w-full p-2 border rounded-lg" required></select>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">বিবরণ <span class="text-red-500">*</span></label>
                <input type="text" id="entryDescription" placeholder="বিবরণ লিখুন" class="w-full p-2 border rounded-lg" required>
            </div>
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">পরিমাণ (টাকা) <span class="text-red-500">*</span></label>
                <input type="number" id="entryAmount" placeholder="০" class="w-full p-2 border rounded-lg" required min="1">
            </div>
            <div class="mb-3">
                <label class="block text-sm font-semibold mb-1">তারিখ <span class="text-red-500">*</span></label>
                <input type="date" id="entryDate" class="w-full p-2 border rounded-lg" required>
            </div>
            <div class="flex gap-2 mt-4">
                <button type="submit" class="bg-emerald-600 text-white px-4 py-2 rounded-lg flex-1"><i class="fas fa-save mr-1"></i>সংরক্ষণ</button>
                <button type="button" onclick="closeEntryModal()" class="bg-gray-300 px-4 py-2 rounded-lg flex-1">বাতিল</button>
            </div>
        </form>
    </div>
</div>

<script>
// Supabase কনফিগারেশন
const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
let supabaseClient = null;

// গ্লোবাল ভেরিয়েবল
let ledgerEntries = [];
let incomeCategories = [];
let expenseCategories = [];
let currentAdmin = null;

// ইনিশিয়ালাইজেশন
async function init() {
    const adminData = localStorage.getItem('currentAdmin') || sessionStorage.getItem('currentAdmin');
    if(!adminData) { window.location.href = 'admin-login.html'; return; }
    try { currentAdmin = JSON.parse(adminData); } catch(e) { window.location.href = 'admin-login.html'; return; }
    
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    loadCategories();
    loadLedgerEntries();
}

// ক্যাটাগরি লোড
function loadCategories() {
    const savedIncome = localStorage.getItem('tukn_income_categories');
    const savedExpense = localStorage.getItem('tukn_expense_categories');
    
    incomeCategories = savedIncome ? JSON.parse(savedIncome) : [
        { id: 'inc1', name: 'মাসিক সঞ্চয়', isDefault: true },
        { id: 'inc2', name: 'সদস্য ফি', isDefault: true },
        { id: 'inc3', name: 'দান/চাঁদা', isDefault: true },
        { id: 'inc4', name: 'লোন মুনাফা', isDefault: true }
    ];
    
    expenseCategories = savedExpense ? JSON.parse(savedExpense) : [
        { id: 'exp1', name: 'প্রশাসনিক ব্যয়', isDefault: true },
        { id: 'exp2', name: 'প্রশিক্ষণ ব্যয়', isDefault: true },
        { id: 'exp3', name: 'লোন বিতরণ', isDefault: true },
        { id: 'exp4', name: 'অনুদান/দান', isDefault: true }
    ];
}

// লেজার এন্ট্রি লোড
function loadLedgerEntries() {
    const saved = localStorage.getItem('tukn_ledger_entries');
    if(saved) {
        ledgerEntries = JSON.parse(saved);
    } else {
        // ডেমো ডাটা
        ledgerEntries = [
            { id: 1, date: '2024-01-05', type: 'income', category: 'মাসিক সঞ্চয়', description: 'জানুয়ারি মাসিক সঞ্চয়', amount: 5000 },
            { id: 2, date: '2024-01-10', type: 'expense', category: 'প্রশাসনিক ব্যয়', description: 'অফিস ভাড়া', amount: 3000 },
            { id: 3, date: '2024-02-05', type: 'income', category: 'মাসিক সঞ্চয়', description: 'ফেব্রুয়ারি মাসিক সঞ্চয়', amount: 5200 },
            { id: 4, date: '2024-02-15', type: 'expense', category: 'প্রশিক্ষণ ব্যয়', description: 'সদস্য প্রশিক্ষণ', amount: 2000 },
            { id: 5, date: '2024-03-05', type: 'income', category: 'সদস্য ফি', description: 'নতুন সদস্য ভর্তি ফি', amount: 500 },
            { id: 6, date: '2024-03-20', type: 'expense', category: 'অনুদান/দান', description: 'বন্যার্তদের সাহায্য', amount: 1500 }
        ];
        localStorage.setItem('tukn_ledger_entries', JSON.stringify(ledgerEntries));
    }
    renderLedgerTable();
    updateStatistics();
    updateCategorySummaries();
}

// লেজার টেবিল রেন্ডার
function renderLedgerTable() {
    const filterType = document.getElementById('filterType')?.value || 'all';
    const startDate = document.getElementById('startDate')?.value;
    const endDate = document.getElementById('endDate')?.value;
    
    let filtered = [...ledgerEntries];
    
    if(filterType !== 'all') filtered = filtered.filter(e => e.type === filterType);
    if(startDate) filtered = filtered.filter(e => e.date >= startDate);
    if(endDate) filtered = filtered.filter(e => e.date <= endDate);
    
    filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
    
    const tbody = document.getElementById('ledgerTableBody');
    if(filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-gray-500">কোনো এন্ট্রি নেই</td></tr>';
        document.getElementById('footerTotalAmount').innerHTML = '০ টাকা';
        return;
    }
    
    let totalAmount = 0;
    tbody.innerHTML = filtered.map((entry, idx) => {
        totalAmount += entry.amount;
        const typeClass = entry.type === 'income' ? 'text-emerald-600' : 'text-red-600';
        const typeText = entry.type === 'income' ? 'আয়' : 'ব্যয়';
        const categoryClass = entry.type === 'income' ? 'category-income' : 'category-expense';
        
        return `<tr class="border-b hover:bg-gray-50">
            <td class="p-2 border">${idx+1}</td>
            <td class="p-2 border">${new Date(entry.date).toLocaleDateString('bn-BD')}</td>
            <td class="p-2 border"><span class="${typeClass} font-semibold">${typeText}</span></td>
            <td class="p-2 border"><span class="category-badge ${categoryClass}">${entry.category}</span></td>
            <td class="p-2 border">${entry.description}</td>
            <td class="p-2 border text-right font-semibold ${typeClass}">${entry.amount.toLocaleString()} টাকা</td>
            <td class="p-2 border text-center">
                <button onclick="editEntry(${entry.id})" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button>
                <button onclick="deleteEntry(${entry.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`;
    }).join('');
    
    document.getElementById('footerTotalAmount').innerHTML = totalAmount.toLocaleString() + ' টাকা';
}

// পরিসংখ্যান আপডেট
function updateStatistics() {
    let totalIncome = 0, totalExpense = 0;
    ledgerEntries.forEach(entry => {
        if(entry.type === 'income') totalIncome += entry.amount;
        else totalExpense += entry.amount;
    });
    const balance = totalIncome - totalExpense;
    
    document.getElementById('totalIncomeAmount').innerHTML = totalIncome.toLocaleString() + ' টাকা';
    document.getElementById('totalExpenseAmount').innerHTML = totalExpense.toLocaleString() + ' টাকা';
    document.getElementById('balanceAmount').innerHTML = balance.toLocaleString() + ' টাকা';
}

// খাত অনুযায়ী সারাংশ
function updateCategorySummaries() {
    // আয়ের খাত অনুযায়ী যোগফল
    const incomeSummary = {};
    incomeCategories.forEach(cat => incomeSummary[cat.name] = 0);
    ledgerEntries.filter(e => e.type === 'income').forEach(e => {
        if(incomeSummary[e.category] !== undefined) incomeSummary[e.category] += e.amount;
        else incomeSummary[e.category] = e.amount;
    });
    
    const incomeDiv = document.getElementById('incomeSummaryList');
    incomeDiv.innerHTML = Object.entries(incomeSummary).map(([cat, amt]) => 
        `<div class="flex justify-between border-b py-1"><span>${cat}</span><span class="font-semibold text-emerald-600">${amt.toLocaleString()} টাকা</span></div>`
    ).join('');
    if(Object.keys(incomeSummary).length === 0) incomeDiv.innerHTML = '<div class="text-gray-400">কোনো আয় নেই</div>';
    
    // ব্যয়ের খাত অনুযায়ী যোগফল
    const expenseSummary = {};
    expenseCategories.forEach(cat => expenseSummary[cat.name] = 0);
    ledgerEntries.filter(e => e.type === 'expense').forEach(e => {
        if(expenseSummary[e.category] !== undefined) expenseSummary[e.category] += e.amount;
        else expenseSummary[e.category] = e.amount;
    });
    
    const expenseDiv = document.getElementById('expenseSummaryList');
    expenseDiv.innerHTML = Object.entries(expenseSummary).map(([cat, amt]) => 
        `<div class="flex justify-between border-b py-1"><span>${cat}</span><span class="font-semibold text-red-600">${amt.toLocaleString()} টাকা</span></div>`
    ).join('');
    if(Object.keys(expenseSummary).length === 0) expenseDiv.innerHTML = '<div class="text-gray-400">কোনো ব্যয় নেই</div>';
}

// নতুন এন্ট্রি যোগ করার মডাল দেখান
function showAddEntryModal() {
    document.getElementById('entryType').value = '';
    document.getElementById('entryCategory').innerHTML = '<option value="">-- প্রথমে ধরণ নির্বাচন করুন --</option>';
    document.getElementById('entryDescription').value = '';
    document.getElementById('entryAmount').value = '';
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('entryModal').classList.add('active');
}

function closeEntryModal() {
    document.getElementById('entryModal').classList.remove('active');
    document.getElementById('entryForm').reset();
}

// ধরণ অনুযায়ী ক্যাটাগরি অপশন আপডেট
function updateCategoryOptions() {
    const type = document.getElementById('entryType').value;
    const categorySelect = document.getElementById('entryCategory');
    
    if(!type) {
        categorySelect.innerHTML = '<option value="">-- প্রথমে ধরণ নির্বাচন করুন --</option>';
        return;
    }
    
    const categories = type === 'income' ? incomeCategories : expenseCategories;
    categorySelect.innerHTML = '<option value="">-- নির্বাচন করুন --</option>' + 
        categories.map(cat => `<option value="${cat.name}">${cat.name}</option>`).join('');
}

// এন্ট্রি সংরক্ষণ
document.getElementById('entryForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const type = document.getElementById('entryType').value;
    const category = document.getElementById('entryCategory').value;
    const description = document.getElementById('entryDescription').value.trim();
    const amount = parseInt(document.getElementById('entryAmount').value);
    const date = document.getElementById('entryDate').value;
    
    if(!type || !category || !description || !amount || !date) {
        showToast('সব তথ্য পূরণ করুন!', 'error');
        return;
    }
    
    const newEntry = {
        id: Date.now(),
        date: date,
        type: type,
        category: category,
        description: description,
        amount: amount
    };
    
    ledgerEntries.push(newEntry);
    localStorage.setItem('tukn_ledger_entries', JSON.stringify(ledgerEntries));
    
    renderLedgerTable();
    updateStatistics();
    updateCategorySummaries();
    closeEntryModal();
    showToast('এন্ট্রি যুক্ত করা হয়েছে!', 'success');
});

// এন্ট্রি এডিট
function editEntry(id) {
    const entry = ledgerEntries.find(e => e.id === id);
    if(!entry) return;
    
    document.getElementById('entryType').value = entry.type;
    updateCategoryOptions();
    setTimeout(() => {
        document.getElementById('entryCategory').value = entry.category;
    }, 50);
    document.getElementById('entryDescription').value = entry.description;
    document.getElementById('entryAmount').value = entry.amount;
    document.getElementById('entryDate').value = entry.date;
    
    document.getElementById('entryModal').classList.add('active');
    
    // পুরোনো এন্ট্রি ডিলিট করে নতুন করে যোগ করার জন্য ফর্ম সাবমিট ওভাররাইড
    const form = document.getElementById('entryForm');
    const oldSubmit = form.onsubmit;
    form.onsubmit = function(e) {
        e.preventDefault();
        
        // পুরোনো এন্ট্রি ডিলিট
        ledgerEntries = ledgerEntries.filter(e => e.id !== id);
        
        const type = document.getElementById('entryType').value;
        const category = document.getElementById('entryCategory').value;
        const description = document.getElementById('entryDescription').value.trim();
        const amount = parseInt(document.getElementById('entryAmount').value);
        const date = document.getElementById('entryDate').value;
        
        const newEntry = { id: Date.now(), date: date, type: type, category: category, description: description, amount: amount };
        ledgerEntries.push(newEntry);
        localStorage.setItem('tukn_ledger_entries', JSON.stringify(ledgerEntries));
        
        renderLedgerTable();
        updateStatistics();
        updateCategorySummaries();
        closeEntryModal();
        showToast('এন্ট্রি আপডেট করা হয়েছে!', 'success');
        
        form.onsubmit = oldSubmit;
    };
}

// এন্ট্রি ডিলিট
function deleteEntry(id) {
    if(!confirm('এই এন্ট্রি ডিলিট করবেন?')) return;
    ledgerEntries = ledgerEntries.filter(e => e.id !== id);
    localStorage.setItem('tukn_ledger_entries', JSON.stringify(ledgerEntries));
    renderLedgerTable();
    updateStatistics();
    updateCategorySummaries();
    showToast('এন্ট্রি ডিলিট করা হয়েছে!', 'success');
}

// ফিল্টার ফাংশন
function applyFilters() { renderLedgerTable(); }
function resetFilters() {
    document.getElementById('filterType').value = 'all';
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value = '';
    renderLedgerTable();
}

// এক্সেল এক্সপোর্ট
function exportToExcel() {
    let csv = "তারিখ,ধরণ,খাত,বিবরণ,পরিমাণ (টাকা)\n";
    ledgerEntries.forEach(entry => {
        csv += `"${entry.date}","${entry.type === 'income' ? 'আয়' : 'ব্যয়'}","${entry.category}","${entry.description}","${entry.amount}"\n`;
    });
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `ledger_${new Date().toISOString().split('T')[0]}.csv`; a.click(); URL.revokeObjectURL(a.href);
    showToast('এক্সপোর্ট সম্পূর্ণ!', 'success');
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// গ্লোবাল ফাংশন
window.showAddEntryModal = showAddEntryModal;
window.closeEntryModal = closeEntryModal;
window.updateCategoryOptions = updateCategoryOptions;
window.editEntry = editEntry;
window.deleteEntry = deleteEntry;
window.applyFilters = applyFilters;
window.resetFilters = resetFilters;
window.exportToExcel = exportToExcel;

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
