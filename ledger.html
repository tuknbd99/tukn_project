<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>আয়-ব্যয় লেজার | TUKNBD অ্যাডমিন</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-functions.js"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .watermark-container { position: relative; min-height: 100vh; background: #f3f4f6; }
        .watermark-container::before { content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; height: 350px; background-image: url('images/logo.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.04; pointer-events: none; z-index: 0; }
        .watermark-content { position: relative; z-index: 1; }
        
        .ledger-table {
            border-collapse: collapse;
            width: 100%;
        }
        
        .ledger-table th,
        .ledger-table td {
            padding: 4px 6px !important;
            line-height: 1.2 !important;
            font-size: 12px !important;
        }
        
        .ledger-table thead th {
            padding: 6px 6px !important;
            background-color: #f3f4f6;
        }
        
        .ledger-table tfoot td {
            padding: 4px 6px !important;
        }
        
        /* প্রিন্ট স্টাইল - লোগো উপরে + প্রিন্টার তথ্য */
        @media print {
            body * {
                visibility: hidden;
            }
            .print-area, .print-area * {
                visibility: visible;
            }
            .print-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 0.2in;
                background: white;
                z-index: 9999;
            }
            .no-print {
                display: none !important;
            }
            .print-header {
                display: block !important;
                text-align: center;
                margin-bottom: 15px;
                border-bottom: 2px solid #059669;
                padding-bottom: 10px;
            }
            .print-header-logo {
                display: block !important;
                width: 60px;
                height: 60px;
                margin: 0 auto 8px auto;
                object-fit: contain;
            }
            .print-header-text h2 {
                font-size: 18px;
                font-weight: bold;
                color: #059669;
                margin: 0;
            }
            .print-header-text p {
                font-size: 12px;
                color: #4b5563;
                margin: 3px 0 0 0;
            }
            .print-header-text .date {
                font-size: 10px;
                color: #9ca3af;
                margin-top: 5px;
            }
            .print-footer {
                display: block !important;
                text-align: center;
                margin-top: 15px;
                padding-top: 8px;
                border-top: 1px solid #ddd;
                font-size: 9px;
                color: #6b7280;
            }
            @page {
                size: A4 portrait;
                margin: 0.3in;
            }
            .ledger-table th,
            .ledger-table td {
                padding: 2px 4px !important;
                font-size: 9px !important;
                line-height: 1.1 !important;
            }
        }
        
        .print-header {
            display: none;
        }
        .print-header-logo {
            display: none;
        }
        .print-footer {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 watermark-container">

<div class="watermark-content container mx-auto px-4 py-6 max-w-7xl">
    <!-- হেডার -->
    <div class="flex justify-between items-center mb-6 no-print">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='super-admin.html'">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-10 h-10 rounded-xl object-cover shadow-md" onerror="this.src='https://placehold.co/40x40/059669/white?text=T'">
            <div><span class="font-bold text-xl text-gray-800">TUKNBD</span><p class="text-xs text-gray-500">আয়-ব্যয় লেজার</p></div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.location.href='super-admin.html'" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition"><i class="fas fa-arrow-left mr-2"></i>ড্যাশবোর্ড</button>
            <button onclick="printPortrait()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition"><i class="fas fa-print mr-2"></i>প্রিন্ট (পোর্ট্রেট)</button>
            <button onclick="printLandscape()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition"><i class="fas fa-print mr-2"></i>প্রিন্ট (ল্যান্ডস্কেপ)</button>
            <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition"><i class="fas fa-file-excel mr-2"></i>এক্সেল</button>
        </div>
    </div>

    <!-- ফিল্টার সেকশন -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6 no-print">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">টাইপ</label>
                <select id="filterType" class="w-full p-2 border rounded-lg">
                    <option value="all">সব</option>
                    <option value="income">আয়</option>
                    <option value="expense">ব্যয়</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">বছর</label>
                <select id="filterYear" class="w-full p-2 border rounded-lg"></select>
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">মাস</label>
                <select id="filterMonth" class="w-full p-2 border rounded-lg"></select>
            </div>
            <div class="flex items-end">
                <button onclick="applyFilter()" class="w-full bg-emerald-600 text-white p-2 rounded-lg hover:bg-emerald-700 transition">ফিল্টার করুন</button>
            </div>
        </div>
    </div>

    <!-- সারাংশ কার্ড -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 no-print">
        <div class="bg-white rounded-xl p-4 text-center shadow-md"><i class="fas fa-chart-line text-2xl text-emerald-600"></i><p class="text-gray-500 text-sm mt-1">মোট আয়</p><p class="text-2xl font-bold text-emerald-700" id="totalIncome">০</p></div>
        <div class="bg-white rounded-xl p-4 text-center shadow-md"><i class="fas fa-chart-line text-2xl text-red-600"></i><p class="text-gray-500 text-sm mt-1">মোট ব্যয়</p><p class="text-2xl font-bold text-red-700" id="totalExpense">০</p></div>
        <div class="bg-white rounded-xl p-4 text-center shadow-md"><i class="fas fa-hand-holding-usd text-2xl text-amber-600"></i><p class="text-gray-500 text-sm mt-1">নীট লাভ</p><p class="text-2xl font-bold text-amber-700" id="netProfit">০</p></div>
        <div class="bg-white rounded-xl p-4 text-center shadow-md"><i class="fas fa-university text-2xl text-purple-600"></i><p class="text-gray-500 text-sm mt-1">বর্তমান ব্যালেন্স</p><p class="text-2xl font-bold text-purple-700" id="currentBalance">০</p></div>
    </div>

    <!-- লেজার টেবিল - প্রিন্ট এরিয়া -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden print-area">
        <div class="print-header">
            <img src="images/logo.png" alt="TUKNBD Logo" class="print-header-logo" onerror="this.style.display='none'">
            <div class="print-header-text">
                <h2>ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</h2>
                <p>আয়-ব্যয় লেজার</p>
                <div class="date">প্রিন্ট তারিখ: <span id="printDate"></span></div>
            </div>
        </div>
        
        <div class="bg-emerald-50 px-5 py-2 border-b no-print">
            <h3 class="font-bold text-emerald-700 text-sm"><i class="fas fa-book mr-2"></i>আয়-ব্যয় লেজার</h3>
        </div>
        
        <div class="overflow-x-auto p-3">
            <table class="ledger-table min-w-full border">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-3 border text-left">তারিখ</th>
                        <th class="p-3 border text-left">বিবরণ</th>
                        <th class="p-3 border text-left">ধরন</th>
                        <th class="p-3 border text-right">আয়</th>
                        <th class="p-3 border text-right">ব্যয়</th>
                        <th class="p-3 border text-right">ব্যালেন্স</th>
                        <th class="p-3 border text-center no-print">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="ledgerTableBody"></tbody>
                <tfoot class="bg-gray-100 font-bold">
                    <tr>
                        <td colspan="3" class="p-3 text-right border">মোট:</td>
                        <td class="p-3 text-right border" id="totalIncomeFoot">০/-</td>
                        <td class="p-3 text-right border" id="totalExpenseFoot">০/-</td>
                        <td class="p-3 text-right border" id="balanceFoot">০/-</td>
                        <td class="p-3 border no-print"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
        
        <!-- প্রিন্ট ফুটার - প্রিন্টার তথ্য সহ -->
        <div class="print-footer">
            <span id="printedByInfo"></span>
        </div>
    </div>

    <!-- নতুন লেনদেন যোগ (অ্যাডমিন) -->
    <div class="bg-white rounded-xl shadow-md p-6 mt-8 no-print">
        <h3 class="text-xl font-bold text-emerald-700 mb-4"><i class="fas fa-plus-circle mr-2"></i>নতুন লেনদেন যোগ করুন</h3>
        <form id="transactionForm" class="grid grid-cols-1 md:grid-cols-6 gap-3">
            <input type="date" id="transDate" required class="p-2 border rounded-lg text-sm">
            <input type="text" id="transDescription" placeholder="বিবরণ" required class="p-2 border rounded-lg text-sm">
            <select id="transType" required class="p-2 border rounded-lg text-sm">
                <option value="income">আয়</option>
                <option value="expense">ব্যয়</option>
            </select>
            <div class="relative">
                <select id="transCategory" required class="w-full p-2 border rounded-lg text-sm">
                    <option value="">নির্বাচন করুন</option>
                </select>
                <div id="newCategoryContainer" class="hidden mt-2">
                    <input type="text" id="newCategoryName" placeholder="নতুন খাতের নাম" class="w-full p-2 border rounded-lg text-sm mb-2">
                    <button type="button" onclick="addNewCategory()" class="w-full bg-emerald-600 text-white p-2 rounded-lg hover:bg-emerald-700 text-sm">যোগ করুন</button>
                </div>
                <button type="button" id="showNewCategoryBtn" class="mt-1 text-xs text-emerald-600 hover:text-emerald-700">+ নতুন খাত তৈরি করুন</button>
            </div>
            <input type="number" id="transAmount" placeholder="পরিমাণ" required class="p-2 border rounded-lg text-sm">
            <button type="submit" class="bg-emerald-600 text-white p-2 rounded-lg hover:bg-emerald-700 transition text-sm">যোগ করুন</button>
        </form>
    </div>
</div>

<script>
    // ==================== বর্তমান লগইন করা অ্যাডমিনের তথ্য নেওয়া ====================
    function getCurrentAdminInfo() {
        try {
            const adminData = sessionStorage.getItem('currentAdmin') || localStorage.getItem('currentAdmin');
            if(adminData) {
                const admin = JSON.parse(adminData);
                return {
                    name: admin.name || admin.username || 'অজ্ঞাত',
                    id: admin.id || admin.username || 'N/A',
                    role: admin.role || 'অ্যাডমিন'
                };
            }
        } catch(e) {
            console.error('অ্যাডমিন তথ্য পেতে সমস্যা:', e);
        }
        return { name: 'অজ্ঞাত', id: 'N/A', role: 'অ্যাডমিন' };
    }
    
    // ==================== প্রিন্ট ফুটার আপডেট করা ====================
    function updatePrintedByInfo() {
        const admin = getCurrentAdminInfo();
        const now = new Date();
        const dateStr = now.toLocaleDateString('bn-BD');
        const timeStr = now.toLocaleTimeString('bn-BD');
        
        const printedByText = `প্রিন্ট করেছেন: ${admin.name} (আইডি: ${admin.id}) | পদ: ${admin.role} | প্রিন্ট তারিখ: ${dateStr} | সময়: ${timeStr}`;
        
        const footerElement = document.getElementById('printedByInfo');
        if(footerElement) {
            footerElement.innerHTML = printedByText;
        }
    }
    
    // ==================== URL থেকে বছর প্যারামিটার নেওয়া ====================
    function getYearFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const year = urlParams.get('year');
        if(year && document.getElementById('filterYear')) {
            const yearSelect = document.getElementById('filterYear');
            if(yearSelect) {
                for(let i = 0; i < yearSelect.options.length; i++) {
                    if(yearSelect.options[i].value == year) {
                        yearSelect.selectedIndex = i;
                        break;
                    }
                }
                applyFilter();
            }
        }
    }
    
    // ==================== ফিল্টার অপশন পপুলেট করুন (৫০ বছর পর্যন্ত) ====================
    function populateFilters() {
        const yearSelect = document.getElementById('filterYear');
        const monthSelect = document.getElementById('filterMonth');
        
        // বর্তমান বছর থেকে শুরু করে আগামী ৫০ বছর পর্যন্ত
        const currentYear = new Date().getFullYear();
        const startYear = currentYear;      // ২০২৬ থেকে শুরু
        const endYear = currentYear + 50;   // ২০৭৬ পর্যন্ত
        
        yearSelect.innerHTML = '<option value="">সব বছর</option>';
        for(let year = startYear; year <= endYear; year++) {
            yearSelect.innerHTML += `<option value="${year}">${year}</option>`;
        }
        
        const months = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];
        monthSelect.innerHTML = '<option value="">সব মাস</option>';
        months.forEach((month, index) => {
            monthSelect.innerHTML += `<option value="${index + 1}">${month}</option>`;
        });
    }
    
    // ==================== ক্যাটাগরি লিস্ট ====================
    let incomeCategories = ['সদস্য ফি', 'মাসিক সঞ্চয়', 'বিনিয়োগ লাভ', 'দান', 'অন্যান্য আয়'];
    let expenseCategories = ['প্রশিক্ষণ ব্যয়', 'পরিচালনা ব্যয়', 'বেতন-ভাতা', 'জরুরি তহবিল', 'অন্যান্য ব্যয়'];
    
    function loadCategories() {
        const savedIncome = localStorage.getItem('income_categories');
        const savedExpense = localStorage.getItem('expense_categories');
        if(savedIncome) incomeCategories = JSON.parse(savedIncome);
        if(savedExpense) expenseCategories = JSON.parse(savedExpense);
    }
    
    function saveCategories() {
        localStorage.setItem('income_categories', JSON.stringify(incomeCategories));
        localStorage.setItem('expense_categories', JSON.stringify(expenseCategories));
    }
    
    function updateCategoryDropdown() {
        const transType = document.getElementById('transType').value;
        const categorySelect = document.getElementById('transCategory');
        const categories = transType === 'income' ? incomeCategories : expenseCategories;
        
        categorySelect.innerHTML = '<option value="">নির্বাচন করুন</option>';
        categories.forEach(cat => {
            categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
        });
    }
    
    function addNewCategory() {
        const newCategoryName = document.getElementById('newCategoryName').value.trim();
        if(!newCategoryName) {
            alert('খাতের নাম দিন');
            return;
        }
        
        const transType = document.getElementById('transType').value;
        if(transType === 'income') {
            incomeCategories.push(newCategoryName);
        } else {
            expenseCategories.push(newCategoryName);
        }
        saveCategories();
        updateCategoryDropdown();
        
        document.getElementById('transCategory').value = newCategoryName;
        document.getElementById('newCategoryName').value = '';
        document.getElementById('newCategoryContainer').classList.add('hidden');
        document.getElementById('showNewCategoryBtn').style.display = 'inline-block';
        
        alert(`"${newCategoryName}" খাত তৈরি করা হয়েছে`);
    }
    
    // ==================== ট্রানজেকশন ফাংশন ====================
    function getTransactions() { return JSON.parse(localStorage.getItem('tukn_transactions') || '[]'); }
    function saveTransactions(transactions) { localStorage.setItem('tukn_transactions', JSON.stringify(transactions)); }
    
    function initDefaultTransactions() {
        let transactions = getTransactions();
        if(transactions.length === 0) {
            transactions = [
                { id: 1, date: '2026-01-05', description: 'জানুয়ারি মাসের সঞ্চয় সংগ্রহ', type: 'income', amount: 50000, category: 'মাসিক সঞ্চয়', createdAt: new Date().toISOString() },
                { id: 2, date: '2026-01-10', description: 'অফিস ভাড়া প্রদান', type: 'expense', amount: 10000, category: 'পরিচালনা ব্যয়', createdAt: new Date().toISOString() },
                { id: 3, date: '2026-02-05', description: 'ফেব্রুয়ারি মাসের সঞ্চয় সংগ্রহ', type: 'income', amount: 52000, category: 'মাসিক সঞ্চয়', createdAt: new Date().toISOString() },
                { id: 4, date: '2026-02-15', description: 'প্রশিক্ষণ অনুষ্ঠান', type: 'expense', amount: 8000, category: 'প্রশিক্ষণ ব্যয়', createdAt: new Date().toISOString() },
                { id: 5, date: '2026-03-05', description: 'মার্চ মাসের সঞ্চয় সংগ্রহ', type: 'income', amount: 55000, category: 'মাসিক সঞ্চয়', createdAt: new Date().toISOString() },
                { id: 6, date: '2026-03-20', description: 'দান প্রাপ্তি', type: 'income', amount: 15000, category: 'দান', createdAt: new Date().toISOString() },
                { id: 7, date: '2026-03-25', description: 'স্টাফ বেতন', type: 'expense', amount: 12000, category: 'বেতন-ভাতা', createdAt: new Date().toISOString() }
            ];
            saveTransactions(transactions);
        }
    }
    
    function formatNumberWithSlash(num) {
        if(num === 0 || num === null || num === undefined) return '০/-';
        return num.toLocaleString() + '/-';
    }
    
    function renderLedger() {
        let transactions = getTransactions();
        
        const filterType = document.getElementById('filterType').value;
        const filterYear = document.getElementById('filterYear').value;
        const filterMonth = document.getElementById('filterMonth').value;
        
        let filtered = [...transactions];
        if(filterType !== 'all') filtered = filtered.filter(t => t.type === filterType);
        if(filterYear) filtered = filtered.filter(t => new Date(t.date).getFullYear() == filterYear);
        if(filterMonth) filtered = filtered.filter(t => new Date(t.date).getMonth() + 1 == filterMonth);
        
        filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
        
        let balance = 0;
        let totalIncome = 0, totalExpense = 0;
        
        const tbody = document.getElementById('ledgerTableBody');
        tbody.innerHTML = filtered.map(t => {
            if(t.type === 'income') {
                balance += t.amount;
                totalIncome += t.amount;
            } else {
                balance -= t.amount;
                totalExpense += t.amount;
            }
            return `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-2 border text-left">${new Date(t.date).toLocaleDateString('bn-BD')}</td>
                    <td class="p-2 border text-left">${t.description}${t.category ? ` (${t.category})` : ''}</td>
                    <td class="p-2 border text-left"><span class="px-2 py-0.5 rounded-full text-xs ${t.type === 'income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${t.type === 'income' ? 'আয়' : 'ব্যয়'}</span></td>
                    <td class="p-2 border text-right">${t.type === 'income' ? formatNumberWithSlash(t.amount) : '-'}</td>
                    <td class="p-2 border text-right">${t.type === 'expense' ? formatNumberWithSlash(t.amount) : '-'}</td>
                    <td class="p-2 border text-right font-semibold">${formatNumberWithSlash(balance)}</td>
                    <td class="p-2 border text-center no-print"><button onclick="deleteTransaction(${t.id})" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button></td>
                </tr>
            `;
        }).join('');
        
        if(filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center p-3 text-gray-500">কোনো লেনদেন নেই</td></tr>';
        }
        
        document.getElementById('totalIncomeFoot').innerHTML = formatNumberWithSlash(totalIncome);
        document.getElementById('totalExpenseFoot').innerHTML = formatNumberWithSlash(totalExpense);
        document.getElementById('balanceFoot').innerHTML = formatNumberWithSlash(balance);
        
        document.getElementById('totalIncome').innerHTML = totalIncome.toLocaleString();
        document.getElementById('totalExpense').innerHTML = totalExpense.toLocaleString();
        document.getElementById('netProfit').innerHTML = (totalIncome - totalExpense).toLocaleString();
        
        let allBalance = 0;
        getTransactions().forEach(t => {
            if(t.type === 'income') allBalance += t.amount;
            else allBalance -= t.amount;
        });
        document.getElementById('currentBalance').innerHTML = allBalance.toLocaleString();
        
        document.getElementById('printDate').innerHTML = new Date().toLocaleString('bn-BD');
    }
    
    function applyFilter() { renderLedger(); }
    
    function deleteTransaction(id) {
        if(confirm('এই লেনদেনটি ডিলিট করবেন?')) {
            let transactions = getTransactions();
            transactions = transactions.filter(t => t.id !== id);
            saveTransactions(transactions);
            renderLedger();
            showToast('লেনদেন ডিলিট করা হয়েছে', 'success');
        }
    }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function exportToExcel() {
        let transactions = getTransactions();
        let csv = "তারিখ,বিবরণ,ধরন,পরিমাণ,ক্যাটাগরি\n";
        transactions.forEach(t => {
            csv += `${new Date(t.date).toLocaleDateString('bn-BD')},${t.description},${t.type === 'income' ? 'আয়' : 'ব্যয়'},${t.amount},${t.category}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ledger_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('এক্সেল রিপোর্ট ডাউনলোড শুরু হয়েছে', 'success');
    }
    
    // প্রিন্ট ফাংশন - পোর্ট্রেট (লোগো উপরে + প্রিন্টার তথ্য সহ)
    function printPortrait() {
        updatePrintedByInfo();  // প্রিন্ট করার আগে প্রিন্টারের তথ্য আপডেট করুন
        let style = document.createElement('style');
        style.id = 'printOrientation';
        style.innerHTML = `@media print { @page { size: A4 portrait !important; margin: 0.3in !important; } }`;
        document.head.appendChild(style);
        document.getElementById('printDate').innerHTML = new Date().toLocaleString('bn-BD');
        setTimeout(() => { 
            window.print(); 
            setTimeout(() => { style.remove(); }, 100); 
        }, 100);
    }
    
    // প্রিন্ট ফাংশন - ল্যান্ডস্কেপ (লোগো উপরে + প্রিন্টার তথ্য সহ)
    function printLandscape() {
        updatePrintedByInfo();  // প্রিন্ট করার আগে প্রিন্টারের তথ্য আপডেট করুন
        let style = document.createElement('style');
        style.id = 'printOrientation';
        style.innerHTML = `@media print { @page { size: A4 landscape !important; margin: 0.2in !important; } }`;
        document.head.appendChild(style);
        document.getElementById('printDate').innerHTML = new Date().toLocaleString('bn-BD');
        setTimeout(() => { 
            window.print(); 
            setTimeout(() => { style.remove(); }, 100); 
        }, 100);
    }
    
    document.getElementById('transactionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const transactions = getTransactions();
        const newId = transactions.length > 0 ? Math.max(...transactions.map(t => t.id)) + 1 : 1;
        
        const newTransaction = {
            id: newId,
            date: document.getElementById('transDate').value,
            description: document.getElementById('transDescription').value,
            type: document.getElementById('transType').value,
            amount: parseFloat(document.getElementById('transAmount').value),
            category: document.getElementById('transCategory').value,
            createdAt: new Date().toISOString()
        };
        
        if(!newTransaction.date || !newTransaction.description || !newTransaction.amount || newTransaction.amount <= 0 || !newTransaction.category) {
            alert('সব ঘর সঠিকভাবে পূরণ করুন।');
            return;
        }
        
        transactions.push(newTransaction);
        saveTransactions(transactions);
        renderLedger();
        
        this.reset();
        document.getElementById('transDate').valueAsDate = new Date();
        showToast('নতুন লেনদেন যোগ করা হয়েছে', 'success');
    });
    
    document.getElementById('transType').addEventListener('change', function() {
        updateCategoryDropdown();
        document.getElementById('newCategoryContainer').classList.add('hidden');
        document.getElementById('showNewCategoryBtn').style.display = 'inline-block';
    });
    
    document.getElementById('showNewCategoryBtn').addEventListener('click', function() {
        const container = document.getElementById('newCategoryContainer');
        if(container.classList.contains('hidden')) {
            container.classList.remove('hidden');
            this.style.display = 'none';
        } else {
            container.classList.add('hidden');
            this.style.display = 'inline-block';
        }
    });
    
    function checkAdminLogin() {
        const adminLoggedIn = sessionStorage.getItem('adminLoggedIn') || localStorage.getItem('adminLoggedIn');
        if(!adminLoggedIn) {
            window.location.href = 'admin-login.html';
        }
    }
    
    // ==================== পেজ লোড হলে সবকিছু সেটআপ করুন ====================
    loadCategories();
    checkAdminLogin();
    populateFilters();
    initDefaultTransactions();
    renderLedger();
    updateCategoryDropdown();
    document.getElementById('transDate').valueAsDate = new Date();
    getYearFromURL();
</script>
</body>
</html>
