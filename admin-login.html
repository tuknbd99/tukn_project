<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <!-- Tailwind CSS Production CDN (Minified) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #0b1c2c 0%, #1a3a4a 100%); min-height: 100vh; }
        .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .loading { display: none; text-align: center; margin-top: 15px; color: #059669; }
        
        /* লগইন বাটনের স্টাইল */
/* লগইন বাটনের স্টাইল */
.login-btn {
    background-color: #059669 !important;
    color: white !important;
    padding: 12px 20px !important;
    border-radius: 8px !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: 600 !important;
    font-size: 16px !important;
    width: 100% !important;
}

.login-btn:hover {
    background-color: #047857 !important;
}

.login-btn:hover {
    background-color: #047857 !important;
}
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card rounded-2xl shadow-2xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-md" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h2 class="text-2xl font-bold text-gray-800 mt-3">অ্যাডমিন লগইন</h2>
            <p class="text-gray-500 text-sm">ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</p>
        </div>
        
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ইউজারনেম</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">পাসওয়ার্ড</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
            <div id="loadingMsg" class="loading">
                <i class="fas fa-spinner fa-spin mr-2"></i> সংযোগ স্থাপন হচ্ছে...
            </div>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-emerald-600 hover:text-emerald-700">← হোমপেজে ফিরুন</a>
        </div>
    </div>

    <script>
        // ========== Supabase কনফিগারেশন ==========
        const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
        
        let supabaseClient = null;
        
        // ========== Supabase ইনিশিয়ালাইজেশন ==========
        async function initSupabase() {
            let attempts = 0;
            const maxAttempts = 30;
            
            while (attempts < maxAttempts) {
                if (window.supabase && typeof window.supabase.createClient === 'function') {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    window.supabaseClient = supabaseClient;
                    console.log('✅ Supabase initialized');
                    return true;
                }
                await new Promise(resolve => setTimeout(resolve, 300));
                attempts++;
            }
            
            console.error('❌ Supabase failed to load');
            return false;
        }
        
        // ========== লগইন ফাংশন ==========
        async function doLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loadingMsg = document.getElementById('loadingMsg');
            
            if (!username || !password) {
                alert('ইউজারনেম এবং পাসওয়ার্ড দিন!');
                return;
            }
            
            // লোডিং দেখান
            loginBtn.disabled = true;
            loadingMsg.style.display = 'block';
            
            // Supabase তৈরি করুন
            if (!supabaseClient) {
                const initialized = await initSupabase();
                if (!initialized) {
                    alert('সার্ভার সংযোগ ব্যর্থ! পেজ রিফ্রেশ করুন।');
                    loginBtn.disabled = false;
                    loadingMsg.style.display = 'none';
                    return;
                }
            }
            
            try {
                console.log('Trying login for:', username);
                
                const { data, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();
                
                if (error) {
                    console.error('Query error:', error);
                    alert('ডাটাবেস সংযোগে সমস্যা!');
                    loginBtn.disabled = false;
                    loadingMsg.style.display = 'none';
                    return;
                }
                
                let adminData = data;
                
                // Supabase এ না থাকলে ডিফল্ট সুপার অ্যাডমিন চেক করুন
                if (!adminData) {
                    if (username === 'superadmin' && password === 'admin123') {
                        adminData = {
                            id: 1,
                            username: 'superadmin',
                            name: 'সুপার অ্যাডমিন',
                            role: 'সুপার অ্যাডমিন'
                        };
                    } else if (username === 'admin' && password === 'admin123') {
                        adminData = {
                            id: 2,
                            username: 'admin',
                            name: 'অ্যাডমিন',
                            role: 'অ্যাডমিন'
                        };
                    } else {
                        alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                        loginBtn.disabled = false;
                        loadingMsg.style.display = 'none';
                        return;
                    }
                } else if (adminData.password !== password) {
                    alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                    loginBtn.disabled = false;
                    loadingMsg.style.display = 'none';
                    return;
                }
                
                // ========== লগইন সফল - loginTime যোগ করুন (অটো লগআউটের জন্য গুরুত্বপূর্ণ!) ==========
                const adminInfo = {
                    id: adminData.id,
                    username: adminData.username,
                    name: adminData.name || adminData.username,
                    role: adminData.role || (username === 'superadmin' ? 'সুপার অ্যাডমিন' : 'অ্যাডমিন'),
                    loginTime: Date.now(),  // 🔥 এই লাইনটি অটো লগআউটের জন্য অপরিহার্য!
                    loggedIn: true
                };
                
                // লোকাল স্টোরেজ ও সেশন স্টোরেজে সংরক্ষণ করুন (সুপার অ্যাডমিন প্যানেল যেভাবে চেক করে)
                localStorage.setItem('currentAdmin', JSON.stringify(adminInfo));
                sessionStorage.setItem('currentAdmin', JSON.stringify(adminInfo));
                
                // ব্যাকওয়ার্ড কম্পাটিবিলিটির জন্য
                localStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminLoggedIn', 'true');
                
                console.log('✅ Login successful for:', adminInfo.name);
                alert('স্বাগতম ' + adminInfo.name + '!');
                
                // ========== রিডাইরেক্ট - আপনার ফাইলের নাম অনুযায়ী ==========
                if (adminInfo.role === 'সুপার অ্যাডমин') {
                    window.location.href = 'super-admin.html';
                } else {
                    window.location.href = 'admin-dashboard.html';
                }
                
            } catch (err) {
                console.error('Login error:', err);
                alert('লগইন করতে ব্যর্থ হয়েছে!');
                loginBtn.disabled = false;
                loadingMsg.style.display = 'none';
            }
        }
        
        // ========== ফর্ম ইভেন্ট ==========
        const form = document.getElementById('adminLoginForm');
        if (form) {
            form.addEventListener('submit', doLogin);
        }
        
        // ========== পেজ লোডে Supabase প্রস্তুত করুন ==========
        window.addEventListener('DOMContentLoaded', function() {
            initSupabase();
            
            // ইতিমধ্যে লগইন করা থাকলে সরাসরি প্যানেলে পাঠান
            const existingAdmin = localStorage.getItem('currentAdmin') || sessionStorage.getItem('currentAdmin');
            if (existingAdmin) {
                try {
                    const admin = JSON.parse(existingAdmin);
                    const loginTime = admin.loginTime || 0;
                    const currentTime = Date.now();
                    
                    // 8 ঘন্টার বেশি হলে লগইন এক্সপায়ার্ড
                    if (currentTime - loginTime < 8 * 60 * 60 * 1000) {
                        if (admin.role === 'সুপার অ্যাডমিন') {
                            window.location.href = 'super-admin.html';
                        } else {
                            window.location.href = 'admin-dashboard.html';
                        }
                    }
                } catch(e) {
                    console.log('Session expired or invalid');
                }
            }
        });
    </script>
</body>
</html>
