<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #0d2b1f 0%, #1e3a2f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 28px; max-width: 480px; width: 100%; padding: 40px 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header .logo { width: 80px; height: 80px; background: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 35px; color: white; }
        .login-header h1 { font-size: 24px; font-weight: 700; color: #1f2937; }
        .login-header p { font-size: 14px; color: #6b7280; }
        .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .role-option { padding: 14px; border: 2px solid #e5e7eb; border-radius: 14px; text-align: center; cursor: pointer; transition: all 0.3s ease; background: white; }
        .role-option:hover { border-color: #059669; background: #f0fdf4; }
        .role-option.active { border-color: #059669; background: #ecfdf5; box-shadow: 0 0 0 4px rgba(5,150,105,0.15); }
        .role-option i { font-size: 28px; display: block; margin-bottom: 8px; }
        .role-option .role-title { font-weight: 600; font-size: 15px; color: #1f2937; }
        .role-option .role-desc { font-size: 11px; color: #6b7280; }
        .role-super { color: #8b5cf6; }
        .role-admin { color: #3b82f6; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 13px; color: #374151; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; transition: all 0.3s; background: #f9fafb; }
        .form-group input:focus { border-color: #059669; background: white; outline: none; box-shadow: 0 0 0 4px rgba(5,150,105,0.1); }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #059669, #047857); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(5,150,105,0.3); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 10px; font-size: 13px; display: none; margin-bottom: 15px; }
        .footer-text { text-align: center; margin-top: 20px; font-size: 12px; color: #9ca3af; }
        .footer-text a { color: #059669; text-decoration: none; }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo"><i class="fas fa-shield-alt"></i></div>
            <h1>অ্যাডমিন লগইন</h1>
            <p>ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক</p>
        </div>

        <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-circle mr-2"></i><span id="errorText">ত্রুটি!</span></div>

        <!-- রোল সিলেক্টর -->
        <div class="role-selector">
            <div class="role-option active" data-role="super" onclick="selectRole('super')">
                <i class="fas fa-crown role-super"></i>
                <div class="role-title">👑 সুপার অ্যাডমিন</div>
                <div class="role-desc">সম্পূর্ণ নিয়ন্ত্রণ</div>
            </div>
            <div class="role-option" data-role="admin" onclick="selectRole('admin')">
                <i class="fas fa-user-shield role-admin"></i>
                <div class="role-title">🛡️ অ্যাডমিন</div>
                <div class="role-desc">সীমিত অ্যাক্সেস</div>
            </div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label><i class="fas fa-user mr-2"></i>ইউজারনেম</label>
                <input type="text" id="username" placeholder="আপনার ইউজারনেম দিন" required autocomplete="username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock mr-2"></i>পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="আপনার পাসওয়ার্ড দিন" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt mr-2"></i>লগইন করুন</button>
        </form>

        <div class="footer-text">
            <p>🔒 নিরাপদ লগইন | <a href="../index.html">মূল পৃষ্ঠায় ফিরুন</a></p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
        let selectedRole = 'super';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-option').forEach(el => el.classList.remove('active'));
            document.querySelector(`.role-option[data-role="${role}"]`).classList.add('active');
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                errorText.textContent = 'ইউজারনেম ও পাসওয়ার্ড দিন!';
                errorMsg.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> লগইন হচ্ছে...';

            try {
                const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await client
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    errorText.textContent = '❌ ইউজারনেম বা পাসওয়ার্ড ভুল!';
                    errorMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>লগইন করুন';
                    return;
                }

                // ✅ রোল চেক
                if (selectedRole === 'super' && data.role !== 'সুপার অ্যাডমিন') {
                    errorText.textContent = '❌ এই অ্যাকাউন্ট সুপার অ্যাডমিন নয়!';
                    errorMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>লগইন করুন';
                    return;
                }

                if (selectedRole === 'admin' && data.role !== 'অ্যাডমিন') {
                    errorText.textContent = '❌ এই অ্যাকাউন্ট অ্যাডমিন নয়!';
                    errorMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>লগইন করুন';
                    return;
                }

                // ✅ লগইন সফল
                const adminData = {
                    id: data.id,
                    username: data.username,
                    name: data.name || data.username,
                    role: data.role,
                    permissions: data.permissions || {}
                };

                localStorage.setItem('currentAdmin', JSON.stringify(adminData));
                sessionStorage.setItem('currentAdmin', JSON.stringify(adminData));

                // ✅ রোল অনুযায়ী রিডাইরেক্ট
                if (data.role === 'সুপার অ্যাডমิน') {
                    window.location.href = 'admin-panel.html?role=super';
                } else {
                    window.location.href = 'admin-panel.html?role=admin';
                }

            } catch (err) {
                console.error('Login error:', err);
                errorText.textContent = '❌ লগইন করতে সমস্যা!';
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>লগইন করুন';
            }
        }

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
