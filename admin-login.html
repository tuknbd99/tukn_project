<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #0b1c2c 0%, #1a3a4a 100%); min-height: 100vh; }
        .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card rounded-2xl shadow-2xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-md" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h2 class="text-2xl font-bold text-gray-800 mt-3">অ্যাডমিন লগইন</h2>
            <p class="text-gray-500 text-sm">ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</p>
        </div>
        
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ইউজারনেম</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">পাসওয়ার্ড</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-emerald-600 hover:text-emerald-700">← হোমপেজে ফিরুন</a>
        </div>
    </div>

    <script>
        // ========== Supabase ক্লায়েন্ট ভেরিয়েবল ==========
        let supabaseClient = null;
        let supabase = null;
        
        // ========== Supabase রেডি হওয়ার অপেক্ষা ==========
        async function waitForSupabase() {
            let attempts = 0;
            while (attempts < 30) {
                if (window.supabase && typeof window.supabase.from === 'function') {
                    supabaseClient = window.supabase;
                    supabase = window.supabase;
                    window.supabaseClient = supabaseClient;
                    console.log('✅ Supabase ready for admin login');
                    return true;
                }
                await new Promise(resolve => setTimeout(resolve, 500));
                attempts++;
            }
            console.error('❌ Supabase not ready after 15 seconds');
            return false;
        }
        
        // ========== লগইন হ্যান্ডলার ==========
        async function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('ইউজারনেম এবং পাসওয়ার্ড দিন!');
                return;
            }
            
            // Supabase রেডি না থাকলে অপেক্ষা করুন
            if (!supabaseClient) {
                const ready = await waitForSupabase();
                if (!ready) {
                    alert('সার্ভার সংযোগ ব্যর্থ! পরে আবার চেষ্টা করুন।');
                    return;
                }
            }
            
            try {
                console.log('Attempting login for:', username);
                
                const { data, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();
                
                if (error) {
                    console.error('Supabase error:', error);
                    alert('লগইন করতে ব্যর্থ হয়েছে!');
                    return;
                }
                
                if (!data) {
                    alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                    return;
                }
                
                if (data.password !== password) {
                    alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                    return;
                }
                
                // লগইন সফল
                const adminData = {
                    id: data.id,
                    username: data.username,
                    name: data.name,
                    role: data.role || (data.username === 'arif' ? 'সুপার অ্যাডমিন' : 'অ্যাডমিন'),
                    loggedIn: true
                };
                
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentAdmin', JSON.stringify(adminData));
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('currentAdmin', JSON.stringify(adminData));
                
                alert(`স্বাগতম ${data.name || data.username}!`);
                
                if (adminData.role === 'সুপার অ্যাডমิน' || adminData.role === 'super_admin' || username === 'arif') {
                    window.location.href = 'super-admin.html';
                } else {
                    window.location.href = 'admin-dashboard.html';
                }
                
            } catch (err) {
                console.error('Login error:', err);
                alert('লগইন করতে ব্যর্থ হয়েছে!');
            }
        }
        
        // ফর্ম সাবমিট ইভেন্ট
        document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
        
        // পেজ লোড হলে Supabase প্রস্তুত করুন
        document.addEventListener('DOMContentLoaded', async function() {
            await waitForSupabase();
        });
    </script>
</body>
</html>
