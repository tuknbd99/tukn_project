<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #0b1c2c 0%, #1a3a4a 100%); min-height: 100vh; }
        .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .loading { display: none; text-align: center; margin-top: 15px; color: #059669; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card rounded-2xl shadow-2xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-md" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h2 class="text-2xl font-bold text-gray-800 mt-3">অ্যাডমিন লগইন</h2>
            <p class="text-gray-500 text-sm">ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</p>
        </div>
        
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ইউজারনেম</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">পাসওয়ার্ড</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
            <div id="loadingMsg" class="loading">
                <i class="fas fa-spinner fa-spin mr-2"></i> সংযোগ স্থাপন হচ্ছে...
            </div>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-emerald-600 hover:text-emerald-700">← হোমপেজে ফিরুন</a>
        </div>
    </div>

    <script>
        // Supabase কনফিগারেশন
        const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
        
        let supabaseClient = null;
        
        // Supabase ইনিশিয়ালাইজেশন
        async function initSupabase() {
            let attempts = 0;
            const maxAttempts = 30;
            
            while (attempts < maxAttempts) {
                if (window.supabase && typeof window.supabase.createClient === 'function') {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    window.supabaseClient = supabaseClient;
                    console.log('✅ Supabase initialized');
                    return true;
                }
                await new Promise(resolve => setTimeout(resolve, 300));
                attempts++;
            }
            
            console.error('❌ Supabase failed to load');
            return false;
        }
        
        // লগইন ফাংশন
        async function doLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loadingMsg = document.getElementById('loadingMsg');
            
            if (!username || !password) {
                alert('ইউজারনেম এবং পাসওয়ার্ড দিন!');
                return;
            }
            
            // লোডিং দেখান
            loginBtn.disabled = true;
            loadingMsg.style.display = 'block';
            
            // Supabase তৈরি করুন
            if (!supabaseClient) {
                const initialized = await initSupabase();
                if (!initialized) {
                    alert('সার্ভার সংযোগ ব্যর্থ! পেজ রিফ্রেশ করুন।');
                    loginBtn.disabled = false;
                    loadingMsg.style.display = 'none';
                    return;
                }
            }
            
            try {
                console.log('Trying login for:', username);
                
                const { data, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();
                
                if (error) {
                    console.error('Query error:', error);
                    alert('ডাটাবেস সংযোগে সমস্যা!');
                    loginBtn.disabled = false;
                    loadingMsg.style.display = 'none';
                    return;
                }
                
                if (!data || data.password !== password) {
                    alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                    loginBtn.disabled = false;
                    loadingMsg.style.display = 'none';
                    return;
                }
                
                // লগইন সফল
                const adminInfo = {
                    id: data.id,
                    username: data.username,
                    name: data.name,
                    role: data.role || (username === 'arif' ? 'সুপার অ্যাডমিন' : 'অ্যাডমিন'),
                    loggedIn: true
                };
                
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentAdmin', JSON.stringify(adminInfo));
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('currentAdmin', JSON.stringify(adminInfo));
                
                alert('স্বাগতম ' + (data.name || data.username) + '!');
                
                // রিডাইরেক্ট
                if (adminInfo.role === 'সুপার অ্যাডমিন' || username === 'arif') {
                    window.location.href = 'super-admin.html';
                } else {
                    window.location.href = 'admin-dashboard.html';
                }
                
            } catch (err) {
                console.error('Login error:', err);
                alert('লগইন করতে ব্যর্থ হয়েছে!');
                loginBtn.disabled = false;
                loadingMsg.style.display = 'none';
            }
        }
        
        // ফর্ম ইভেন্ট
        const form = document.getElementById('adminLoginForm');
        if (form) {
            form.addEventListener('submit', doLogin);
        }
        
        // পেজ লোডে Supabase প্রস্তুত করুন
        window.addEventListener('DOMContentLoaded', function() {
            initSupabase();
        });
    </script>
</body>
</html>
