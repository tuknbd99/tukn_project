<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #0b1c2c 0%, #1a3a4a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 32px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #059669, #10b981); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .login-header .logo i { font-size: 40px; color: white; }
        .login-header h1 { font-size: 24px; font-weight: 700; color: #1e3a2f; }
        .login-header p { color: #6b7280; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: #374151; margin-bottom: 6px; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; transition: all 0.3s; background: #f9fafb; }
        .form-group input:focus { outline: none; border-color: #059669; box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15); background: white; }
        .form-group input.error { border-color: #ef4444; background: #fef2f2; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #059669, #10b981); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(5, 150, 105, 0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-message { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center; display: none; padding: 10px; background: #fef2f2; border-radius: 8px; border: 1px solid #fca5a5; }
        .error-message.show { display: block; }
        .footer-text { text-align: center; margin-top: 20px; color: #9ca3af; font-size: 13px; }
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9ca3af; }
        .toggle-password:hover { color: #059669; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-btn i { margin-right: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1>অ্যাডমিন লগইন</h1>
            <p>ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username"><i class="fas fa-user mr-2 text-emerald-600"></i>ইউজারনেম</label>
                <input type="text" id="username" placeholder="আপনার ইউজারনেম দিন" required autofocus>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock mr-2 text-emerald-600"></i>পাসওয়ার্ড</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="আপনার পাসওয়ার্ড দিন" required>
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText">ইউজারনেম বা পাসওয়ার্ড ভুল!</span>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> লগইন করুন
            </button>
        </form>

        <div class="footer-text">
            <i class="fas fa-shield-alt mr-1 text-emerald-600"></i>
            সুপার অ্যাডমিন প্যানেল
        </div>
    </div>

    <script>
        // ============================================================
        // Supabase কনফিগারেশন
        // ============================================================
        const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
        
        let supabase = null;
        
        // ============================================================
        // Supabase Client Initialize
        // ============================================================
        function initSupabase() {
            if (!supabase) {
                try {
                    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log('✅ Supabase client initialized');
                    } else {
                        console.error('❌ Supabase library not loaded');
                        return null;
                    }
                } catch(e) {
                    console.error('❌ Supabase init error:', e);
                    return null;
                }
            }
            return supabase;
        }
        
        // ============================================================
        // পাসওয়ার্ড টগল
        // ============================================================
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                eyeIcon.className = 'fas fa-eye';
            }
        }
        
        // ============================================================
        // লগইন হ্যান্ডলার - শুধুমাত্র Supabase থেকে চেক করবে
        // ============================================================
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            // ভ্যালিডেশন
            if (!username || !password) {
                errorText.textContent = 'দয়া করে ইউজারনেম এবং পাসওয়ার্ড দিন!';
                errorMessage.classList.add('show');
                return;
            }
            
            // লোডিং স্টেট
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> যাচাই করা হচ্ছে...';
            errorMessage.classList.remove('show');
            
            try {
                // Supabase Client
                const client = initSupabase();
                if (!client) {
                    errorText.textContent = 'সার্ভার সংযোগ ব্যর্থ! পেজ রিফ্রেশ করুন।';
                    errorMessage.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
                    return;
                }
                
                console.log('🔍 Supabase এ খোঁজা হচ্ছে:', username);
                
                // admins টেবিলে ইউজার খোঁজা
                const { data, error } = await client
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();
                
                if (error) {
                    console.error('❌ Query error:', error);
                    errorText.textContent = 'ডাটাবেস সংযোগে সমস্যা!';
                    errorMessage.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
                    return;
                }
                
                // ইউজার পাওয়া গেছে কিনা চেক
                if (!data) {
                    console.log('❌ ইউজার পাওয়া যায়নি:', username);
                    errorText.textContent = 'ইউজারনেম বা পাসওয়ার্ড ভুল!';
                    errorMessage.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
                    return;
                }
                
                // পাসওয়ার্ড চেক
                if (data.password !== password) {
                    console.log('❌ পাসওয়ার্ড মিলছে না');
                    errorText.textContent = 'ইউজারনেম বা পাসওয়ার্ড ভুল!';
                    errorMessage.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
                    return;
                }
                
                // ========== লগইন সফল ==========
                console.log('✅ লগইন সফল:', data.username);
                
                // সেশন ডেটা তৈরি
                const sessionData = {
                    id: data.id,
                    username: data.username,
                    name: data.name || data.username,
                    role: data.role || 'অ্যাডমিন',
                    loginTime: Date.now(),
                    loggedIn: true
                };
                
                // localStorage এবং sessionStorage এ সংরক্ষণ
                localStorage.setItem('currentAdmin', JSON.stringify(sessionData));
                sessionStorage.setItem('currentAdmin', JSON.stringify(sessionData));
                localStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminLoggedIn', 'true');
                
                // সাফল্যের মেসেজ
                loginBtn.innerHTML = '<i class="fas fa-check-circle"></i> স্বাগতম!';
                
                // রিডাইরেক্ট - 1 সেকেন্ড পর
                setTimeout(() => {
                    // সুপার অ্যাডমিন চেক
                    if (sessionData.role === 'সুপার অ্যাডমিন' || sessionData.role === 'সুপার অ্যাডমিন') {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'admin-dashboard.html';
                    }
                }, 800);
                
            } catch (err) {
                console.error('❌ Login error:', err);
                errorText.textContent = 'লগইন করতে সমস্যা! পুনরায় চেষ্টা করুন।';
                errorMessage.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> লগইন করুন';
            }
        }
        
        // ============================================================
        // এন্টার কী সাপোর্ট
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (form) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
        
        // ============================================================
        // পেজ লোডে Supabase প্রস্তুত করুন এবং সেশন চেক করুন
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Supabase ইনিশিয়ালাইজ
            initSupabase();
            
            // ইতিমধ্যে লগইন করা থাকলে রিডাইরেক্ট
            const existingAdmin = localStorage.getItem('currentAdmin') || sessionStorage.getItem('currentAdmin');
            if (existingAdmin) {
                try {
                    const admin = JSON.parse(existingAdmin);
                    const loginTime = admin.loginTime || 0;
                    const currentTime = Date.now();
                    
                    // 8 ঘন্টার বেশি হলে লগইন এক্সপায়ার্ড
                    if (currentTime - loginTime < 8 * 60 * 60 * 1000) {
                        console.log('⏩ ইতিমধ্যে লগইন করা আছে, রিডাইরেক্ট করা হচ্ছে...');
                        if (admin.role === 'সুপার অ্যাডমিন' || admin.role === 'সুপার অ্যাডমিন') {
                            window.location.href = 'index.html';
                        } else {
                            window.location.href = 'admin-dashboard.html';
                        }
                        return;
                    } else {
                        console.log('⏰ সেশন এক্সপায়ার্ড হয়েছে, লগইন প্রয়োজন');
                        localStorage.removeItem('currentAdmin');
                        sessionStorage.removeItem('currentAdmin');
                        localStorage.removeItem('adminLoggedIn');
                        sessionStorage.removeItem('adminLoggedIn');
                    }
                } catch(e) {
                    console.log('Session invalid, clearing...');
                    localStorage.removeItem('currentAdmin');
                    sessionStorage.removeItem('currentAdmin');
                    localStorage.removeItem('adminLoggedIn');
                    sessionStorage.removeItem('adminLoggedIn');
                }
            }
            
            console.log('🔐 অ্যাডমিন লগইন পেজ লোড হয়েছে');
            console.log('📌 Supabase থেকে অ্যাডমিন যাচাই করা হবে');
            
            // ডিবাগ হেল্পার - কনসোলে টাইপ করুন: checkSupabase()
            window.checkSupabase = async function() {
                const client = initSupabase();
                if (!client) {
                    console.log('❌ Supabase client not initialized');
                    return;
                }
                const { data, error } = await client.from('admins').select('username, name, role');
                if (error) {
                    console.error('Error:', error);
                } else {
                    console.log('📋 Supabase এ অ্যাডমিন:', data);
                }
            };
            console.log('💡 কনসোলে checkSupabase() টাইপ করে অ্যাডমিন লিস্ট দেখুন');
        });
    </script>
</body>
</html>
