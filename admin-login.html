<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #eef3ef, #d1e7d6); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; max-width: 420px; width: 100%; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 40px 30px; border: 1px solid rgba(13,124,56,0.2); }
        .logo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid #0d7c38; }
        .btn-primary { background: #0d7c38; color: white; width: 100%; padding: 12px; border-radius: 12px; font-weight: 600; transition: 0.3s; border: none; cursor: pointer; }
        .btn-primary:hover { background: #065f2c; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,124,56,0.3); }
        .input-field { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; transition: 0.3s; }
        .input-field:focus { border-color: #0d7c38; outline: none; box-shadow: 0 0 0 3px rgba(13,124,56,0.1); }
        .alert-box { padding: 10px 14px; border-radius: 12px; margin-bottom: 15px; display: none; font-size: 14px; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #f3f3f3; border-top: 2px solid #0d7c38; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <img src="images/logo.png" class="logo mx-auto" onerror="this.src='https://placehold.co/70x70/0d7c38/white?text=T'">
            <h2 class="text-2xl font-bold text-emerald-700 mt-3">TUKNBD</h2>
            <p class="text-gray-500 text-sm">অ্যাডমিন প্যানেল লগইন</p>
        </div>

        <div id="alertMessage" class="alert-box"></div>

        <form id="loginForm" class="mt-6">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-1">ইউজারনেম</label>
                <input type="text" id="username" class="input-field" placeholder="আপনার ইউজারনেম দিন" required autofocus>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-1">পাসওয়ার্ড</label>
                <input type="password" id="password" class="input-field" placeholder="পাসওয়ার্ড দিন" required>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
        </form>

        <p class="text-center text-gray-400 text-xs mt-6">
            <i class="fas fa-lock mr-1"></i> নিরাপদ সংযোগ
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
        let supabaseClient = null;

        function initSupabase() {
            if (!supabaseClient && typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            return supabaseClient;
        }

        function showAlert(message, type = 'error') {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert-box alert-${type}`;
            alertDiv.innerHTML = message;
            alertDiv.style.display = 'block';
            setTimeout(() => alertDiv.style.display = 'none', 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showAlert('দয়া করে ইউজারনেম ও পাসওয়ার্ড দিন!', 'error');
                return;
            }

            const client = initSupabase();
            if (!client) {
                showAlert('সার্ভার সংযোগ সমস্যা! আবার চেষ্টা করুন।', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> চেক করা হচ্ছে...';
            btn.disabled = true;

            try {
                // admins টেবিলে ইউজার খুঁজুন
                const { data, error } = await client
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    showAlert('❌ ভুল ইউজারনেম বা পাসওয়ার্ড!', 'error');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                // লগইন সফল
                const adminData = {
                    id: data.id,
                    username: data.username,
                    name: data.name || data.username,
                    role: data.role || 'অ্যাডমিন',
                    permissions: data.permissions || {}
                };

                localStorage.setItem('currentAdmin', JSON.stringify(adminData));
                sessionStorage.setItem('currentAdmin', JSON.stringify(adminData));

                showAlert('✅ লগইন সফল! পুনঃনির্দেশিত হচ্ছে...', 'success');
                setTimeout(() => {
                    window.location.href = 'admin-panel.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert('❌ সার্ভার ত্রুটি! আবার চেষ্টা করুন।', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
