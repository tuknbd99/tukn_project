<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ✅ Supabase CDN - প্রথমে লোড করুন -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: linear-gradient(135deg, #0b1c2c 0%, #1a3a4a 100%); min-height: 100vh; }
        .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="login-card rounded-2xl shadow-2xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-md" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h2 class="text-2xl font-bold text-gray-800 mt-3">অ্যাডমিন লগইন</h2>
            <p class="text-gray-500 text-sm">ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</p>
        </div>
        
        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ইউজারনেম</label>
                <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">পাসওয়ার্ড</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-emerald-600 hover:text-emerald-700">← হোমপেজে ফিরুন</a>
        </div>
    </div>

    <script>
        // ========== সিম্পল Supabase লগইন (কোনো জটিলতা নেই) ==========
        
        // Supabase কনফিগারেশন
        const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
        
        // গ্লোবাল ভেরিয়েবল
        let supabase = null;
        let supabaseClient = null;
        
        // Supabase ইনিশিয়ালাইজেশন
        async function initSupabase() {
            try {
                // Supabase লাইব্রেরি চেক করুন
                if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    supabaseClient = supabase;
                    window.supabase = supabase;
                    window.supabaseClient = supabase;
                    console.log('✅ Supabase initialized for admin login');
                    return true;
                } else if (typeof supabase !== 'undefined' && supabase.createClient) {
                    supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    supabaseClient = supabase;
                    window.supabase = supabase;
                    window.supabaseClient = supabase;
                    console.log('✅ Supabase initialized (alt)');
                    return true;
                }
                console.error('❌ Supabase library not loaded yet');
                return false;
            } catch (err) {
                console.error('Init error:', err);
                return false;
            }
        }
        
        // লগইন ফাংশন
        async function doLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('ইউজারনেম এবং পাসওয়ার্ড দিন!');
                return;
            }
            
            // Supabase তৈরি করুন (যদি না থাকে)
            if (!supabaseClient) {
                const initialized = await initSupabase();
                if (!initialized) {
                    alert('সার্ভার সংযোগ ব্যর্থ! পেজ রিফ্রেশ করে আবার চেষ্টা করুন।');
                    return;
                }
            }
            
            try {
                console.log('Trying login for:', username);
                
                // অ্যাডমিন চেক করুন
                const { data, error } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();
                
                if (error) {
                    console.error('Query error:', error);
                    alert('ডাটাবেস সংযোগে সমস্যা!');
                    return;
                }
                
                if (!data) {
                    alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                    return;
                }
                
                if (data.password !== password) {
                    alert('ইউজারনেম বা পাসওয়ার্ড ভুল!');
                    return;
                }
                
                // লগইন সফল - ডাটা সেভ করুন
                const adminInfo = {
                    id: data.id,
                    username: data.username,
                    name: data.name,
                    role: data.role || (username === 'arif' ? 'সুপার অ্যাডমিন' : 'অ্যাডমিন'),
                    loggedIn: true
                };
                
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('currentAdmin', JSON.stringify(adminInfo));
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('currentAdmin', JSON.stringify(adminInfo));
                
                alert(`স্বাগতম ${data.name || data.username}!`);
                
                // রেডিরেক্ট
                if (adminInfo.role === 'সুপার অ্যাডমิน' || adminInfo.role === 'super_admin' || username === 'arif') {
                    window.location.href = 'super-admin.html';
                } else {
                    window.location.href = 'admin-dashboard.html';
                }
                
            } catch (err) {
                console.error('Login error:', err);
                alert('লগইন করতে ব্যর্থ হয়েছে! ' + (err.message || ''));
            }
        }
        
        // ফর্ম ইভেন্ট লিসেনার
        const form = document.getElementById('adminLoginForm');
        if (form) {
            form.addEventListener('submit', doLogin);
        }
        
        // পেজ লোড হলে Supabase ইনিশিয়ালাইজ করুন
        window.addEventListener('DOMContentLoaded', async function() {
            console.log('Page loaded, initializing...');
            await initSupabase();
        });
        
        console.log('Admin login page ready');
    </script>
</body>
</html>
