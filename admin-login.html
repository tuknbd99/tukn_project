<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .center-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
            z-index: 1001;
            max-width: 450px;
            width: 90%;
            animation: fadeInScale 0.3s ease;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-lg object-cover" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h1 class="text-2xl font-bold text-emerald-700 mt-3">TUKNBD</h1>
            <p class="text-gray-500 text-sm">সুপার অ্যাডমিন লগইন</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-1">ইউজারনেম</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="username" required class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500" placeholder="ইউজারনেম">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-1">পাসওয়ার্ড</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:border-emerald-500" placeholder="পাসওয়ার্ড">
                </div>
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 transition font-semibold">
                <i class="fas fa-sign-in-alt mr-2"></i>লগইন করুন
            </button>
        </form>
        
        <!-- কোনো ডেমো তথ্য নেই - সম্পূর্ণ খালি -->
    </div>
</div>

<script>
const supabaseClient = window.supabaseClient;

function showCenterNotification(message, type = 'success') {
    const existingOverlay = document.querySelector('.notification-overlay');
    if (existingOverlay) existingOverlay.remove();
    
    const overlay = document.createElement('div');
    overlay.className = 'notification-overlay';
    
    const notification = document.createElement('div');
    notification.className = 'center-notification';
    
    const bgColor = type === 'success' ? 'bg-emerald-50 border-emerald-500' : 'bg-red-50 border-red-500';
    const iconColor = type === 'success' ? 'text-emerald-600' : 'text-red-600';
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    
    notification.innerHTML = `
        <div class="p-5 ${bgColor} border-l-4 rounded-2xl">
            <div class="flex items-start gap-3">
                <i class="fas ${icon} text-2xl ${iconColor}"></i>
                <div class="flex-1">
                    <p class="text-gray-800">${message}</p>
                </div>
            </div>
            <button onclick="this.closest('.notification-overlay').remove()" class="mt-4 w-full bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition">
                ঠিক আছে
            </button>
        </div>
    `;
    
    overlay.appendChild(notification);
    document.body.appendChild(overlay);
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    
    if (!username || !password) {
        showCenterNotification('ইউজারনেম এবং পাসওয়ার্ড দিন!', 'error');
        return;
    }
    
    try {
        // Supabase থেকে অ্যাডমিন চেক করুন
        const { data, error } = await supabaseClient
            .from('admins')
            .select('*')
            .eq('username', username)
            .eq('password', password)
            .single();
        
        if (data && data.status === 'active') {
            // লগইন সফল
            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('currentAdmin', JSON.stringify({
                id: data.id,
                username: data.username,
                name: data.name,
                role: data.role,
                loggedIn: true
            }));
            
            showCenterNotification(`স্বাগতম ${data.name}!`, 'success');
            setTimeout(() => {
                window.location.href = 'super-admin.html';
            }, 1500);
        } else {
            showCenterNotification('ভুল ইউজারনেম বা পাসওয়ার্ড!', 'error');
        }
    } catch (error) {
        console.error('Login error:', error);
        showCenterNotification('লগইন করতে ব্যর্থ হয়েছে!', 'error');
    }
});
</script>
</body>
</html>
