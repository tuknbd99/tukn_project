<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-functions.js"></script>
    
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-blue-50 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-96 transform transition-all duration-300 hover:scale-105">
        <div class="text-center mb-6">
            <div class="w-20 h-20 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
                <i class="fas fa-user-shield text-4xl text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mt-4">অ্যাডমিন লগইন</h2>
            <p class="text-gray-500 text-sm mt-1">শুধুমাত্র অনুমোদিত ব্যক্তিরা প্রবেশ করতে পারবেন</p>
        </div>
        
        <div id="errorMsg" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-3 rounded mb-4 text-sm">
            <i class="fas fa-exclamation-circle mr-2"></i> <span id="errorText"></span>
        </div>
        
        <form id="adminLoginForm" class="space-y-5">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-user text-emerald-600 mr-1"></i> ইউজারনেম
                </label>
                <input type="text" id="adminUsername" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition"
                    placeholder="ইউজারনেম দিন">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-lock text-emerald-600 mr-1"></i> পাসওয়ার্ড
                </label>
                <input type="password" id="adminPassword" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition"
                    placeholder="পাসওয়ার্ড দিন">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    <i class="fas fa-user-tag text-emerald-600 mr-1"></i> অ্যাডমিন টাইপ
                </label>
                <select id="adminType" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500">
                    <option value="super_admin">সুপার অ্যাডমিন (পূর্ণ নিয়ন্ত্রণ)</option>
                    <option value="admin">অ্যাডমিন (সীমিত নিয়ন্ত্রণ)</option>
                </select>
                <p class="text-xs text-gray-400 mt-1">সুপার অ্যাডমিন = সবকিছু দেখতে পারবেন | অ্যাডমিন = সীমিত সুবিধা</p>
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 text-emerald-600 rounded">
                    <span class="text-sm text-gray-600">আমাকে মনে রাখুন</span>
                </label>
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all duration-300 transform hover:scale-105">
                <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-emerald-600 hover:text-emerald-700 transition">
                <i class="fas fa-home mr-1"></i> হোমে ফিরুন
            </a>
        </div>
        
        <!-- ডেমো তথ্য দেখানোর জন্য -->
        <div class="mt-4 p-3 bg-gray-50 rounded-lg text-center">
            <p class="text-xs text-gray-500">
                <i class="fas fa-info-circle text-emerald-500"></i> ডেমো লগইন: <br>
                <strong>ইউজারনেম:</strong> admin | <strong>পাসওয়ার্ড:</strong> 12345
            </p>
        </div>
    </div>

    <script>
        // ========== localStorage থেকে অ্যাডমিন ডাটা লোড করুন ==========
        let admins = JSON.parse(localStorage.getItem('tukn_admins'));
        
        // ডিফল্ট সুপার অ্যাডমিন তৈরি করুন (যদি না থাকে)
        if(!admins || admins.length === 0) {
            admins = [
                { 
                    id: 1, 
                    username: 'admin', 
                    name: 'সুপার অ্যাডমিন', 
                    password: '12345', 
                    role: 'সুপার অ্যাডমিন', 
                    mobile: '01734913809', 
                    status: 'active', 
                    createdAt: new Date().toISOString() 
                }
            ];
            localStorage.setItem('tukn_admins', JSON.stringify(admins));
            console.log('ডিফল্ট অ্যাডমিন তৈরি করা হয়েছে: admin / 12345');
        }
        
        // ডিফল্ট পারমিশন সেটআপ (যদি না থাকে)
        let permissions = JSON.parse(localStorage.getItem('admin_permissions'));
        if(!permissions) {
            permissions = {
                'admin': ['view_members', 'add_member', 'view_reps', 'view_economy', 'view_profit_distribution']
            };
            localStorage.setItem('admin_permissions', JSON.stringify(permissions));
        }
        
        // ========== লগইন ফর্ম সাবমিট ==========
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value;
            const selectedType = document.getElementById('adminType').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            
            errorDiv.classList.add('hidden');
            
            // ডিবাগ তথ্য (কনসোলে দেখতে)
            console.log('লগইন চেষ্টা:', username, 'টাইপ:', selectedType);
            console.log('উপলব্ধ অ্যাডমিন:', admins);
            
            // ========== অ্যাডমিন চেক ==========
            let admin = null;
            
            if(selectedType === 'super_admin') {
                // সুপার অ্যাডমিন খোঁজা
                admin = admins.find(a => a.username === username && a.password === password && a.role === 'সুপার অ্যাডমিন');
            } else if(selectedType === 'admin') {
                // সাধারণ অ্যাডমিন খোঁজা
                admin = admins.find(a => a.username === username && a.password === password && a.role === 'অ্যাডমিন');
            }
            
            // সুপার অ্যাডমিন অ্যাডমিন টাইপ সিলেক্ট করলেও লগইন করতে পারবে
            if(!admin && selectedType === 'admin') {
                const superAdmin = admins.find(a => a.username === username && a.password === password && a.role === 'সুপার অ্যাডমিন');
                if(superAdmin) {
                    admin = superAdmin;
                    console.log('সুপার অ্যাডমিন অ্যাডমিন হিসাবে লগইন করছে');
                }
            }
            
            // ========== লগইন সফল ==========
            if(admin) {
                // রোল নাম নির্ধারণ
                let roleName = (selectedType === 'super_admin') ? 'সুপার অ্যাডমিন' : 'অ্যাডমিন';
                
                const adminData = { 
                    id: admin.id,
                    username: admin.username, 
                    name: admin.name, 
                    role: roleName,
                    roleType: selectedType,
                    loggedIn: true,
                    loginTime: new Date().toISOString()
                };
                
                // লগইন তথ্য সংরক্ষণ
                if(rememberMe) {
                    localStorage.setItem('adminLoggedIn', 'true');
                    localStorage.setItem('currentAdmin', JSON.stringify(adminData));
                } else {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('currentAdmin', JSON.stringify(adminData));
                }
                
                // লগইন সময় আপডেট
                admin.lastLogin = new Date().toISOString();
                localStorage.setItem('tukn_admins', JSON.stringify(admins));
                
                console.log('লগইন সফল! রিডাইরেক্ট করা হচ্ছে...');
                
                // ========== রোল অনুযায়ী রিডাইরেক্ট ==========
                if(selectedType === 'super_admin') {
                    // সুপার অ্যাডমিন: সম্পূর্ণ কন্ট্রোল প্যানেল
                    window.location.href = 'super-admin.html';
                } else {
                    // সাধারণ অ্যাডমিন: সীমিত প্যানেল
                    window.location.href = 'admin-panel.html';
                }
                
            } else {
                // ========== লগইন ব্যর্থ ==========
                errorText.innerText = 'ভুল ইউজারনেম, পাসওয়ার্ড বা অ্যাডমিন টাইপ! (ডিফল্ট: admin / 12345)';
                errorDiv.classList.remove('hidden');
                document.getElementById('adminPassword').value = '';
                
                // 3 সেকেন্ড পর এরর মেসেজ হাইড করুন
                setTimeout(() => errorDiv.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
