<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>জেলা প্রতিনিধি আবেদন ফরম | TUKNBD</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
   
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-functions.js"></script>
   
   <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .step-active { background-color: #059669; color: white; }
        .step-completed { background-color: #10b981; color: white; }
        .transition-all { transition: all 0.3s ease; }
        .info-card { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); }
    </style>
</head>
<body class="bg-gray-100">

<div class="container mx-auto px-4 py-6 max-w-5xl">
    
    <!-- হোমে ফিরে যাওয়ার বাটন -->
    <div class="mb-4">
        <button onclick="goToHome()" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition">
            <i class="fas fa-home mr-2"></i>হোমে ফিরে যান
        </button>
    </div>

    <!-- প্রগ্রেস স্টেপ -->
    <div class="flex items-center justify-center mb-8">
        <div class="flex items-center w-full max-w-2xl">
            <div class="step-item flex-1 text-center">
                <div class="step-number w-8 h-8 rounded-full bg-emerald-600 text-white flex items-center justify-center mx-auto mb-2">1</div>
                <div class="step-text text-sm font-medium">সদস্য যাচাই</div>
            </div>
            <div class="step-line flex-1 h-0.5 bg-gray-300"></div>
            <div class="step-item flex-1 text-center">
                <div class="step-number w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2">2</div>
                <div class="step-text text-sm font-medium text-gray-500">ব্যক্তিগত তথ্য</div>
            </div>
            <div class="step-line flex-1 h-0.5 bg-gray-300"></div>
            <div class="step-item flex-1 text-center">
                <div class="step-number w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2">3</div>
                <div class="step-text text-sm font-medium text-gray-500">আবেদন জমা</div>
            </div>
        </div>
    </div>

    <!-- ধাপ ১: সদস্য যাচাই -->
    <div id="step1" class="bg-white rounded-2xl shadow-xl p-6">
        <h2 class="text-2xl font-bold text-emerald-700 mb-4"><i class="fas fa-user-check mr-2"></i>সদস্য যাচাই</h2>
        
        <div class="mb-6">
            <label class="flex items-center gap-3 cursor-pointer p-3 border rounded-lg hover:bg-gray-50">
                <input type="radio" name="isMember" value="yes" class="w-5 h-5 text-emerald-600">
                <span class="font-medium">হ্যাঁ, আমি TUKNBD এর সদস্য</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer p-3 border rounded-lg hover:bg-gray-50 mt-2">
                <input type="radio" name="isMember" value="no" class="w-5 h-5 text-emerald-600">
                <span class="font-medium">না, আমি এখনও সদস্য নই</span>
            </label>
        </div>
        
        <div id="memberIdSection" class="hidden">
            <div class="bg-blue-50 p-4 rounded-lg mb-4">
                <label class="block text-gray-700 font-semibold mb-2">আপনার সদস্য আইডি নম্বর দিন</label>
                <div class="flex gap-2">
                    <input type="text" id="memberId" placeholder="যেমন: TUKN-20250419-0001" class="flex-1 p-2 border rounded-lg">
                    <button onclick="verifyMember()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700">যাচাই করুন</button>
                </div>
            </div>
            <div id="memberInfo" class="hidden info-card p-4 rounded-lg"></div>
        </div>
        
        <div id="nonMemberSection" class="hidden">
            <div class="bg-amber-50 p-4 rounded-lg text-center">
                <i class="fas fa-info-circle text-amber-600 text-3xl mb-2"></i>
                <p class="text-gray-700 mb-3">প্রতিনিধি হতে হলে আপনাকে প্রথমে TUKNBD এর সদস্য হতে হবে।</p>
                <button onclick="becomeMember()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition">
                    <i class="fas fa-user-plus mr-2"></i>সদস্য হোন
                </button>
            </div>
        </div>
        
        <div class="mt-6 flex justify-end">
            <button id="nextToStep2" onclick="goToStep2()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition hidden">
                পরবর্তী <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <!-- ধাপ ২: ব্যক্তিগত তথ্য ফরম -->
    <div id="step2" class="bg-white rounded-2xl shadow-xl p-6 hidden">
        <h2 class="text-2xl font-bold text-emerald-700 mb-4"><i class="fas fa-user-edit mr-2"></i>ব্যক্তিগত তথ্য</h2>
        
        <form id="applicationForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">পূর্ণ নাম <span class="text-red-500">*</span></label>
                    <input type="text" id="fullName" class="w-full p-2 border rounded-lg bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">মোবাইল নম্বর <span class="text-red-500">*</span></label>
                    <input type="tel" id="mobile" class="w-full p-2 border rounded-lg bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">ইমেইল</label>
                    <input type="email" id="email" class="w-full p-2 border rounded-lg bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">জেলা <span class="text-red-500">*</span></label>
                    <select id="district" class="w-full p-2 border rounded-lg">
                        <option value="">জেলা নির্বাচন করুন</option>
                        <option>ঢাকা</option><option>চট্টগ্রাম</option><option>রাজশাহী</option>
                        <option>খুলনা</option><option>বরিশাল</option><option>সিলেট</option>
                        <option>রংপুর</option><option>ময়মনসিংহ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">মাদ্রাসার নাম</label>
                    <input type="text" id="madrasa" class="w-full p-2 border rounded-lg" placeholder="আপনার মাদ্রাসার নাম">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-1">অভিজ্ঞতা (বছর)</label>
                    <input type="number" id="experience" class="w-full p-2 border rounded-lg" placeholder="যেমন: 5">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-gray-700 font-semibold mb-1">আবেদনের কারণ</label>
                    <textarea id="reason" rows="3" class="w-full p-2 border rounded-lg" placeholder="আপনি কেন জেলা প্রতিনিধি হতে চান?"></textarea>
                </div>
            </div>
            
            <div class="flex justify-between mt-6">
                <button type="button" onclick="goToStep1()" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">
                    <i class="fas fa-arrow-left mr-2"></i>পেছনে
                </button>
                <button type="button" onclick="submitApplication()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition">
                    আবেদন জমা দিন <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </div>
        </form>
    </div>

    <!-- ধাপ ৩: আবেদন সফল -->
    <div id="step3" class="bg-white rounded-2xl shadow-xl p-6 text-center hidden">
        <i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i>
        <h2 class="text-2xl font-bold text-emerald-700 mb-2">আবেদন সফল হয়েছে!</h2>
        <p class="text-gray-600 mb-4">আপনার আবেদনটি সফলভাবে জমা হয়েছে। প্রশাসনিক অনুমোদনের অপেক্ষায় থাকুন।</p>
        <button onclick="goToHome()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition">
            <i class="fas fa-home mr-2"></i>হোমে ফিরে যান
        </button>
    </div>
</div>

<script>
    // ==================== তারিখ ও সময় ফরম্যাট ফাংশন ====================
    function formatBanglaDate(date) {
        const banglaMonths = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];
        const banglaWeekdays = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
        
        const day = date.getDate();
        const month = banglaMonths[date.getMonth()];
        const year = date.getFullYear();
        const weekday = banglaWeekdays[date.getDay()];
        
        return `${day} ${month} ${year}, ${weekday}`;
    }
    
    function formatBanglaTime(date) {
        let hours = date.getHours();
        const minutes = date.getMinutes();
        const seconds = date.getSeconds();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12; // 0 কে 12 করতে
        
        const hoursStr = hours.toString().padStart(2, '0');
        const minutesStr = minutes.toString().padStart(2, '0');
        const secondsStr = seconds.toString().padStart(2, '0');
        
        return `${hoursStr}.${minutesStr}.${secondsStr}${ampm}`;
    }
    
    function getCurrentDateTime() {
        const now = new Date();
        const banglaDate = formatBanglaDate(now);
        const banglaTime = formatBanglaTime(now);
        return `${banglaDate} # ${banglaTime}`;
    }
    
    // ISO থেকে বাংলা তারিখে রূপান্তর
    function isoToBanglaDateTime(isoString) {
        const date = new Date(isoString);
        return `${formatBanglaDate(date)} # ${formatBanglaTime(date)}`;
    }
    
    // ==================== গ্লোবাল ভেরিয়েবল ====================
    let verifiedMember = null;
    let currentStep = 1;
    
    // ==================== ফাংশনসমূহ ====================
    function goToHome() {
        window.location.href = 'index.html';
    }
    
    function becomeMember() {
        const homeWindow = window.open('index.html', '_blank');
        setTimeout(() => {
            try {
                if(homeWindow) {
                    homeWindow.sessionStorage.setItem('openMembershipModal', 'true');
                    homeWindow.sessionStorage.setItem('openMembershipModalTime', Date.now().toString());
                }
            } catch(e) {
                console.log('Cannot set session');
            }
        }, 500);
        showToast('সদস্য নিবন্ধন পেজ খোলা হচ্ছে...', 'success');
    }
    
    function getMembers() {
        return JSON.parse(localStorage.getItem('tukn_members') || '[]');
    }
    
    function verifyMember() {
        const memberId = document.getElementById('memberId').value.trim();
        if(!memberId) {
            showToast('আপনার সদস্য আইডি নম্বর দিন', 'error');
            return;
        }
        
        const members = getMembers();
        const member = members.find(m => m.id === memberId || m.mobile === memberId);
        
        const memberInfoDiv = document.getElementById('memberInfo');
        
        if(member) {
            verifiedMember = member;
            memberInfoDiv.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fas fa-check-circle text-green-600 text-2xl"></i>
                    <div>
                        <p class="font-bold">${member.fullName}</p>
                        <p class="text-sm text-gray-600">আইডি: ${member.id}</p>
                        <p class="text-sm text-gray-600">মোবাইল: ${member.mobile}</p>
                        <p class="text-sm text-gray-600">জেলা: ${member.presentDistrict || 'উল্লেখ নেই'}</p>
                    </div>
                </div>
            `;
            memberInfoDiv.classList.remove('hidden');
            document.getElementById('nextToStep2').classList.remove('hidden');
            showToast('সদস্য সফলভাবে যাচাই করা হয়েছে!', 'success');
        } else {
            memberInfoDiv.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fas fa-times-circle text-red-600 text-2xl"></i>
                    <div>
                        <p class="font-bold text-red-600">সদস্য পাওয়া যায়নি!</p>
                        <p class="text-sm text-gray-600">আইডি নম্বরটি সঠিক কিনা চেক করুন।</p>
                    </div>
                </div>
            `;
            memberInfoDiv.classList.remove('hidden');
            verifiedMember = null;
            document.getElementById('nextToStep2').classList.add('hidden');
            showToast('সদস্য পাওয়া যায়নি!', 'error');
        }
    }
    
    function goToStep2() {
        if(!verifiedMember) {
            showToast('দয়া করে আপনার সদস্য আইডি যাচাই করুন', 'error');
            return;
        }
        
        document.getElementById('fullName').value = verifiedMember.fullName || '';
        document.getElementById('mobile').value = verifiedMember.mobile || '';
        document.getElementById('email').value = verifiedMember.email || '';
        
        if(verifiedMember.presentDistrict) {
            const districtSelect = document.getElementById('district');
            for(let i = 0; i < districtSelect.options.length; i++) {
                if(districtSelect.options[i].value === verifiedMember.presentDistrict) {
                    districtSelect.selectedIndex = i;
                    break;
                }
            }
        }
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        updateStepUI(2);
        currentStep = 2;
    }
    
    function goToStep1() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
        updateStepUI(1);
        currentStep = 1;
    }
    
    function updateStepUI(step) {
        const steps = document.querySelectorAll('.step-item');
        const lines = document.querySelectorAll('.step-line');
        
        steps.forEach((s, i) => {
            const numberDiv = s.querySelector('.step-number');
            const textSpan = s.querySelector('.step-text');
            
            if(i + 1 <= step) {
                numberDiv.classList.add('bg-emerald-600', 'text-white');
                numberDiv.classList.remove('bg-gray-300', 'text-gray-600');
                textSpan.classList.remove('text-gray-500');
                textSpan.classList.add('text-emerald-700', 'font-bold');
            } else {
                numberDiv.classList.remove('bg-emerald-600', 'text-white');
                numberDiv.classList.add('bg-gray-300', 'text-gray-600');
                textSpan.classList.add('text-gray-500');
                textSpan.classList.remove('text-emerald-700', 'font-bold');
            }
        });
        
        if(step >= 2) {
            if(lines[0]) lines[0].classList.add('bg-emerald-600');
            lines[0].classList.remove('bg-gray-300');
        } else {
            if(lines[0]) lines[0].classList.remove('bg-emerald-600');
            lines[0].classList.add('bg-gray-300');
        }
        
        if(step >= 3) {
            if(lines[1]) lines[1].classList.add('bg-emerald-600');
            lines[1].classList.remove('bg-gray-300');
        } else {
            if(lines[1]) lines[1].classList.remove('bg-emerald-600');
            lines[1].classList.add('bg-gray-300');
        }
    }
    
    function submitApplication() {
        const district = document.getElementById('district').value;
        const madrasa = document.getElementById('madrasa').value;
        const experience = document.getElementById('experience').value;
        const reason = document.getElementById('reason').value;
        
        if(!district) {
            showToast('জেলা নির্বাচন করুন', 'error');
            return;
        }
        
        // বর্তমান তারিখ ও সময় (বাংলা ফরম্যাটে)
        const currentDateTime = getCurrentDateTime();
        
        const application = {
            id: Date.now(),
            memberId: verifiedMember.id,
            name: verifiedMember.fullName,
            mobile: verifiedMember.mobile,
            email: verifiedMember.email,
            district: district,
            madrasa: madrasa,
            experience: experience,
            reason: reason,
            status: 'pending',
            applyDate: currentDateTime,  // এখানে বাংলা তারিখ ও সময় সংরক্ষণ করা হচ্ছে
            applyTimestamp: new Date().toISOString()  // সর্টিং এর জন্য ISO তারিখ আলাদা রাখা
        };
        
        let applications = JSON.parse(localStorage.getItem('tukn_rep_applications') || '[]');
        applications.push(application);
        localStorage.setItem('tukn_rep_applications', JSON.stringify(applications));
        
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        updateStepUI(3);
        
        showToast('আবেদন সফলভাবে জমা হয়েছে!', 'success');
    }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // রেডিও বাটন ইভেন্ট
    document.querySelectorAll('input[name="isMember"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const memberIdSection = document.getElementById('memberIdSection');
            const nonMemberSection = document.getElementById('nonMemberSection');
            const nextBtn = document.getElementById('nextToStep2');
            
            if(this.value === 'yes') {
                memberIdSection.classList.remove('hidden');
                nonMemberSection.classList.add('hidden');
                nextBtn.classList.add('hidden');
                document.getElementById('memberInfo').classList.add('hidden');
                verifiedMember = null;
            } else {
                memberIdSection.classList.add('hidden');
                nonMemberSection.classList.remove('hidden');
                nextBtn.classList.add('hidden');
                verifiedMember = null;
            }
        });
    });
    
    // পেজ লোড হলে
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Rep Application Form Loaded');
        console.log('বর্তমান তারিখ ও সময়:', getCurrentDateTime());
    });
</script>

</body>
</html>
