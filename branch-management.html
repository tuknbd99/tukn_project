<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্রাঞ্চ ব্যবস্থাপনা | TUKNBD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-functions.js"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-6">
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-2xl font-bold text-emerald-700 mb-4"><i class="fas fa-building mr-2"></i>ব্রাঞ্চ ব্যবস্থাপনা</h2>
            
            <!-- অ্যাডমিন রোল চেক -->
            <div id="accessDenied" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <i class="fas fa-exclamation-triangle mr-2"></i> এই পৃষ্ঠা দেখার অনুমতি আপনার নেই। শুধু সুপার অ্যাডমিন এই পৃষ্ঠা দেখতে পারেন।
            </div>
            
            <div id="branchContent">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm border">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-2 border">ক্রম</th>
                                <th class="p-2 border">ব্রাঞ্চের নাম</th>
                                <th class="p-2 border">জেলা</th>
                                <th class="p-2 border">ঠিকানা</th>
                                <th class="p-2 border">ম্যানেজার</th>
                                <th class="p-2 border">মোবাইল</th>
                                <th class="p-2 border">স্ট্যাটাস</th>
                                <th class="p-2 border">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="branchesList">
                            <tr><td colspan="8" class="text-center p-4 text-gray-500">লোড হচ্ছে...</td><\/tr>
                        </tbody>
                    </table>
                </div>
                <button onclick="addBranch()" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition">
                    <i class="fas fa-plus mr-2"></i>নতুন ব্রাঞ্চ যোগ করুন
                </button>
            </div>
        </div>
    </div>

    <script>
        let branches = [];
        
        // সুপার অ্যাডমিন চেক
        function checkSuperAdmin() {
            const adminData = localStorage.getItem('currentAdmin') || sessionStorage.getItem('currentAdmin');
            if (!adminData) {
                window.location.href = 'admin-login.html';
                return false;
            }
            try {
                const admin = JSON.parse(adminData);
                if (admin.role !== 'সুপার অ্যাডমিন' && admin.role !== 'super_admin') {
                    document.getElementById('accessDenied').classList.remove('hidden');
                    document.getElementById('branchContent').classList.add('hidden');
                    return false;
                }
                return true;
            } catch(e) {
                window.location.href = 'admin-login.html';
                return false;
            }
        }
        
        function loadBranches() {
            const saved = localStorage.getItem('tukn_branches');
            if(saved) {
                branches = JSON.parse(saved);
            } else {
                branches = [];
                localStorage.setItem('tukn_branches', JSON.stringify(branches));
            }
            renderBranches();
        }
        
        function renderBranches() {
            const tbody = document.getElementById('branchesList');
            if(!tbody) return;
            if(branches.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center p-4">কোনো ব্রাঞ্চ নেই</td><\/tr>';
                return;
            }
            tbody.innerHTML = branches.map((b, i) => `
                <tr class="border-b">
                    <td class="p-2 border text-center">${i+1}${''}<\/td>
                    <td class="p-2 border">${b.name}${''}<\/td>
                    <td class="p-2 border">${b.district}${''}<\/td>
                    <td class="p-2 border">${b.address || '-'}${''}<\/td>
                    <td class="p-2 border">${b.manager || '-'}${''}<\/td>
                    <td class="p-2 border">${b.mobile || '-'}${''}<\/td>
                    <td class="p-2 border"><span class="px-2 py-1 rounded-full text-xs ${b.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${b.status === 'active' ? 'সক্রিয়' : 'নিষ্ক্রিয়'}<\/span>${''}<\/td>
                    <td class="p-2 border">
                        <button onclick="editBranch(${b.id})" class="text-blue-500 mr-2"><i class="fas fa-edit"></i><\/button>
                        <button onclick="deleteBranch(${b.id})" class="text-red-500"><i class="fas fa-trash"></i><\/button>
                    <\/td>
                <\/tr>
            `).join('');
        }
        
        function addBranch() {
            const name = prompt('ব্রাঞ্চের নাম:');
            const district = prompt('জেলা:');
            if(name && district) {
                const newBranch = {
                    id: Date.now(),
                    name: name,
                    district: district,
                    address: prompt('ঠিকানা:') || '',
                    manager: prompt('ম্যানেজারের নাম:') || '',
                    mobile: prompt('মোবাইল নম্বর:') || '',
                    status: 'active'
                };
                branches.push(newBranch);
                localStorage.setItem('tukn_branches', JSON.stringify(branches));
                renderBranches();
                alert('ব্রাঞ্চ যোগ করা হয়েছে!');
            }
        }
        
        function editBranch(id) {
            const branch = branches.find(b => b.id === id);
            if(branch) {
                const newName = prompt('ব্রাঞ্চের নতুন নাম:', branch.name);
                if(newName) {
                    branch.name = newName;
                    localStorage.setItem('tukn_branches', JSON.stringify(branches));
                    renderBranches();
                    alert('ব্রাঞ্চ আপডেট করা হয়েছে!');
                }
            }
        }
        
        function deleteBranch(id) {
            if(confirm('ব্রাঞ্চ ডিলিট করবেন?')) {
                branches = branches.filter(b => b.id !== id);
                localStorage.setItem('tukn_branches', JSON.stringify(branches));
                renderBranches();
                alert('ব্রাঞ্চ ডিলিট করা হয়েছে!');
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            if(checkSuperAdmin()) {
                loadBranches();
                console.log('✅ Branch management loaded');
            }
        });
    </script>
</body>
</html>
