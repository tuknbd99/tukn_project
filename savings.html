<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সঞ্চয় | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        .watermark-container {
            position: relative;
            min-height: 100vh;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .watermark-container::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background-image: url('images/logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }
        .watermark-content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="watermark-container">
<div class="watermark-content min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <img src="images/logo.png" alt="TUKNBD Logo" class="w-20 h-20 rounded-full mx-auto shadow-lg object-cover" onerror="this.src='https://placehold.co/80x80/059669/white?text=T'">
            <h1 class="text-3xl font-bold text-emerald-700 mt-4">ত্বলাবা-উলামা কল্যাণ নেটওয়ার্ক বাংলাদেশ</h1>
            <p class="text-gray-600 mt-2">সঞ্চয় ফরম</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <form id="savingsForm" class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">আপনার সদস্য আইডি <span class="text-red-500">*</span></label>
                    <input type="text" id="memberId" required class="w-full px-4 py-2 border rounded-lg" placeholder="যেমন: TUKN G 230426-0001">
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">সঞ্চয়ের পরিমাণ <span class="text-red-500">*</span></label>
                    <select id="amount" required class="w-full px-4 py-2 border rounded-lg">
                        <option value="100">১০০ টাকা</option>
                        <option value="200">২০০ টাকা</option>
                        <option value="300">৩০০ টাকা</option>
                        <option value="400">৪০০ টাকা</option>
                        <option value="500" selected>৫০০ টাকা</option>
                        <option value="600">৬০০ টাকা</option>
                        <option value="700">৭০০ টাকা</option>
                        <option value="800">৮০০ টাকা</option>
                        <option value="900">৯০০ টাকা</option>
                        <option value="1000">১০০০ টাকা</option>
                    </select>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-600 mb-3"><i class="fas fa-info-circle text-emerald-600"></i> সঞ্চয় পরিশোধের জন্য নিচের মাধ্যমে পাঠাতে পারেন:</p>
                    <div class="flex justify-center gap-6 text-3xl flex-wrap">
                        <i class="fab fa-bkash text-blue-600"></i>
                        <i class="fab fa-nagad text-orange-500"></i>
                        <i class="fas fa-rocket text-gray-700"></i>
                    </div>
                    <p class="text-center font-bold text-emerald-700 mt-3">+88 01633157094</p>
                    <p class="text-center text-xs text-gray-500">সেভ নাম: TUKNBD</p>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 transition text-lg font-semibold">
                    <i class="fas fa-paper-plane mr-2"></i>সঞ্চয় জমা দিন
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    document.getElementById('savingsForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const memberId = document.getElementById('memberId').value.trim();
        const amount = document.getElementById('amount').value;
        
        const members = JSON.parse(localStorage.getItem('tukn_members') || '[]');
        const member = members.find(m => m.id === memberId || m.mobile === memberId);
        
        if(!member) {
            showToast('সদস্য আইডি সঠিক নয়!', 'error');
            return;
        }
        
        showToast(`✅ ${member.fullName} ${amount} টাকা সঞ্চয়ের আবেদন গ্রহণ করা হয়েছে।`, 'success');
        document.getElementById('savingsForm').reset();
    });
</script>
</body>
</html>
