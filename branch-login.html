<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্রাঞ্চ অ্যাডমিন লগইন | TUKNBD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { background: #f0fdf4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 20px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 1px solid #eef2ff; }
        .login-card h2 { color: #064e3b; font-weight: 700; }
        .login-card .subtitle { color: #6b7280; font-size: 14px; }
        .login-card input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 14px; transition: all 0.3s; }
        .login-card input:focus { border-color: #059669; box-shadow: 0 0 0 3px rgba(5,150,105,0.1); outline: none; }
        .login-btn { background: linear-gradient(135deg, #059669, #047857); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(5,150,105,0.3); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { color: #dc2626; font-size: 13px; margin-top: 6px; display: none; }
        .success-msg { color: #059669; font-size: 13px; margin-top: 6px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
            <i class="fas fa-store text-emerald-600 text-2xl"></i>
        </div>
        <h2>🏢 ব্রাঞ্চ অ্যাডমিন</h2>
        <p class="subtitle">আপনার ব্রাঞ্চের ড্যাশবোর্ডে লগইন করুন</p>
    </div>

    <form id="branchLoginForm" onsubmit="return false;">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">ইউজারনেম</label>
            <input type="text" id="branchUsername" placeholder="ইউজারনেম লিখুন" required autofocus>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড</label>
            <input type="password" id="branchPassword" placeholder="পাসওয়ার্ড লিখুন" required>
        </div>
        <div id="loginError" class="error-msg text-center"><i class="fas fa-exclamation-circle mr-1"></i> <span id="errorText">ভুল ইউজারনেম বা পাসওয়ার্ড!</span></div>
        <div id="loginSuccess" class="success-msg text-center"><i class="fas fa-check-circle mr-1"></i> লগইন সফল! রিডাইরেক্ট হচ্ছে...</div>

        <button type="submit" id="loginBtn" class="login-btn mt-2" onclick="loginBranchAdmin()">
            <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
        </button>
    </form>

    <div class="mt-4 text-center text-sm text-gray-500">
        <a href="admin-login.html" class="text-emerald-600 hover:underline"><i class="fas fa-arrow-left mr-1"></i> সুপার অ্যাডমিন লগইন</a>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loginBranchAdmin() {
        const username = document.getElementById('branchUsername').value.trim();
        const password = document.getElementById('branchPassword').value.trim();
        const errorEl = document.getElementById('loginError');
        const successEl = document.getElementById('loginSuccess');
        const btn = document.getElementById('loginBtn');

        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!username || !password) {
            document.getElementById('errorText').textContent = 'ইউজারনেম ও পাসওয়ার্ড দিন!';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> লগইন হচ্ছে...';

        try {
            const { data, error } = await supabase
                .from('admins')
                .select('*, branches(*)')
                .eq('username', username)
                .eq('password', password)
                .maybeSingle();

            if (error) throw error;

            if (!data) {
                document.getElementById('errorText').textContent = 'ভুল ইউজারনেম বা পাসওয়ার্ড!';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন';
                return;
            }

            // Check if this is a branch admin
            if (data.role === 'সুপার অ্যাডমिन' || !data.branch_id) {
                document.getElementById('errorText').textContent = 'আপনি সুপার অ্যাডমিন। মূল প্যানেলে যান।';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন';
                return;
            }

            // Store branch admin data
            localStorage.setItem('currentBranchAdmin', JSON.stringify(data));
            
            // Show success
            successEl.style.display = 'block';

            // Redirect after short delay
            setTimeout(() => {
                window.location.href = 'branch-dashboard.html';
            }, 1500);

        } catch(e) {
            console.error('Login error:', e);
            document.getElementById('errorText').textContent = 'সার্ভার সমস্যা! পরে চেষ্টা করুন।';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন';
        }
    }

    // Enter key support
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            loginBranchAdmin();
        }
    });
</script>

</body>
</html>
