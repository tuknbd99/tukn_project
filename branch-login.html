<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্রাঞ্চ অ্যাডমিন লগইন | TUKNBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Noto Sans Bengali', sans-serif; }
        body { 
            background: linear-gradient(135deg, #f0fdf4, #dcfce7); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 2px solid #059669;
        }
        .login-card h2 { color: #064e3b; font-weight: 700; }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .login-card input:focus {
            border-color: #059669;
            box-shadow: 0 0 0 3px rgba(5,150,105,0.15);
            outline: none;
        }
        .login-btn {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(5,150,105,0.3);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }
        .success-msg { color: #059669; font-size: 13px; margin-top: 8px; display: none; }
        .home-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #059669;
            text-decoration: none;
            font-size: 14px;
        }
        .home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-6">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-store text-emerald-600 text-3xl"></i>
        </div>
        <h2>🏢 ব্রাঞ্চ অ্যাডমিন</h2>
        <p class="text-gray-500 text-sm mt-1">আপনার ব্রাঞ্চের ড্যাশবোর্ডে লগইন করুন</p>
    </div>

    <form id="branchLoginForm" onsubmit="return false;">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">ইউজারনেম</label>
            <input type="text" id="loginUsername" placeholder="ইউজারনেম লিখুন" required autofocus>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড</label>
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড লিখুন" required>
        </div>
        <div id="loginError" class="error-msg"><i class="fas fa-exclamation-circle mr-1"></i> <span id="errorText">ভুল ইউজারনেম বা পাসওয়ার্ড!</span></div>
        <div id="loginSuccess" class="success-msg"><i class="fas fa-check-circle mr-1"></i> লগইন সফল! রিডাইরেক্ট হচ্ছে...</div>

        <button type="button" id="loginBtn" class="login-btn mt-2" onclick="loginBranchAdmin()">
            <i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন
        </button>
    </form>

    <a href="admin-panel.html" class="home-link"><i class="fas fa-arrow-left mr-1"></i> সুপার অ্যাডমিন প্যানেলে ফিরে যান</a>
</div>

<script>
// ============================================================
// Supabase কনফিগারেশন - একবারেই ডিক্লেয়ার
// ============================================================
const SUPABASE_URL = 'https://bffomfsffrtfgxyetzvm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_A0BluIVwJ4M3Zd3JWpBoPg_NJSRu81D';

// 🔥 শুধুমাত্র একটি ক্লায়েন্ট তৈরি করুন
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// ব্রাঞ্চ অ্যাডমিন লগইন ফাংশন
// ============================================================
async function loginBranchAdmin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorEl = document.getElementById('loginError');
    const successEl = document.getElementById('loginSuccess');
    const btn = document.getElementById('loginBtn');

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!username || !password) {
        document.getElementById('errorText').textContent = 'ইউজারনেম ও পাসওয়ার্ড দিন!';
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> লগইন হচ্ছে...';

    try {
        const { data, error } = await supabaseClient
            .from('branch_admins')
            .select('*, branches(*)')
            .eq('username', username)
            .eq('password', password)
            .maybeSingle();

        if (error) {
            console.error('Login error:', error);
            throw error;
        }

        if (!data) {
            document.getElementById('errorText').textContent = 'ভুল ইউজারনেম বা পাসওয়ার্ড!';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন';
            return;
        }

        if (data.status !== 'active') {
            document.getElementById('errorText').textContent = 'আপনার একাউন্ট নিষ্ক্রিয়! অ্যাডমিনের সাথে যোগাযোগ করুন।';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন';
            return;
        }

        // লাস্ট লগইন আপডেট
        await supabaseClient
            .from('branch_admins')
            .update({ last_login: new Date().toISOString() })
            .eq('id', data.id);

        // সেশন সংরক্ষণ
        localStorage.setItem('currentBranchAdmin', JSON.stringify(data));

        // ব্রাঞ্চ ড্যাশবোর্ডে রিডাইরেক্ট
        successEl.style.display = 'block';
        
        setTimeout(() => {
            window.location.href = 'branch-dashboard.html';
        }, 1500);

    } catch(e) {
        console.error('Login error:', e);
        document.getElementById('errorText').textContent = 'সার্ভার সমস্যা! পরে চেষ্টা করুন।';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i> লগইন করুন';
    }
}

// Enter key support
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        loginBranchAdmin();
    }
});

// Page load - focus on username
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loginUsername').focus();
});
</script>

</body>
</html>
